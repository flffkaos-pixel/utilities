<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">이미지 압축</span><span class="lang-en">Image Compress</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">이미지를 브라우저에서 직접 압축하세요.</span><span class="lang-en">Compress images directly in your browser.</span></p>
<input type="file" id="cmpi" accept="image/*" class="mb-4" onchange="compressImg()"><div class="grid grid-cols-2 gap-4"><div><div class="text-sm font-medium mb-2"><span class="lang-ko">원본</span><span class="lang-en">Original</span></div><div id="cmporig" class="bg-slate-100 dark:bg-slate-700 rounded-lg p-3 text-center text-sm text-slate-500"><span class="lang-ko">이미지를 선택하세요.</span><span class="lang-en">Select an image.</span></div></div><div><div class="text-sm font-medium mb-2"><span class="lang-ko">압축 후</span><span class="lang-en">Compressed</span></div><div id="cmpout" class="bg-slate-100 dark:bg-slate-700 rounded-lg p-3 text-center text-sm text-slate-500">-</div></div></div>
</div>

<script>
function compressImg(){var f=document.getElementById("cmpi").files[0];if(!f)return;var img=new Image();img.onload=function(){var c=document.createElement("canvas");c.width=img.naturalWidth;c.height=img.naturalHeight;var ctx=c.getContext("2d");ctx.drawImage(img,0,0);document.getElementById("cmporig").innerHTML="<img src='"+img.src+"' class='max-w-full max-h-40 mx-auto'><br>"+(f.size/1024).toFixed(1)+" KB";c.toBlob(function(b){var u=URL.createObjectURL(b);document.getElementById("cmpout").innerHTML="<img src='"+u+"' class='max-w-full max-h-40 mx-auto'><br>"+(b.size/1024).toFixed(1)+" KB ("+Math.round((1-b.size/f.size)*100)+"%)<br><a href='"+u+"' download='compressed.png' class='text-primary underline'>Download</a>";},"image/jpeg",0.7);};img.src=URL.createObjectURL(f);}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
