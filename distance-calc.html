<meta name="description" content="2D 또는 3D 공간에서 두 점 사이의 거리를 계산합니다.">

<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"거리 계산기","description":"2D 또는 3D 공간에서 두 점 사이의 거리를 계산합니다.","url":"https://freeutilities.pages.dev/distance-calc.html","applicationCategory":"UtilitiesApplication","operatingSystem":"Any (Web Browser)","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"Free Utilities","url":"https://freeutilities.pages.dev/"}}
</script>

<body><div class="max-w-md mx-auto space-y-4"><div class="flex gap-4 mb-4"><label><input type="radio" name="distMode" value="2d" checked onchange="toggleDistMode()"> 2D</label><label><input type="radio" name="distMode" value="3d" onchange="toggleDistMode()"> 3D</label></div><div class="grid grid-cols-2 gap-4"><div class="space-y-2"><h3 class="font-semibold text-sm">Point 1</h3><input id="distX1" type="number" value="0" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700" placeholder="x1"><input id="distY1" type="number" value="0" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700" placeholder="y1"><input id="distZ1" type="number" value="0" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700 hidden" placeholder="z1"></div><div class="space-y-2"><h3 class="font-semibold text-sm">Point 2</h3><input id="distX2" type="number" value="3" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700" placeholder="x2"><input id="distY2" type="number" value="4" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700" placeholder="y2"><input id="distZ2" type="number" value="0" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700 hidden" placeholder="z2"></div></div><button onclick="calcDistance()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div id="distResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 text-center text-lg font-bold"></div></div><script>function toggleDistMode(){var is3d=document.querySelector("input[name=distMode]:checked").value=="3d";document.getElementById("distZ1").classList.toggle("hidden",!is3d);document.getElementById("distZ2").classList.toggle("hidden",!is3d)}function calcDistance(){var is3d=document.querySelector("input[name=distMode]:checked").value=="3d";var x1=parseFloat(document.getElementById("distX1").value)||0;var y1=parseFloat(document.getElementById("distY1").value)||0;var x2=parseFloat(document.getElementById("distX2").value)||0;var y2=parseFloat(document.getElementById("distY2").value)||0;var z1=parseFloat(document.getElementById("distZ1").value)||0;var z2=parseFloat(document.getElementById("distZ2").value)||0;var d;if(is3d){d=Math.sqrt(Math.pow(x2-x1,2)+Math.pow(y2-y1,2)+Math.pow(z2-z1,2))}else{d=Math.sqrt(Math.pow(x2-x1,2)+Math.pow(y2-y1,2))}document.getElementById("distResult").textContent="Distance = "+d.toFixed(6)}</script></body>
</html>
