<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>프로필 - UtilityHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface pb-24">
<header class="bg-[#f7f9ff] flex justify-between items-center px-4 h-16 w-full docked top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'" class="text-[#005bbf] hover:bg-[#dfe3e8] p-2 rounded-full">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf]">프로필</h1>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-6 space-y-6">
    <div class="p-6 bg-surface-container-low rounded-3xl text-center">
        <div class="w-24 h-24 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="material-symbols-outlined text-primary text-5xl" data-icon="person">person</span>
        </div>
        <h2 class="text-2xl font-bold">사용자</h2>
        <p class="text-gray-500">무료会员</p>
    </div>
    
    <div class="bg-surface-container-low rounded-2xl p-4 space-y-2">
        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-container-highest">
            <span class="flex items-center gap-3"><span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>다크모드</span>
            <span class="material-symbols-outlined text-gray-400" data-icon="chevron_right">chevron_right</span>
        </button>
        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-container-highest">
            <span class="flex items-center gap-3"><span class="material-symbols-outlined" data-icon="notifications">notifications</span>알림</span>
            <span class="material-symbols-outlined text-gray-400" data-icon="chevron_right">chevron_right</span>
        </button>
        <button class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-surface-container-highest">
            <span class="flex items-center gap-3"><span class="material-symbols-outlined" data-icon="help">help</span>도움말</span>
            <span class="material-symbols-outlined text-gray-400" data-icon="chevron_right">chevron_right</span>
        </button>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-2 pb-safe bg-white/80 backdrop-blur-xl z-50 border-t">
    <a class="flex flex-col items-center text-[#44474e] px-5 py-1" href="index.html"><span class="material-symbols-outlined" data-icon="home">home</span><span class="text-[11px] font-semibold mt-1">홈</span></a>
    <a class="flex flex-col items-center text-[#44474e] px-5 py-1" href="category.html"><span class="material-symbols-outlined" data-icon="category">category</span><span class="text-[11px] font-semibold mt-1">카테고리</span></a>
    <a class="flex flex-col items-center text-[#44474e] px-5 py-1" href="history.html"><span class="material-symbols-outlined" data-icon="history">history</span><span class="text-[11px] font-semibold mt-1">기록</span></a>
    <a class="flex flex-col items-center text-[#005bbf] px-5 py-1" href="profile.html"><span class="material-symbols-outlined" data-icon="person">person</span><span class="text-[11px] font-semibold mt-1">프로필</span></a>
</nav>
</body>
</html>
