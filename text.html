<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 도구 - Text Tools</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #eee;
            --text-muted: #aaa;
            --accent: #667eea;
            --input-bg: #0f3460;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        
        textarea { width: 100%; min-height: 150px; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1rem; margin-bottom: 15px; }
        textarea::placeholder { color: var(--text-muted); }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: #5568d3; }
        
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; min-height: 80px; word-break: break-all; }
        
        .ads { margin-top: 30px; text-align: center; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">📝 텍스트 도구</span>
            <span class="en">📝 Text Tools</span>
        </h1>
        
        <textarea id="input" placeholder="Enter text... / 텍스트를 입력하세요..."></textarea>
        
        <div class="btn-group">
            <button class="btn" onclick="upperCase()">UPPERCASE</button>
            <button class="btn" onclick="lowerCase()">lowercase</button>
            <button class="btn" onclick="capitalize()">Capitalize</button>
            <button class="btn" onclick="trim()">Trim</button>
            <button class="btn" onclick="copy()">Copy</button>
        </div>
        
        <div class="result" id="result"></div>
        
        <div class="ads">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-1955893232253258"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function getVal() { return document.getElementById('input').value; }
        function setResult(text) { document.getElementById('result').textContent = text; }
        
        function upperCase() { setResult(getVal().toUpperCase()); }
        function lowerCase() { setResult(getVal().toLowerCase()); }
        function capitalize() { setResult(getVal().replace(/\b\w/g, l => l.toUpperCase())); }
        function trim() { setResult(getVal().trim()); }
        function copy() { navigator.clipboard.writeText(document.getElementById('result').textContent); }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
