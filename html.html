<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 인코더/디코더</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%230071e3' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%230071e3'/></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #000000; --surface: #1d1d1f; --surface-raised: #272729; --text-primary: #f5f5f7; --text-secondary: rgba(245,245,247,0.7); --accent: #0071e3; --link: #2997ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(29,29,31,0.72); backdrop-filter: blur(20px); }
        .nav-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; padding: 0 22px; height: 48px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-size: 1.06rem; font-weight: 600; }
        .container { max-width: 680px; margin: 0 auto; padding: 32px 22px 60px; }
        .page-header { margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--link); text-decoration: none; font-size: 0.88rem; margin-bottom: 20px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 12px; }
        .description { background: var(--surface); border-radius: 12px; padding: 20px 24px; font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 28px; }
        textarea { width: 100%; min-height: 150px; padding: 16px 20px; background: var(--surface-raised); color: var(--text-primary); border: none; border-radius: 12px; font-size: 1rem; margin-bottom: 16px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 24px; }
        .btn { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 980px; cursor: pointer; font-size: 1rem; }
        .result { padding: 20px 24px; background: var(--surface-raised); border-radius: 12px; min-height: 60px; word-break: break-all; }
        .ads { margin-top: 40px; text-align: center; }
        .footer { text-align: center; padding: 32px 22px; border-top: 1px solid rgba(245,245,247,0.08); color: rgba(245,245,247,0.48); font-size: 0.75rem; }
        .footer a { color: var(--link); text-decoration: none; margin: 0 12px; }
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#0071e3" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#0071e3"/></svg><span>Utilities</span></a></div></nav>
    <div class="container">
        <div class="page-header"><a href="index.html" class="back-link">← Home</a><h1>HTML 인코더</h1></div>
        <div class="description">HTML 엔티티를 인코딩하거나 디코딩합니다.</div>
        <textarea id="input" placeholder="텍스트를 입력하세요..."></textarea>
        <div class="btn-group"><button class="btn" onclick="encode()">Encode</button><button class="btn" onclick="decode()">Decode</button></div>
        <div class="result" id="result"></div>
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <footer class="footer"><a href="terms.html">Terms</a><a href="privacy.html">Privacy</a><p>© 2026 Free Utilities</p></footer>
    <script>
        function encode() { document.getElementById('result').textContent = document.getElementById('input').value.replace(/[\u00A0-\u9999<>&]/g, i => '&#' + i.charCodeAt(0) + ';'); }
        function decode() { document.getElementById('result').textContent = document.getElementById('input').value.replace(/&#(\d+);/g, (m, n) => String.fromCharCode(n)); }
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
