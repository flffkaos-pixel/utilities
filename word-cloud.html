<body><div class="max-w-lg mx-auto space-y-4"><div><label>Enter Text</label><textarea id="wcText" rows="6" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700">The quick brown fox jumps over the lazy dog. The fox is quick and the dog is lazy. The brown fox jumps high. The lazy dog sleeps all day. The quick fox runs fast. The dog barks loudly. A quick brown fox jumps over a lazy dog. This sentence contains every letter of the alphabet. The fox and dog are best friends. They play together every day in the forest. The forest is green and beautiful. Birds sing in the trees. The sun shines brightly. What a wonderful day in the forest.</textarea></div><div class="flex gap-4"><div><label>Max Words</label><input id="wcMax" type="number" value="50" min="5" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>Min Freq</label><input id="wcMin" type="number" value="1" min="1" class="w-full p-2 rounded-xl border border-outline bg-white dark:bg-slate-700"></div></div><button onclick="generateWC()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Generate</button><canvas id="wcCanvas" width="600" height="400" class="w-full border border-outline rounded-xl"></canvas><div id="wcTable" class="text-sm"></div></div><script>var wcColors=["#ef4444","#3b82f6","#22c55e","#f59e0b","#8b5cf6","#ec4899","#14b8a6","#f97316","#6366f1","#e11d48","#059669","#d97706"];function generateWC(){var text=document.getElementById("wcText").value.toLowerCase().replace(/[^a-z\s]/g,"");var maxW=parseInt(document.getElementById("wcMax").value)||50;var minF=parseInt(document.getElementById("wcMin").value)||1;var words=text.split(/\s+/).filter(Boolean);var freq={};words.forEach(function(w){if(w.length>1)freq[w]=(freq[w]||0)+1});var sorted=Object.entries(freq).filter(function(e){return e[1]>=minF}).sort(function(a,b){return b[1]-a[1]}).slice(0,maxW);if(sorted.length==0)return;var maxFreq=sorted[0][1];var canvas=document.getElementById("wcCanvas");var ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#f8fafc";ctx.fillRect(0,0,canvas.width,canvas.height);var placed=[];function tryPlace(x,y,w,h){for(var i=0;i<placed.length;i++){var p=placed[i];if(x<p.x+p.w&&x+w>p.x&&y<p.y+p.h&&y+h>p.y)return false}return true}sorted.forEach(function(entry,i){var word=entry[0];var count=entry[1];var size=12+count/maxFreq*48;ctx.font="bold "+size+"px sans-serif";var metrics=ctx.measureText(word);var w=metrics.width+10;var h=size+6;var placedOk=false;for(var attempts=0;attempts<200;attempts++){var x=Math.random()*(canvas.width-w-20)+10;var y=Math.random()*(canvas.height-h-20)+10;if(tryPlace(x,y,w,h)){ctx.fillStyle=wcColors[i%wcColors.length];ctx.globalAlpha=0.5+0.5*count/maxFreq;ctx.fillText(word,x+5,y+size);ctx.globalAlpha=1;placed.push({x:x,y:y,w:w,h:h});placedOk=true;break}}});var html="<table class=w-full><tr><th class=text-left>Word</th><th class=text-right>Frequency</th></tr>";sorted.forEach(function(e){html+="<tr><td>"+e[0]+"</td><td class=text-right>"+e[1]+"</td></tr>"});html+="</table>";document.getElementById("wcTable").innerHTML=html}</script></body>
