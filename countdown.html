<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운트다운 - Countdown Timer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #0f0f23; --card-bg: #1a1a3e; --text: #eee; --accent: #10b981; --accent2: #06d6a0; --input-bg: #252550; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; background-image: radial-gradient(ellipse at top, #1a1a3e 0%, #0f0f23 100%); }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .header { margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, var(--card-bg), #2a2a5e); border-radius: 20px; }
        .header h1 { font-size: 1.4rem; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer { background: linear-gradient(145deg, var(--card-bg), #151530); border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .timer-display { font-size: 4rem; font-weight: bold; font-family: 'Courier New', monospace; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-row input { flex: 1; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 12px; font-size: 1rem; text-align: center; }
        .btn { padding: 15px 30px; background: linear-gradient(135deg, var(--accent), #059669); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin: 5px; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn.stop { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn.reset { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .ads { margin-top: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏳ 카운트다운 타이머</h1>
        </div>
        
        <div class="timer">
            <div class="timer-display" id="display">00:00:00</div>
            <div class="input-row">
                <input type="number" id="hours" placeholder="시" min="0" value="0">
                <input type="number" id="minutes" placeholder="분" min="0" value="5">
                <input type="number" id="seconds" placeholder="초" min="0" value="0">
            </div>
            <button class="btn" onclick="start()">시작</button>
            <button class="btn stop" onclick="stop()">정지</button>
            <button class="btn reset" onclick="reset()">초기화</button>
        </div>
        
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <script>
        let interval;
        let totalSeconds = 0;
        
        function updateDisplay() {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            document.getElementById('display').textContent = 
                String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        
        function start() {
            const h = parseInt(document.getElementById('hours').value) || 0;
            const m = parseInt(document.getElementById('minutes').value) || 0;
            const s = parseInt(document.getElementById('seconds').value) || 0;
            if (totalSeconds === 0) totalSeconds = h * 3600 + m * 60 + s;
            if (totalSeconds <= 0) return;
            clearInterval(interval);
            interval = setInterval(() => {
                totalSeconds--;
                updateDisplay();
                if (totalSeconds <= 0) { clearInterval(interval); alert('⏰ 시간 종료!'); }
            }, 1000);
        }
        
        function stop() { clearInterval(interval); }
        function reset() { stop(); totalSeconds = 0; updateDisplay(); }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
