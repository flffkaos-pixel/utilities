<body class="bg-background min-h-screen">

</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">내 IP 확인</span><span class="lang-en">My IP</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">현재 사용 중인 IP 주소를 확인합니다.</span><span class="lang-en">Check your current IP address.</span></p>
<div class="text-center py-8" id="ipr"><div class="text-sm text-slate-500 mb-4"><span class="lang-ko">내 IP 주소를 확인하려면 아래 버튼을 클릭하세요.</span><span class="lang-en">Click the button below to check your IP.</span></div><button onclick="checkIP()" class="px-6 py-3 bg-primary text-white rounded-xl font-bold text-lg"><span class="lang-ko">IP 확인</span><span class="lang-en">Check IP</span></button><div id="ipaddr" class="text-3xl font-bold text-primary mt-6 hidden"></div></div>
</div>

<script>
function checkIP(){var x=new XMLHttpRequest();x.open("GET","https://api.ipify.org?format=json");x.onload=function(){var d=JSON.parse(x.responseText);document.getElementById("ipaddr").textContent=d.ip;document.getElementById("ipaddr").classList.remove("hidden");};x.send();}
</script>
</main>

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
