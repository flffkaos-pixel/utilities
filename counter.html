<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 수 세기 - Word Counter</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        textarea { width: 100%; min-height: 150px; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1rem; }
        .stats { display: flex; gap: 20px; margin-top: 20px; padding: 15px; background: var(--card-bg); border-radius: 10px; }
        .stat { text-align: center; }
        .stat-num { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">📊 글자 수 세기</h1>
        <h1 class="en">📊 Word Counter</h1>
        
        <textarea id="input" oninput="count()" placeholder="Enter text... / 텍스트를 입력하세요..."></textarea>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="words">0</div>
                <div class="stat-label ko">단어</div>
                <div class="stat-label en">Words</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="chars">0</div>
                <div class="stat-label ko">글자</div>
                <div class="stat-label en">Characters</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="lines">0</div>
                <div class="stat-label ko">줄</div>
                <div class="stat-label en">Lines</div>
            </div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = lang;
            localStorage.setItem('util-lang', lang);
        }
        
        function count() {
            const text = document.getElementById('input').value;
            document.getElementById('words').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('chars').textContent = text.length;
            document.getElementById('lines').textContent = text ? text.split('\n').length : 0;
        }
        
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
