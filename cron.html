<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron 생성기 - Cron Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏰</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
        select { width: 100%; padding: 12px 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; text-align: center; font-size: 1.3rem; font-family: monospace; color: var(--accent); }
        .desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; text-align: center; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">⏰ Cron 생성기</span>
            <span class="en">⏰ Cron Generator</span>
        </h1>
        
        <div class="description">
            <span class="ko">Cron 표현식을 시각적으로 생성합니다.</span>
            <span class="en">Visually generate cron expressions.</span>
        </div>
        
        <div class="field">
            <label><span class="ko">분 (Minute)</span><span class="en">Minute</span></label>
            <select id="minute" onchange="updateCron()">
                <option value="*"><span class="ko">매분</span><span class="en">Every minute</span></option>
                <option value="0"><span class="ko">0분</span><span class="en">At minute 0</span></option>
                <option value="*/5"><span class="ko">5분마다</span><span class="en">Every 5 minutes</span></option>
                <option value="*/10"><span class="ko">10분마다</span><span class="en">Every 10 minutes</span></option>
                <option value="*/15"><span class="ko">15분마다</span><span class="en">Every 15 minutes</span></option>
                <option value="*/30"><span class="ko">30분마다</span><span class="en">Every 30 minutes</span></option>
            </select>
        </div>
        
        <div class="field">
            <label><span class="ko">시 (Hour)</span><span class="en">Hour</span></label>
            <select id="hour" onchange="updateCron()">
                <option value="*"><span class="ko">매시</span><span class="en">Every hour</span></option>
                <option value="0"><span class="ko">0시</span><span class="en">At midnight</span></option>
                <option value="*/2"><span class="ko">2시간마다</span><span class="en">Every 2 hours</span></option>
                <option value="*/6"><span class="ko">6시간마다</span><span class="en">Every 6 hours</span></option>
                <option value="9-17"><span class="ko">오전 9시-오후 5시</span><span class="en">9 AM - 5 PM</span></option>
            </select>
        </div>
        
        <div class="field">
            <label><span class="ko">일 (Day)</span><span class="en">Day</span></label>
            <select id="day" onchange="updateCron()">
                <option value="*"><span class="ko">매일</span><span class="en">Every day</span></option>
                <option value="1"><span class="ko">1일</span><span class="en">1st</span></option>
                <option value="15"><span class="ko">15일</span><span class="en">15th</span></option>
                <option value="1,15"><span class="ko">1, 15일</span><span class="en">1st & 15th</span></option>
            </select>
        </div>
        
        <div class="field">
            <label><span class="ko">월 (Month)</span><span class="en">Month</span></label>
            <select id="month" onchange="updateCron()">
                <option value="*"><span class="ko">매월</span><span class="en">Every month</span></option>
                <option value="1"><span class="ko">1월</span><span class="en">January</span></option>
                <option value="6,7,8"><span class="ko">여름 (6-8월)</span><span class="en">Summer (Jun-Aug)</span></option>
            </select>
        </div>
        
        <div class="field">
            <label><span class="ko">요일 (Weekday)</span><span class="en">Weekday</span></label>
            <select id="weekday" onchange="updateCron()">
                <option value="*"><span class="ko">매일</span><span class="en">Every day</span></option>
                <option value="1-5"><span class="ko">평일 (월-금)</span><span class="en">Weekdays (Mon-Fri)</span></option>
                <option value="0,6"><span class="ko">주말 (토-일)</span><span class="en">Weekend (Sat-Sun)</span></option>
                <option value="1"><span class="ko">월요일</span><span class="en">Monday</span></option>
                <option value="5"><span class="ko">금요일</span><span class="en">Friday</span></option>
            </select>
        </div>
        
        <div class="result" id="cron">* * * * *</div>
        <div class="desc" id="desc"><span class="ko">매분</span><span class="en">Every minute</span></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        const descs = {
            minute: { '*': { ko: '매분', en: 'Every minute' }, '0': { ko: '정각', en: 'At minute 0' }, '*/5': { ko: '5분마다', en: 'Every 5 min' }, '*/10': { ko: '10분마다', en: 'Every 10 min' }, '*/15': { ko: '15분마다', en: 'Every 15 min' }, '*/30': { ko: '30분마다', en: 'Every 30 min' } },
            hour: { '*': { ko: '매시', en: 'Every hour' }, '0': { ko: '자정', en: 'Midnight' }, '*/2': { ko: '2시간마다', en: 'Every 2 hours' }, '*/6': { ko: '6시간마다', en: 'Every 6 hours' }, '9-17': { ko: '오전 9시-오후 5시', en: '9 AM - 5 PM' } },
            day: { '*': { ko: '매일', en: 'Every day' }, '1': { ko: '매월 1일', en: '1st of month' }, '15': { ko: '매월 15일', en: '15th of month' }, '1,15': { ko: '매월 1일과 15일', en: '1st & 15th' } },
            month: { '*': { ko: '매월', en: 'Every month' }, '1': { ko: '1월', en: 'January' }, '6,7,8': { ko: '여름 (6-8월)', en: 'Summer (Jun-Aug)' } },
            weekday: { '*': { ko: '매일', en: 'Every day' }, '1-5': { ko: '평일 (월-금)', en: 'Weekdays (Mon-Fri)' }, '0,6': { ko: '주말 (토-일)', en: 'Weekend (Sat-Sun)' }, '1': { ko: '월요일', en: 'Monday' }, '5': { ko: '금요일', en: 'Friday' } }
        };
        
        function updateCron() {
            const m = document.getElementById('minute').value;
            const h = document.getElementById('hour').value;
            const d = document.getElementById('day').value;
            const mon = document.getElementById('month').value;
            const w = document.getElementById('weekday').value;
            const cron = `${m} ${h} ${d} ${mon} ${w}`;
            document.getElementById('cron').textContent = cron;
            const isKo = document.body.classList.contains('lang-ko');
            const desc = [descs.minute[m]?.[isKo ? 'ko' : 'en'] || m, descs.hour[h]?.[isKo ? 'ko' : 'en'] || h, descs.day[d]?.[isKo ? 'ko' : 'en'] || d, descs.month[mon]?.[isKo ? 'ko' : 'en'] || mon, descs.weekday[w]?.[isKo ? 'ko' : 'en'] || w].join(', ');
            document.getElementById('desc').textContent = desc;
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
