<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron 생성기 - Cron Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%230071e3' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%230071e3'/></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #000000; --surface: #1d1d1f; --surface-raised: #272729; --text-primary: #f5f5f7; --text-secondary: rgba(245,245,247,0.7); --accent: #0071e3; --link: #2997ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(29,29,31,0.72); backdrop-filter: blur(20px); }
        .nav-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; padding: 0 22px; height: 48px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-size: 1.06rem; font-weight: 600; }
        .container { max-width: 680px; margin: 0 auto; padding: 32px 22px 60px; }
        .page-header { margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--link); text-decoration: none; font-size: 0.88rem; margin-bottom: 20px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 12px; }
        .description { background: var(--surface); border-radius: 12px; padding: 20px 24px; font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 28px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        select { width: 100%; padding: 12px 16px; background: var(--surface-raised); color: var(--text-primary); border: none; border-radius: 8px; font-size: 1rem; }
        .result { padding: 20px 24px; background: var(--surface-raised); border-radius: 12px; text-align: center; font-size: 1.5rem; font-family: monospace; margin-top: 24px; }
        .desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px; }
        .ads { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#0071e3" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#0071e3"/></svg><span>Utilities</span></a></div></nav>
    <div class="container">
        <div class="page-header"><a href="index.html" class="back-link">← Home</a><h1>Cron 생성기</h1></div>
        <div class="description">Cron 표현식을 시각적으로 생성합니다.</div>
        <div class="field">
            <label>분 (Minute)</label>
            <select id="minute"><option value="*">매분</option><option value="0">0분</option><option value="*/5">5분마다</option><option value="*/10">10분마다</option><option value="*/15">15분마다</option><option value="*/30">30분마다</option></select>
        </div>
        <div class="field">
            <label>시 (Hour)</label>
            <select id="hour"><option value="*">매시</option><option value="0">0시</option><option value="*/2">2시간마다</option><option value="*/6">6시간마다</option><option value="9-17">上午 9-17시</option></select>
        </div>
        <div class="field">
            <label>일 (Day)</label>
            <select id="day"><option value="*">매일</option><option value="1">1일</option><option value="15">15일</option><option value="1,15">1, 15일</option></select>
        </div>
        <div class="field">
            <label>월 (Month)</label>
            <select id="month"><option value="*">매월</option><option value="1">1월</option><option value="6,7,8">여름 (6-8월)</option></select>
        </div>
        <div class="field">
            <label>요일 (Weekday)</label>
            <select id="weekday"><option value="*">매일</option><option value="1-5">평일 (월-금)</option><option value="0,6">주말 (토-일)</option><option value="1">월요일</option><option value="5">금요일</option></select>
        </div>
        <div class="result" id="cron">* * * * *</div>
        <div class="desc" id="desc">매분</div>
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <script>
        const fields = ['minute', 'hour', 'day', 'month', 'weekday'];
        const descs = { minute: { '*': '매분', '0': '정각', '*/5': '5분마다', '*/10': '10분마다', '*/15': '15분마다', '*/30': '30분마다' }, hour: { '*': '매시', '0': '자정', '*/2': '2시간마다', '*/6': '6시간마다', '9-17': '오전 9시-오후 5시' }, day: { '*': '매일', '1': '매월 1일', '15': '매월 15일', '1,15': '매월 1일과 15일' }, month: { '*': '매월', '1': '1월', '6,7,8': '여름 (6-8월)' }, weekday: { '*': '매일', '1-5': '평일 (월-금)', '0,6': '주말 (토-일)', '1': '월요일', '5': '금요일' } };
        function update() {
            const cron = fields.map(f => document.getElementById(f).value).join(' ');
            document.getElementById('cron').textContent = cron;
            let d = [];
            fields.forEach(f => { const v = document.getElementById(f).value; if (descs[f] && descs[f][v]) d.push(descs[f][v]); });
            document.getElementById('desc').textContent = d.join(' / ');
        }
        fields.forEach(f => document.getElementById(f).addEventListener('change', update));
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
