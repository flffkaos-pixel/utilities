<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Base64 - UtilityHub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {"primary":"#005bbf","surface":"#f7f9ff","on-surface":"#181c20","surface-container-low":"#f1f4fa","surface-container-lowest":"#ffffff"}, fontFamily: {"body":["Inter"]}}}};</script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface ">
<header class="bg-[#f7f9ff] flex justify-between items-center px-4 h-16 w-full docked top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'" class="text-[#005bbf] hover:bg-[#dfe3e8] p-2 rounded-full">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf]">Base64</h1>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-6 space-y-4">
    <textarea id="input" class="w-full min-h-24 p-4 bg-surface-container-low rounded-2xl border-none" placeholder="텍스트 입력"></textarea>
    <div class="flex gap-2">
        <button onclick="encode()" class="flex-1 py-3 bg-primary text-white rounded-xl font-bold">인코딩</button>
        <button onclick="decode()" class="flex-1 py-3 bg-secondary text-white rounded-xl font-bold">디코딩</button>
    </div>
    <div id="result" class="p-4 bg-surface-container-lowest rounded-2xl min-h-20 word-break-all"></div>
</main>

<nav class="flex items-center gap-6 px-6 py-4 bg-white border-b"><a href="index.html" class="text-[#005bbf] font-bold">홈</a><a href="category.html" class="text-gray-600 hover:text-[#005bbf]">카테고리</a><a href="history.html" class="text-gray-600 hover:text-[#005bbf]">기록</a><a href="profile.html" class="text-gray-600 hover:text-[#005bbf]">프로필</a></nav>

<script>
function encode() { try { document.getElementById('result').textContent = btoa(document.getElementById('input').value); } catch(e) { document.getElementById('result').textContent = 'Error'; } }
function decode() { try { document.getElementById('result').textContent = atob(document.getElementById('input').value); } catch(e) { document.getElementById('result').textContent = 'Error'; } }
</script>
</body>
</html>
