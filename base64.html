<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 인코더/디코더</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); }
        textarea { width: 100%; min-height: 100px; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1rem; margin-bottom: 15px; }
        .btn { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; word-break: break-all; min-height: 60px; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">🔐 Base64 인코더/디코더</h1>
        <h1 class="en">🔐 Base64 Encoder/Decoder</h1>
        
        <textarea id="input" placeholder="Enter text... / 텍스트를 입력하세요..."></textarea>
        
        <button class="btn" onclick="encode()">Encode</button>
        <button class="btn" onclick="decode()">Decode</button>
        
        <div class="result" id="result"></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) { document.body.className = lang; localStorage.setItem('util-lang', lang); }
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function encode() {
            try { document.getElementById('result').textContent = btoa(document.getElementById('input').value); }
            catch(e) { document.getElementById('result').textContent = 'Error'; }
        }
        function decode() {
            try { document.getElementById('result').textContent = atob(document.getElementById('input').value); }
            catch(e) { document.getElementById('result').textContent = 'Error'; }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
