<div class="space-y-4">
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">텍스트 입력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Enter text</span>
<textarea id="inputText" rows="5" placeholder='Paste or type your text here...'></textarea></div>
<div class="btn-grid" id="caseButtons">
<button class="btn-case" data-case="camel">camelCase</button>
<button class="btn-case" data-case="pascal">PascalCase</button>
<button class="btn-case" data-case="snake">snake_case</button>
<button class="btn-case" data-case="kebab">kebab-case</button>
<button class="btn-case" data-case="upper">UPPER</button>
<button class="btn-case" data-case="lower">lower</button>

<button class="btn-case" data-case="constant">CONSTANT_CASE</button>
</div>
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">결과</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Result</span>
<div class="relative">
<textarea id="outputText" rows="5" readonly></textarea>
<button id="copyBtn" class="absolute top-2 right-2 bg-primary text-white text-xs px-2 py-1 rounded hover:bg-blue-700 transition"><span class="lang-ko">복사</span><span class="lang-en">Copy</span></button>
</div></div></div>
<script>
var input=document.getElementById('inputText');
var output=document.getElementById('outputText');
document.querySelectorAll('.btn-case').forEach(function(b){
b.addEventListener('click',function(){
var t=input.value;var c=this.dataset.case;var r='';
switch(c){
case'camel':r=t.replace(/[^a-zA-Z0-9]+(.)/g,function(_,c){return c.toUpperCase()}).replace(/^[A-Z]/,function(m){return m.toLowerCase()}).replace(/[^a-zA-Z0-9]/g,'');break;
case'pascal':r=t.replace(/[^a-zA-Z0-9]+(.)/g,function(_,c){return c.toUpperCase()}).replace(/^./,function(m){return m.toUpperCase()}).replace(/[^a-zA-Z0-9]/g,'');break;
case'snake':r=t.replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase();break;
case'kebab':r=t.replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'').toLowerCase();break;
case'upper':r=t.toUpperCase();break;
case'lower':r=t.toLowerCase();break;
case'title':r=t.replace(/\w+/g,function(m){return m[0].toUpperCase()+m.slice(1).toLowerCase()});break;
case'constant':r=t.replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toUpperCase();break;
}
output.value=r;
});
});
document.getElementById('copyBtn').addEventListener('click',function(){output.select();navigator.clipboard.writeText(output.value);});
</script>
