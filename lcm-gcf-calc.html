<body><div class="max-w-md mx-auto space-y-4"><div id="lcmInputs" class="space-y-2"><div class="flex gap-2"><input type="number" value="12" class="lcmNum flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><input type="number" value="18" class="lcmNum flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div></div><button onclick="addLcmInput()" class="text-sm text-primary hover:underline"><span class="lang-ko">+ 숫자 추가</span><span class="lang-en">+ Add number</span></button><button onclick="calcLcmGcf()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium mt-2"><span class="lang-ko">계산</span><span class="lang-en">Calculate</span></button><div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 space-y-2"><div class="text-lg font-bold"><span class="lang-ko">LCM (최소공배수): </span><span class="lang-en">LCM: </span><span id="lcmAnswer">36</span></div><div class="text-lg font-bold"><span class="lang-ko">GCF (최대공약수): </span><span class="lang-en">GCF: </span><span id="gcfAnswer">6</span></div><div id="lcmFactors" class="text-sm text-slate-500 dark:text-slate-300">12 = 2^2 * 3<br>18 = 2 * 3^2</div></div></div><script>function addLcmInput(){var d=document.createElement("div");d.className="flex gap-2";d.innerHTML='<input type="number" class="lcmNum flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><button onclick="this.parentElement.remove()" class="px-3 rounded-xl bg-red-100 dark:bg-red-900 text-red-600">&times;</button>';document.getElementById("lcmInputs").appendChild(d)}function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t}return a}function calcLcmGcf(){var nums=[];document.querySelectorAll(".lcmNum").forEach(function(el){var v=parseInt(el.value);if(v>0)nums.push(v)});if(nums.length<2)return;var g=nums.reduce(function(a,b){return gcd(a,b)});var l=nums.reduce(function(a,b){return a*b/gcd(a,b)});document.getElementById("lcmAnswer").textContent=l;document.getElementById("gcfAnswer").textContent=g;var fhtml="";nums.forEach(function(n){var t=n;var factors={};var d=2;while(d*d<=t){while(t%d==0){factors[d]=(factors[d]||0)+1;t/=d}d++}if(t>1)factors[t]=(factors[t]||0)+1;var parts=[];for(var p in factors)parts.push(p+(factors[p]>1?"^"+factors[p]:""));fhtml+=n+" = "+parts.join(" * ")+"<br>"});document.getElementById("lcmFactors").innerHTML=fhtml}</script></body>
