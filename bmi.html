<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 계산기 - BMI Calculator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; }
        .card h2 { margin-bottom: 20px; color: var(--text-muted); }
        input { width: 100%; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1.2rem; margin-bottom: 15px; text-align: center; }
        .result { padding: 25px; background: var(--input-bg); border-radius: 15px; margin-top: 20px; }
        .bmi-num { font-size: 3rem; color: var(--accent); font-weight: bold; }
        .bmi-status { font-size: 1.2rem; margin-top: 10px; padding: 10px; border-radius: 10px; }
        .status-under { background: #3498db; }
        .status-normal { background: #27ae60; }
        .status-over { background: #f39c12; }
        .status-obese { background: #e74c3c; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">⚖️ BMI 계산기</h1>
        <h1 class="en">⚖️ BMI Calculator</h1>
        
        <div class="card">
            <h2 class="ko">신장 (cm) / 체중 (kg)</h2>
            <h2 class="en">Height (cm) / Weight (kg)</h2>
            <input type="number" id="height" oninput="calcBMI()" placeholder="신장 (cm)">
            <input type="number" id="weight" oninput="calcBMI()" placeholder="체중 (kg)">
            
            <div class="result">
                <div class="bmi-num" id="bmi">-</div>
                <div class="bmi-status" id="status">-</div>
            </div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) { document.body.className = lang; localStorage.setItem('util-lang', lang); }
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function calcBMI() {
            const h = parseFloat(document.getElementById('height').value) / 100;
            const w = parseFloat(document.getElementById('weight').value);
            const bmiEl = document.getElementById('bmi');
            const statusEl = document.getElementById('status');
            
            if (!h || !w) { bmiEl.textContent = '-'; statusEl.textContent = '-'; statusEl.className = 'bmi-status'; return; }
            
            const bmi = (w / (h * h)).toFixed(1);
            bmiEl.textContent = bmi;
            
            let status = '';
            let cls = '';
            if (bmi < 18.5) { status = document.body.classList.contains('en') ? 'Underweight' : '저체중'; cls = 'status-under'; }
            else if (bmi < 25) { status = document.body.classList.contains('en') ? 'Normal' : '정상'; cls = 'status-normal'; }
            else if (bmi < 30) { status = document.body.classList.contains('en') ? 'Overweight' : '과체중'; cls = 'status-over'; }
            else { status = document.body.classList.contains('en') ? 'Obese' : '비만'; cls = 'status-obese'; }
            
            statusEl.textContent = status;
            statusEl.className = 'bmi-status ' + cls;
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
