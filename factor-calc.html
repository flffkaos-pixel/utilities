<body><div class="max-w-md mx-auto space-y-4"><div><label class="block text-sm font-medium mb-1"><span class="lang-ko">숫자</span><span class="lang-en">Number</span></label><input id="factNum" type="number" value="72" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><button onclick="findFactors()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium"><span class="lang-ko">찾기</span><span class="lang-en">Find</span></button><div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 space-y-3"><div><span class="font-medium">Factors: </span><span id="factAll">1, 2, 3, 4, 6, 8, 9, 12, 18, 24, 36, 72</span></div><div><span class="font-medium">Pairs: </span><span id="factPairs">(1,72) (2,36) (3,24) (4,18) (6,12) (8,9)</span></div><div><span class="font-medium">Prime: </span><span id="factPrime">2^3 * 3^2</span></div></div></div><script>function findFactors(){var n=parseInt(document.getElementById("factNum").value)||0;var all=[];var pairs=[];for(var i=1;i<=Math.sqrt(n);i++){if(n%i==0){all.push(i);var j=n/i;all.push(j);pairs.push("("+i+","+j+")")}}all.sort(function(a,b){return a-b});document.getElementById("factAll").textContent=all.join(", ");document.getElementById("factPairs").textContent=pairs.join(" ");var t=n;var factors={};var d=2;while(d*d<=t){while(t%d==0){factors[d]=(factors[d]||0)+1;t/=d}d++}if(t>1)factors[t]=(factors[t]||0)+1;var parts=[];for(var p in factors)parts.push(p+(factors[p]>1?"^"+factors[p]:""));document.getElementById("factPrime").textContent=parts.join(" * ")}</script></body>
