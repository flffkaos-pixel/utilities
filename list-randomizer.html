  <a href="index.html" class="inline-flex items-center gap-1 text-sm text-on-surface-variant hover:text-primary mb-4 transition-colors">

        <h1><span class="lang-ko">랜덤 추첨기</span><span class="lang-en">Random Picker</span></h1>
        <p><span class="lang-ko">목록을 섞거나 랜덤으로 항목을 뽑으세요. 추첨, 팀 나누기, 경품 추첨에 유용합니다.</span><span class="lang-en">Shuffle lists or pick random items. Perfect for raffles, team assignments, and giveaways.</span></p>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-on-surface mb-2"><span class="lang-ko">항목 입력</span><span class="lang-en">Enter Items</span></label>
        <textarea id="itemList" class="w-full p-4 bg-surface-container-low rounded-xl border border-outline-variant/20 focus:ring-2 focus:ring-primary focus:bg-white transition-all text-body-md font-body-md resize-y" rows="8" placeholder="Enter one item per line...">Alice&#10;Bob&#10;Charlie&#10;Diana&#10;Eve</textarea>
        <div class="flex flex-wrap gap-2 mt-3">
          <button onclick="shuffleList()" class="btn-primary text-sm"><span class="material-symbols-outlined text-[18px]">shuffle</span> <span class="lang-ko">섞기</span><span class="lang-en">Shuffle</span></button>
          <button onclick="pickOne()" class="btn-primary text-sm" style="background:#883700"><span class="material-symbols-outlined text-[18px]">casino</span> <span class="lang-ko">1개 뽑기</span><span class="lang-en">Pick One</span></button>
          <button onclick="pickMultiple()" class="btn-secondary text-sm"><span class="material-symbols-outlined text-[18px]">filter_none</span> <span class="lang-ko">여러개 뽑기</span><span class="lang-en">Pick Multi</span></button>
          <button onclick="resetList()" class="btn-secondary text-sm"><span class="material-symbols-outlined text-[18px]">refresh</span> <span class="lang-ko">초기화</span><span class="lang-en">Reset</span></button>
        </div>

          <span class="text-sm text-on-surface-variant"><span class="lang-ko">뽑을 개수:</span><span class="lang-en">Pick count:</span></span>
          <input id="pickCount" type="number" min="1" value="2" class="w-20 p-2 bg-surface-container-low rounded-lg border border-outline-variant/20 text-center"/>

<script>
function getItems() {
  return document.getElementById('itemList').value.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
}
function showResult(items, isWinner) {
  var area = document.getElementById('resultArea');
  area.innerHTML = '';
  items.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'result-item' + (isWinner ? ' winner-item' : '');
    div.textContent = (i+1) + '. ' + item;
    if (isWinner && items.length === 1) {
      div.style.fontSize = '24px';
      div.style.textAlign = 'center';
      div.style.padding = '24px';
    }
    area.appendChild(div);
  });
}
function shuffleList() {
  var items = getItems();
  if (items.length < 2) return showResult(items, false);
  for (var i = items.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
  }
  showResult(items, false);
}
function pickOne() {
  var items = getItems();
  if (!items.length) return;
  var winner = items[Math.floor(Math.random() * items.length)];
  showResult([winner], true);
}
function pickMultiple() {
  document.getElementById('pickMultiControls').classList.toggle('hidden');
}
function doPickMultiple() {
  var items = getItems();
  var count = parseInt(document.getElementById('pickCount').value) || 1;
  if (count > items.length) count = items.length;
  var shuffled = items.slice();
  for (var i = shuffled.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
  }
  showResult(shuffled.slice(0, count), count === 1);
}
function resetList() {
  document.getElementById('itemList').value = '';
  showResult([], false);
}
</script>

  siteLang = siteLang === 'ko' ? 'en' : 'ko';

  document.body.classList.toggle('en', siteLang === 'en');
  var btn = document.getElementById('langToggle');

}

if (darkMode) document.documentElement.classList.add('dark');

  document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
  var dt = document.getElementById('darkToggle');
  if (dt) dt.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}
