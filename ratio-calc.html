<body><div class="max-w-md mx-auto space-y-4"><div><label class="block text-sm font-medium mb-1"><span class="lang-ko">모드</span><span class="lang-en">Mode</span></label><select id="ratioMode" onchange="updateRatioMode()" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><option value="simplify"><span class="lang-ko">비율 간단히 하기</span><span class="lang-en">Simplify Ratio</span></option><option value="find"><span class="lang-ko">미지값 찾기 (a:b = c:d)</span><span class="lang-en">Find Missing (a:b = c:d)</span></option></select></div><div id="ratioSimplify"><div class="flex gap-3 items-center"><input id="ratA" type="number" value="12" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><span class="text-xl font-bold">:</span><input id="ratB" type="number" value="18" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div></div><div id="ratioFind" class="hidden"><div class="flex gap-3 items-center"><input id="ratC" type="number" value="2" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><span class="text-xl font-bold">:</span><input id="ratD" type="number" value="3" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div class="text-center text-lg font-bold my-2">=</div><div class="flex gap-3 items-center"><input id="ratE" type="number" value="" placeholder="?" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><span class="text-xl font-bold">:</span><input id="ratF" type="number" value="9" class="flex-1 p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><p class="text-xs text-slate-500 mt-1"><span class="lang-ko">빈 칸에 ?를 찾을 값을 입력하세요</span><span class="lang-en">Leave blank the value to find</span></p></div><button onclick="calcRatio()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium mt-2"><span class="lang-ko">계산</span><span class="lang-en">Calculate</span></button><div id="ratioResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 text-center text-lg font-bold"></div></div><script>function updateRatioMode(){var m=document.getElementById("ratioMode").value;document.getElementById("ratioSimplify").classList.toggle("hidden",m!="simplify");document.getElementById("ratioFind").classList.toggle("hidden",m!="find")}function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t}return a}function calcRatio(){var mode=document.getElementById("ratioMode").value;var el=document.getElementById("ratioResult");if(mode=="simplify"){var a=parseInt(document.getElementById("ratA").value)||0;var b=parseInt(document.getElementById("ratB").value)||0;var g=gcd(a,b);el.innerHTML=(a/g)+" : "+(b/g)}else{var c=parseFloat(document.getElementById("ratC").value);var d=parseFloat(document.getElementById("ratD").value);var e=parseFloat(document.getElementById("ratE").value);var f=parseFloat(document.getElementById("ratF").value);if(isNaN(c)&&!isNaN(d)&&!isNaN(e)&&!isNaN(f)){el.innerHTML="a = "+(d*e/f)}else if(isNaN(d)&&!isNaN(c)&&!isNaN(e)&&!isNaN(f)){el.innerHTML="b = "+(c*f/e)}else if(isNaN(e)&&!isNaN(c)&&!isNaN(d)&&!isNaN(f)){el.innerHTML="c = "+(c*f/d)}else if(isNaN(f)&&!isNaN(c)&&!isNaN(d)&&!isNaN(e)){el.innerHTML="d = "+(d*e/c)}else el.innerHTML="<span class=\"text-red-500\">"+("Leave exactly one field empty"||"Leave exactly one field empty")+"</span>"}}</script></body>
</html>
