          </button>

        <span><span class="lang-ko">단어</span><span class="lang-en">Words</span>: <span id="wordCount">0</span></span>

<script>
var KEY = 'freeutil_notepad';
var ta = document.getElementById('notepad');
var saved = localStorage.getItem(KEY);
if (saved) ta.value = saved;
updateStats();
var saveTimer;
ta.addEventListener('input', function() {
  clearTimeout(saveTimer);
  document.getElementById('saveStatus').textContent = '...';
  saveTimer = setTimeout(function() {
    localStorage.setItem(KEY, ta.value);
    document.getElementById('saveStatus').textContent = '\u2713';
  }, 500);
  updateStats();
});
function updateStats() {
  var t = ta.value;
  document.getElementById('charCount').textContent = t.length;
  document.getElementById('wordCount').textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('lineCount').textContent = t.split('\n').length;
}
function clearNote() {
  if (confirm(lang === 'ko' ? '메모를 삭제하시겠습니까?' : 'Delete this note?')) {
    ta.value = '';
    localStorage.removeItem(KEY);
    updateStats();
    ta.focus();
  }
}
function downloadNote() {
  var blob = new Blob([ta.value], {type:'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'note_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}
</script>

<script>
var siteLang = localStorage.getItem('site-lang') || 'ko';
document.body.classList.toggle('en', siteLang === 'en');
(function() {
  var btn = document.getElementById('langToggle');
  if (btn) btn.textContent = siteLang === 'ko' ? 'English' : '한국어';
})();
function toggleLang() {
  siteLang = siteLang === 'ko' ? 'en' : 'ko';
  localStorage.setItem('site-lang', siteLang);
  document.body.classList.toggle('en', siteLang === 'en');
  var btn = document.getElementById('langToggle');
  if (btn) btn.textContent = siteLang === 'ko' ? 'English' : '한국어';
}
var darkMode = localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
if (darkMode) document.documentElement.classList.add('dark');
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
  var dt = document.getElementById('darkToggle');
  if (dt) dt.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'HangulMode' || e.keyCode === 229) {
    e.preventDefault();
    toggleLang();
  }
});
</script>
