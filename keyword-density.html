<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>

<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">키워드 밀도</span><span class="lang-en">Keyword Density</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">텍스트의 키워드 밀도를 분석하여 SEO를 최적화합니다.</span><span class="lang-en">Analyze keyword density for SEO optimization.</span></p>
<textarea id="kdi" class="w-full h-32 px-4 py-3 border border-border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 mb-4" placeholder="<span class="lang-ko">분석할 텍스트를 붙여넣으세요</span><span class="lang-en">Paste text to analyze</span>" oninput="kda()"></textarea><div id="kdr" class="space-y-1"></div>
</div>

<script>
function kda(){var t=document.getElementById("kdi").value;var w=t.toLowerCase().split(/\s+/).filter(Boolean);var n=w.length;var f={};w.forEach(function(x){f[x]=(f[x]||0)+1;});var s=Object.entries(f).sort(function(a,b){return b[1]-a[1];}).slice(0,20);var h="Total: "+n+" words\n";s.forEach(function(x){var p=(x[1]/n*100).toFixed(1);h+=x[0]+": "+x[1]+" ("+p+"%)\n";});document.getElementById("kdr").textContent=h;}
</script>
</main>

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";

if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
