<div class="space-y-4">
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">원시 HTTP 헤더 입력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Raw HTTP headers</span>
<textarea id="htInput" class="ht-textarea" rows="6" placeholder='Content-Type: application/json&#10;Cache-Control: no-cache'></textarea></div>
<button id="htParse" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">파싱</span><span class="lang-en">Parse</span></button>
<div id="htResult"></div></div>
<script>
var hds={
'content-type':'<span class="lang-ko">리소스의 미디어 타입을 지정합니다.</span><span class="lang-en">Specifies the media type of the resource.</span>',
'cache-control':'<span class="lang-ko">캐싱 동작을 제어합니다.</span><span class="lang-en">Controls caching behavior.</span>',
'authorization':'<span class="lang-ko">인증 자격 증명을 전송합니다.</span><span class="lang-en">Sends authentication credentials.</span>',
'accept':'<span class="lang-ko">클라이언트가 허용하는 미디어 타입.</span><span class="lang-en">Media types the client accepts.</span>',
'user-agent':'<span class="lang-ko">클라이언트 애플리케이션 정보.</span><span class="lang-en">Client application information.</span>',
'host':'<span class="lang-ko">요청 대상 서버의 호스트명과 포트.</span><span class="lang-en">Target server hostname and port.</span>',
'origin':'<span class="lang-ko">요청의 출처를 나타냅니다 (CORS).</span><span class="lang-en">Indicates request origin (CORS).</span>',
'referer':'<span class="lang-ko">이전 페이지의 주소.</span><span class="lang-en">Address of the previous page.</span>',
'cookie':'<span class="lang-ko">이전에 저장된 쿠키를 전송합니다.</span><span class="lang-en">Sends previously stored cookies.</span>',
'set-cookie':'<span class="lang-ko">클라이언트에 쿠키를 저장하도록 합니다.</span><span class="lang-en">Instructs client to store cookies.</span>',
'content-length':'<span class="lang-ko">응답 본문의 길이를 바이트 단위로.</span><span class="lang-en">Length of response body in bytes.</span>',
'location':'<span class="lang-ko">리다이렉션 대상 URL.</span><span class="lang-en">Redirection target URL.</span>',
'etag':'<span class="lang-ko">리소스 버전 식별자.</span><span class="lang-en">Resource version identifier.</span>',
'x-forwarded-for':'<span class="lang-ko">프록시를 통한 원래 클라이언트 IP.</span><span class="lang-en">Original client IP behind proxies.</span>',
'content-disposition':'<span class="lang-ko">콘텐츠 표시 방식을 지정합니다.</span><span class="lang-en">Specifies content display disposition.</span>',
'x-requested-with':'<span class="lang-ko">Ajax 요청 식별에 사용됩니다.</span><span class="lang-en">Used to identify Ajax requests.</span>',
'access-control-allow-origin':'<span class="lang-ko">CORS에서 허용된 출처를 지정.</span><span class="lang-en">Specifies allowed CORS origin.</span>',
'content-encoding':'<span class="lang-ko">응답 본문의 인코딩 방식.</span><span class="lang-en">Response body encoding method.</span>',
'vary':'<span class="lang-ko">캐시 키에 포함될 헤더를 지정.</span><span class="lang-en">Specifies headers for cache key.</span>',
'last-modified':'<span class="lang-ko">리소스의 마지막 수정 일시.</span><span class="lang-en">Last modification timestamp.</span>'
};
document.getElementById('htParse').addEventListener('click',function(){
var raw=document.getElementById('htInput').value;var lines=raw.split('\n').filter(function(l){return l.trim()!==''});
var html='<table><thead><tr><th>Header</th><th>Value</th><th><span class="lang-ko">설명</span><span class="lang-en">Description</span></th></tr></thead><tbody>';
lines.forEach(function(l){var idx=l.indexOf(':');if(idx===-1){html+='<tr><td colspan="3" class="unknown">Invalid: '+l+'</td></tr>';return}var k=l.substring(0,idx).trim();var v=l.substring(idx+1).trim();var klass=hds[k.toLowerCase()]?'known':'unknown';var desc=hds[k.toLowerCase()]||'<span class="lang-ko">알 수 없는 헤더</span><span class="lang-en">Unknown header</span>';html+='<tr class="'+klass+'"><td>'+k+'</td><td style="word-break:break-all">'+v+'</td><td>'+desc+'</td></tr>'});
html+='</tbody></table>';document.getElementById('htResult').innerHTML=html});
</script>
