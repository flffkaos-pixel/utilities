<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8">
<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">바코드 생성기 - Code 128, EAN-13, UPC-A</span><span class="lang-en">Barcode Generator - Code 128, EAN-13, UPC-A</span></h1>

<div class="space-y-4">
<div class="flex flex-wrap gap-4">
<div><span class="lang-ko text-sm text-on-surface-variant block mb-1">데이터</span><span class="lang-en text-sm text-on-surface-variant block mb-1">Data</span>
<input id="bcData" class="bg-input" type="text" value="Hello123" placeholder="Enter barcode data"></div>
<div><span class="lang-ko text-sm text-on-surface-variant block mb-1">포맷</span><span class="lang-en text-sm text-on-surface-variant block mb-1">Format</span>
<select id="bcFormat" class="bg-input">
<option value="CODE128">Code 128</option>
<option value="EAN13">EAN-13</option>
<option value="UPCA">UPC-A</option>
<option value="CODE39">Code 39</option>
<option value="CODABAR">Codabar</option>
</select></div>
<div><span class="lang-ko text-sm text-on-surface-variant block mb-1">너비</span><span class="lang-en text-sm text-on-surface-variant block mb-1">Width</span>
<input id="bcWidth" class="bg-input" type="number" value="300" style="width:80px"></div>
<div><span class="lang-ko text-sm text-on-surface-variant block mb-1">높이</span><span class="lang-en text-sm text-on-surface-variant block mb-1">Height</span>
<input id="bcHeight" class="bg-input" type="number" value="80" style="width:80px"></div>
<div class="flex items-end pb-1"><label class="text-sm text-on-surface-variant"><input type="checkbox" id="bcText" checked> <span class="lang-ko">텍스트 표시</span><span class="lang-en">Show text</span></label></div></div>
<button id="bcGenerate" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">생성</span><span class="lang-en">Generate</span></button>
<div id="bcResult" class="flex justify-center p-4 bg-surface2 rounded-xl min-h-[120px] items-center"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script>
document.getElementById('bcGenerate').addEventListener('click',function(){
var data=document.getElementById('bcData').value||' ';var fmt=document.getElementById('bcFormat').value;
var w=parseInt(document.getElementById('bcWidth').value)||300;var h=parseInt(document.getElementById('bcHeight').value)||80;
var showText=document.getElementById('bcText').checked;
var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.id='barcode-svg';
document.getElementById('bcResult').innerHTML='';document.getElementById('bcResult').appendChild(svg);
try{JsBarcode('#barcode-svg',data,{format:fmt,width:w/300*2,height:h,displayValue:showText,fontSize:16,margin:5})}catch(e){document.getElementById('bcResult').innerHTML='<span class="text-red-500 text-sm">Error: '+e.message+'</span>'}
});
</script>
</div>
