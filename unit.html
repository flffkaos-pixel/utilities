<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단위 변환 - Unit Converter</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid varaccent; border-radius: 15px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .card h2 { font-size: 1rem; margin-bottom: 10px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; font-size: 1.1rem; text-align: center; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none; }
        body.lang-en .ko { display: none; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">📏 단위 변환</h1>
        <h1 class="en">📏 Unit Converter</h1>
        
        <div class="card">
            <h2 class="ko">길이 (Length)</h2>
            <h2 class="en">Length</h2>
            <input type="number" id="lenVal" oninput="convertLength()" placeholder="값 입력">
            <select id="lenType" onchange="convertLength()">
                <option value="km-mile">km ↔ mile</option>
                <option value="m-foot">m ↔ foot</option>
                <option value="cm-inch">cm ↔ inch</option>
                <option value="km-ft">km ↔ ft</option>
            </select>
            <div class="result" id="lenResult">-</div>
        </div>
        
        <div class="card">
            <h2 class="ko">무게 (Weight)</h2>
            <h2 class="en">Weight</h2>
            <input type="number" id="wgtVal" oninput="convertWeight()" placeholder="값 입력">
            <select id="wgtType" onchange="convertWeight()">
                <option value="kg-pound">kg ↔ pound</option>
                <option value="g-oz">g ↔ oz</option>
                <option value="kg-lb">kg ↔ lb</option>
            </select>
            <div class="result" id="wgtResult">-</div>
        </div>
        
        <div class="card">
            <h2 class="ko">온도 (Temperature)</h2>
            <h2 class="en">Temperature</h2>
            <input type="number" id="tempVal" oninput="convertTemp()" placeholder="값 입력">
            <select id="tempType" onchange="convertTemp()">
                <option value="c-f">°C ↔ °F</option>
                <option value="c-k">°C ↔ K</option>
            </select>
            <div class="result" id="tempResult">-</div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) { document.body.className = lang; localStorage.setItem('util-lang', lang); }
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function convertLength() {
            const val = parseFloat(document.getElementById('lenVal').value);
            const type = document.getElementById('lenType').value;
            if (isNaN(val)) { document.getElementById('lenResult').textContent = '-'; return; }
            let res = '';
            switch(type) {
                case 'km-mile': res = `${val} km = ${(val * 0.621371).toFixed(3)} mi`; break;
                case 'm-foot': res = `${val} m = ${(val * 3.28084).toFixed(3)} ft`; break;
                case 'cm-inch': res = `${val} cm = ${(val * 0.393701).toFixed(3)} in`; break;
                case 'km-ft': res = `${val} km = ${(val * 3280.84).toFixed(3)} ft`; break;
            }
            document.getElementById('lenResult').textContent = res;
        }
        
        function convertWeight() {
            const val = parseFloat(document.getElementById('wgtVal').value);
            const type = document.getElementById('wgtType').value;
            if (isNaN(val)) { document.getElementById('wgtResult').textContent = '-'; return; }
            let res = '';
            switch(type) {
                case 'kg-pound': res = `${val} kg = ${(val * 2.20462).toFixed(3)} lb`; break;
                case 'g-oz': res = `${val} g = ${(val * 0.035274).toFixed(3)} oz`; break;
                case 'kg-lb': res = `${val} kg = ${(val * 2.20462).toFixed(3)} lbs`; break;
            }
            document.getElementById('wgtResult').textContent = res;
        }
        
        function convertTemp() {
            const val = parseFloat(document.getElementById('tempVal').value);
            const type = document.getElementById('tempType').value;
            if (isNaN(val)) { document.getElementById('tempResult').textContent = '-'; return; }
            let res = '';
            switch(type) {
                case 'c-f': res = `${val}°C = ${(val * 9/5 + 32).toFixed(2)}°F`; break;
                case 'c-k': res = `${val}°C = ${(val + 273.15).toFixed(2)}K`; break;
            }
            document.getElementById('tempResult').textContent = res;
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
