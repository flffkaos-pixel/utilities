<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>단위 변환 - UtilityHub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {"primary":"#005bbf","surface":"#f7f9ff","on-surface":"#181c20","surface-container-low":"#f1f4fa","surface-container":"#ebeef4","surface-container-highest":"#dfe3e8","on-surface-variant":"#414754","secondary":"#006e2c","secondary-fixed":"#89fa9b","outline":"#727785"}, fontFamily: {"headline":["Plus Jakarta Sans"],"body":["Inter"]}}}};</script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface pb-24">
<header class="bg-[#f7f9ff] flex justify-between items-center px-4 h-16 w-full docked top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'" class="text-[#005bbf] hover:bg-[#dfe3e8] p-2 rounded-full">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf]">단위 변환</h1>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-6 space-y-6">
    <!-- 길이 -->
    <div class="p-4 bg-surface-container-low rounded-2xl">
        <h3 class="font-bold mb-3">길이</h3>
        <input type="number" id="len" oninput="convertLen()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none mb-2" placeholder="값 입력">
        <select id="lenType" onchange="convertLen()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none">
            <option value="km-mile">km ↔ mile</option>
            <option value="m-foot">m ↔ foot</option>
            <option value="cm-inch">cm ↔ inch</option>
        </select>
        <div id="lenResult" class="mt-3 p-3 bg-surface-container-lowest rounded-xl text-center font-bold"></div>
    </div>
    
    <!-- 무게 -->
    <div class="p-4 bg-surface-container-low rounded-2xl">
        <h3 class="font-bold mb-3">무게</h3>
        <input type="number" id="wgt" oninput="convertWgt()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none mb-2" placeholder="값 입력">
        <select id="wgtType" onchange="convertWgt()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none">
            <option value="kg-pound">kg ↔ pound</option>
            <option value="g-oz">g ↔ oz</option>
        </select>
        <div id="wgtResult" class="mt-3 p-3 bg-surface-container-lowest rounded-xl text-center font-bold"></div>
    </div>
    
    <!-- 온도 -->
    <div class="p-4 bg-surface-container-low rounded-2xl">
        <h3 class="font-bold mb-3">온도</h3>
        <input type="number" id="temp" oninput="convertTemp()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none mb-2" placeholder="값 입력">
        <select id="tempType" onchange="convertTemp()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none">
            <option value="c-f">°C ↔ °F</option>
        </select>
        <div id="tempResult" class="mt-3 p-3 bg-surface-container-lowest rounded-xl text-center font-bold"></div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-2 pb-safe bg-white/80 backdrop-blur-xl z-50 border-t border-[#c1c6d6]/20">
    <a class="flex flex-col items-center justify-center text-[#005bbf] px-5 py-1" href="index.html"><span class="material-symbols-outlined" data-icon="home">home</span><span class="text-[11px] font-semibold mt-1">홈</span></a>
    <a class="flex flex-col items-center justify-center text-[#44474e] px-5 py-1" href="category.html"><span class="material-symbols-outlined" data-icon="category">category</span><span class="text-[11px] font-semibold mt-1">카테고리</span></a>
    <a class="flex flex-col items-center justify-center text-[#44474e] px-5 py-1" href="history.html"><span class="material-symbols-outlined" data-icon="history">history</span><span class="text-[11px] font-semibold mt-1">기록</span></a>
    <a class="flex flex-col items-center justify-center text-[#44474e] px-5 py-1" href="profile.html"><span class="material-symbols-outlined" data-icon="person">person</span><span class="text-[11px] font-semibold mt-1">프로필</span></a>
</nav>

<script>
function convertLen() {
    let v = parseFloat(document.getElementById('len').value);
    let t = document.getElementById('lenType').value;
    if(isNaN(v)) { document.getElementById('lenResult').textContent = '-'; return; }
    let r = '';
    if(t=='km-mile') r = v + ' km = ' + (v*0.621371).toFixed(3) + ' mi';
    else if(t=='m-foot') r = v + ' m = ' + (v*3.28084).toFixed(3) + ' ft';
    else if(t=='cm-inch') r = v + ' cm = ' + (v*0.393701).toFixed(3) + ' in';
    document.getElementById('lenResult').textContent = r;
}
function convertWgt() {
    let v = parseFloat(document.getElementById('wgt').value);
    let t = document.getElementById('wgtType').value;
    if(isNaN(v)) { document.getElementById('wgtResult').textContent = '-'; return; }
    let r = '';
    if(t=='kg-pound') r = v + ' kg = ' + (v*2.20462).toFixed(3) + ' lb';
    else if(t=='g-oz') r = v + ' g = ' + (v*0.035274).toFixed(3) + ' oz';
    document.getElementById('wgtResult').textContent = r;
}
function convertTemp() {
    let v = parseFloat(document.getElementById('temp').value);
    if(isNaN(v)) { document.getElementById('tempResult').textContent = '-'; return; }
    document.getElementById('tempResult').textContent = v + '°C = ' + (v*9/5+32).toFixed(2) + '°F';
}
</script>
</body>
</html>
