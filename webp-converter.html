<input type="file" id="wci" accept="image/png,image/jpeg" class="mb-4" onchange="toWebP()"><div id="wcr" class="text-center text-sm text-slate-500"><span class="lang-ko">이미지를 선택하면 WebP로 변환됩니다.</span><span class="lang-en">Select an image to convert to WebP.</span></div>
</div>

<script>
function toWebP(){var f=document.getElementById("wci").files[0];if(!f)return;var img=new Image();img.onload=function(){var c=document.createElement("canvas");c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext("2d").drawImage(img,0,0);c.toBlob(function(b){var u=URL.createObjectURL(b);document.getElementById("wcr").innerHTML="<img src='"+u+"' class='max-w-full max-h-64 mx-auto rounded-lg'><br><span class='text-sm text-slate-500'>"+(b.size/1024).toFixed(1)+" KB</span><br><a href='"+u+"' download='converted.webp' class='text-primary underline'>Download WebP</a>";},"image/webp",0.9);};img.src=URL.createObjectURL(f);}
</script>
