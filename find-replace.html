</header><main class="max-w-5xl mx-auto px-4 py-6">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8">
<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">찾기/바꾸기 - 텍스트 검색 및 치환</span><span class="lang-en">Find & Replace - Text Search and Replace</span></h1>

<div class="space-y-4">
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">텍스트 입력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Input text</span>
<textarea id="frInput" class="fr-textarea" rows="6" placeholder='Paste text here...'></textarea></div>
<div class="flex flex-wrap gap-3 items-start">
<div class="flex-1 min-w-[160px]"><span class="lang-ko text-sm text-on-surface-variant mb-1 block">찾기</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Find</span>
<input id="frFind" class="fr-input" type="text" placeholder='search term or regex'></div>
<div class="flex-1 min-w-[160px]"><span class="lang-ko text-sm text-on-surface-variant mb-1 block">바꾸기</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Replace with</span>
<input id="frReplace" class="fr-input" type="text" placeholder='replacement'></div></div>
<div class="flex flex-wrap gap-3 items-center text-sm">
<label><input type="checkbox" id="frCase"> <span class="lang-ko">대소문자 구분</span><span class="lang-en">Case sensitive</span></label>
<label><input type="checkbox" id="frRegex"> <span class="lang-ko">정규식</span><span class="lang-en">Regex</span></label>
<button id="frReplaceBtn" class="bg-primary text-white px-4 py-1.5 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">바꾸기</span><span class="lang-en">Replace</span></button>
<button id="frReplaceAllBtn" class="border border-primary text-primary px-4 py-1.5 rounded-lg text-sm hover:bg-primary hover:text-white transition"><span class="lang-ko">모두 바꾸기</span><span class="lang-en">Replace All</span></button>
<button id="frCountBtn" class="border border-outline/40 px-3 py-1.5 rounded-lg text-sm hover:bg-surface2 transition"><span class="lang-ko">개수 세기</span><span class="lang-en">Count</span></button></div>
<div id="frCount" class="text-sm text-on-surface-variant"></div>
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">결과 (<span id="frMatchCount">0</span>개 일치)</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Result (<span id="frMatchCountEn">0</span> matches)</span>
<div class="relative"><textarea id="frOutput" class="fr-textarea" rows="6" readonly></textarea>
<button id="frCopy" class="absolute top-2 right-2 bg-primary text-white text-xs px-2 py-1 rounded hover:bg-blue-700 transition"><span class="lang-ko">복사</span><span class="lang-en">Copy</span></button></div></div></div>
<script>
var inp=document.getElementById('frInput'),fnd=document.getElementById('frFind'),rpl=document.getElementById('frReplace');
var cas=document.getElementById('frCase'),rgx=document.getElementById('frRegex');
var out=document.getElementById('frOutput'),cnt=document.getElementById('frCount'),mc=document.getElementById('frMatchCount'),mce=document.getElementById('frMatchCountEn');
function doReplace(all){var t=inp.value;var s=fnd.value;if(!s){out.value=t;return}var flags='g'+(cas.checked?'':'i');var re;try{re=rgx.checked?new RegExp(s,flags):new RegExp(s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags)}catch(e){out.value='Invalid regex';return}var matches=t.match(re);if(matches){mc.textContent=matches.length;mce.textContent=matches.length}else{mc.textContent='0';mce.textContent='0'}out.value=all?t.replace(re,rpl.value):t.replace(re,rpl.value)}
function countMatches(){var t=inp.value;var s=fnd.value;if(!s){mc.textContent='0';mce.textContent='0';return}var flags='g'+(cas.checked?'':'i');var re;try{re=rgx.checked?new RegExp(s,flags):new RegExp(s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags)}catch(e){return}var m=t.match(re);mc.textContent=m?m.length:'0';mce.textContent=m?m.length:'0'}
document.getElementById('frReplaceBtn').addEventListener('click',function(){doReplace(false)});
document.getElementById('frReplaceAllBtn').addEventListener('click',function(){doReplace(true)});
document.getElementById('frCountBtn').addEventListener('click',countMatches);
document.getElementById('frCopy').addEventListener('click',function(){out.select();navigator.clipboard.writeText(out.value)});
</script>
</div>

</script>
