<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT 디코더 - JWT Decoder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%230071e3' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%230071e3'/></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #000000; --surface: #1d1d1f; --surface-raised: #272729; --text-primary: #f5f5f7; --text-secondary: rgba(245,245,247,0.7); --accent: #0071e3; --link: #2997ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(29,29,31,0.72); backdrop-filter: blur(20px); }
        .nav-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; padding: 0 22px; height: 48px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-size: 1.06rem; font-weight: 600; }
        .container { max-width: 680px; margin: 0 auto; padding: 32px 22px 60px; }
        .page-header { margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--link); text-decoration: none; font-size: 0.88rem; margin-bottom: 20px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 12px; }
        .description { background: var(--surface); border-radius: 12px; padding: 20px 24px; font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 28px; }
        input { width: 100%; padding: 14px 16px; background: var(--surface-raised); color: var(--text-primary); border: none; border-radius: 12px; font-size: 0.9rem; margin-bottom: 16px; font-family: monospace; }
        .btn { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 980px; cursor: pointer; font-size: 1rem; margin-bottom: 24px; }
        .result-section { margin-bottom: 20px; }
        .result-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .result { padding: 16px; background: var(--surface-raised); border-radius: 12px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
        .ads { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#0071e3" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#0071e3"/></svg><span>Utilities</span></a></div></nav>
    <div class="container">
        <div class="page-header"><a href="index.html" class="back-link">← Home</a><h1>JWT 디코더</h1></div>
        <div class="description">JWT 토큰을 디코딩합니다. (서명 검증은 하지 않습니다)</div>
        <input type="text" id="jwt" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c">
        <button class="btn" onclick="decodeJwt()">디코딩</button>
        <div class="result-section">
            <div class="result-label">Header:</div>
            <div class="result" id="header"></div>
        </div>
        <div class="result-section">
            <div class="result-label">Payload:</div>
            <div class="result" id="payload"></div>
        </div>
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <script>
        function decodeJwt() {
            try {
                const token = document.getElementById('jwt').value.trim();
                const parts = token.split('.');
                if (parts.length !== 3) { document.getElementById('header').textContent = '유효하지 않은 JWT 형식'; document.getElementById('payload').textContent = ''; return; }
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                document.getElementById('header').textContent = JSON.stringify(header, null, 2);
                document.getElementById('payload').textContent = JSON.stringify(payload, null, 2);
            } catch(e) { document.getElementById('header').textContent = '오류: ' + e.message; document.getElementById('payload').textContent = ''; }
        }
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
