<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT 디코더 - JWT Decoder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        input { width: 100%; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 0.9rem; font-family: monospace; margin-bottom: 15px; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-bottom: 20px; }
        .result-section { margin-bottom: 15px; }
        .result-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔐 JWT 디코더</span>
            <span class="en">🔐 JWT Decoder</span>
        </h1>
        
        <div class="description">
            <span class="ko">JWT 토큰을 디코딩합니다. (서명 검증은 하지 않습니다)</span>
            <span class="en">Decode JWT token. (Does not verify signature)</span>
        </div>
        
        <input type="text" id="jwt" placeholder="Enter JWT... / eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
        
        <button class="btn" onclick="decodeJwt()">
            <span class="ko">디코딩</span>
            <span class="en">Decode</span>
        </button>
        
        <div class="result-section">
            <div class="result-label">Header:</div>
            <div class="result" id="header"></div>
        </div>
        
        <div class="result-section">
            <div class="result-label">Payload:</div>
            <div class="result" id="payload"></div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function decodeJwt() {
            try {
                const token = document.getElementById('jwt').value.trim();
                const parts = token.split('.');
                if (parts.length !== 3) {
                    document.getElementById('header').textContent = document.body.classList.contains('lang-ko') ? '유효하지 않은 JWT 형식' : 'Invalid JWT format';
                    document.getElementById('payload').textContent = '';
                    return;
                }
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                document.getElementById('header').textContent = JSON.stringify(header, null, 2);
                document.getElementById('payload').textContent = JSON.stringify(payload, null, 2);
            } catch(e) {
                document.getElementById('header').textContent = (document.body.classList.contains('lang-ko') ? '오류: ' : 'Error: ') + e.message;
                document.getElementById('payload').textContent = '';
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
