<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator - Free Online Tools</title>
    <meta name="description" content="Free online GPA calculator. Calculate your Grade Point Average. Support for 4.0, 4.3, 5.0, and 7.0 scales.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://flffkaos-pixel.github.io/utilities/gpa.html">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #0f0f23; --card-bg: #1a1a3e; --text: #eee; --accent: #00d4ff; --accent2: #ff6b9d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: var(--text); text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; padding: 8px 16px; background: var(--card-bg); border-radius: 8px; }
        .back:hover { background: var(--accent); color: #000; }
        h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; }
        
        .calculator { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        
        .scale-select { margin-bottom: 20px; }
        .scale-select label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        .scale-options { display: flex; gap: 10px; flex-wrap: wrap; }
        .scale-btn { padding: 10px 20px; background: #1a1a2e; border: 2px solid #333; border-radius: 10px; color: var(--text); cursor: pointer; transition: all 0.3s; }
        .scale-btn.active { border-color: var(--accent); background: var(--accent); color: #000; }
        
        .course-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
        .course-row input, .course-row select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 2px solid #333; background: #1a1a2e; color: #eee; font-size: 0.95rem; }
        .course-row input:focus, .course-row select:focus { outline: none; border-color: var(--accent); }
        .remove-btn { background: #ff6b6b; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        
        .add-btn { width: 100%; padding: 12px; background: transparent; border: 2px dashed #444; border-radius: 10px; color: #888; cursor: pointer; margin-bottom: 20px; transition: all 0.3s; }
        .add-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.3s; }
        .btn:hover { transform: scale(1.02); }
        
        .result { display: none; margin-top: 30px; text-align: center; padding: 30px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 20px; }
        .result.show { display: block; }
        .gpa-value { font-size: 4rem; font-weight: bold; color: #000; }
        .gpa-label { color: #333; font-size: 1.1rem; margin-bottom: 20px; }
        .grade-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .grade-item { background: rgba(0,0,0,0.1); padding: 15px; border-radius: 10px; }
        .grade-item-value { font-size: 1.5rem; font-weight: bold; color: #000; }
        .grade-item-label { color: #333; font-size: 0.85rem; }
        
        .grade-scale { background: #151530; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 0.85rem; color: #888; text-align: center; }
        
        .ads { margin-top: 30px; text-align: center; min-height: 100px; background: var(--card-bg); border-radius: 10px; padding: 20px; }
        .footer { text-align: center; margin-top: 50px; padding: 30px; color: #666; }
        .footer a { color: var(--accent); text-decoration: none; margin: 0 10px; }
        
        @media (max-width: 600px) {
            .course-row { grid-template-columns: 1fr 1fr; }
            .course-row:first-child { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Back to Home</a>
        
        <h1>GPA Calculator</h1>
        <p class="subtitle">Calculate your Grade Point Average</p>
        
        <div class="calculator">
            <div class="scale-select">
                <label>GPA Scale</label>
                <div class="scale-options">
                    <button class="scale-btn active" onclick="setScale(4.0)" id="scale4">4.0</button>
                    <button class="scale-btn" onclick="setScale(4.3)" id="scale43">4.3</button>
                    <button class="scale-btn" onclick="setScale(5.0)" id="scale5">5.0</button>
                    <button class="scale-btn" onclick="setScale(7.0)" id="scale7">7.0</button>
                </div>
            </div>
            
            <div id="courses">
                <div class="course-row">
                    <input type="text" placeholder="Course Name" value="Course 1">
                    <input type="number" placeholder="Credits" value="3" min="1" max="10" class="credits">
                    <select class="grade">
                        <option value="4.0">A</option>
                        <option value="3.7">A-</option>
                        <option value="3.3">B+</option>
                        <option value="3.0">B</option>
                        <option value="2.7">B-</option>
                        <option value="2.3">C+</option>
                        <option value="2.0">C</option>
                        <option value="1.7">C-</option>
                        <option value="1.3">D+</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                    <button class="remove-btn" onclick="removeCourse(this)">×</button>
                </div>
                <div class="course-row">
                    <input type="text" placeholder="Course Name" value="Course 2">
                    <input type="number" placeholder="Credits" value="3" min="1" max="10" class="credits">
                    <select class="grade">
                        <option value="4.0">A</option>
                        <option value="3.7">A-</option>
                        <option value="3.3">B+</option>
                        <option value="3.0">B</option>
                        <option value="2.7">B-</option>
                        <option value="2.3">C+</option>
                        <option value="2.0">C</option>
                        <option value="1.7">C-</option>
                        <option value="1.3">D+</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                    <button class="remove-btn" onclick="removeCourse(this)">×</button>
                </div>
                <div class="course-row">
                    <input type="text" placeholder="Course Name" value="Course 3">
                    <input type="number" placeholder="Credits" value="3" min="1" max="10" class="credits">
                    <select class="grade">
                        <option value="4.0">A</option>
                        <option value="3.7">A-</option>
                        <option value="3.3">B+</option>
                        <option value="3.0">B</option>
                        <option value="2.7">B-</option>
                        <option value="2.3">C+</option>
                        <option value="2.0">C</option>
                        <option value="1.7">C-</option>
                        <option value="1.3">D+</option>
                        <option value="1.0">D</option>
                        <option value="0.0">F</option>
                    </select>
                    <button class="remove-btn" onclick="removeCourse(this)">×</button>
                </div>
            </div>
            
            <button class="add-btn" onclick="addCourse()">+ Add Course</button>
            
            <button class="btn" onclick="calculateGPA()">Calculate GPA</button>
            
            <div class="result" id="result">
                <div class="gpa-value" id="gpaValue">0.00</div>
                <div class="gpa-label">Your GPA</div>
                <div class="grade-details">
                    <div class="grade-item">
                        <div class="grade-item-value" id="totalCredits">0</div>
                        <div class="grade-item-label">Total Credits</div>
                    </div>
                    <div class="grade-item">
                        <div class="grade-item-value" id="totalCourses">0</div>
                        <div class="grade-item-label">Courses</div>
                    </div>
                </div>
                <div class="grade-scale" id="gradeScale">A: 4.0 | B: 3.0 | C: 2.0 | D: 1.0 | F: 0.0</div>
            </div>
        </div>
        
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
        
        <div class="footer">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    
    <script>
        let currentScale = 4.0;
        let courseCount = 3;
        
        function setScale(scale) {
            currentScale = scale;
            document.querySelectorAll('.scale-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('scale' + scale.toString().replace('.','')).classList.add('active');
            
            const grades = document.querySelectorAll('.grade');
            grades.forEach(select => {
                select.innerHTML = '';
                let gradeValues;
                if (scale === 4.0 || scale === 4.3) {
                    gradeValues = [['A', scale], ['A-', scale - 0.3], ['B+', scale === 4.3 ? 3.3 : 3.3], ['B', 3.0], ['B-', 2.7], ['C+', 2.3], ['C', 2.0], ['C-', 1.7], ['D+', 1.3], ['D', 1.0], ['F', 0.0]];
                } else if (scale === 5.0) {
                    gradeValues = [['A', 5.0], ['A-', 4.5], ['B+', 4.0], ['B', 3.5], ['B-', 3.0], ['C+', 2.5], ['C', 2.0], ['C-', 1.5], ['D+', 1.0], ['D', 0.5], ['F', 0.0]];
                } else {
                    gradeValues = [['A', 7.0], ['A-', 6.3], ['B+', 6.0], ['B', 5.0], ['B-', 4.3], ['C+', 4.0], ['C', 3.0], ['C-', 2.3], ['D+', 2.0], ['D', 1.0], ['F', 0.0]];
                }
                gradeValues.forEach(([grade, value]) => {
                    select.innerHTML += `<option value="${value}">${grade}</option>`;
                });
            });
            
            const scaleText = scale === 4.0 ? 'A: 4.0 | B: 3.0 | C: 2.0 | D: 1.0 | F: 0.0' :
                            scale === 4.3 ? 'A: 4.3 | A-: 3.7 | B+: 3.3 | B: 3.0 | C: 2.0 | D: 1.0 | F: 0.0' :
                            scale === 5.0 ? 'A: 5.0 | B: 3.5 | C: 2.0 | D: 0.5 | F: 0.0' :
                            'A: 7.0 | B: 5.0 | C: 3.0 | D: 1.0 | F: 0.0';
            document.getElementById('gradeScale').textContent = scaleText;
        }
        
        function addCourse() {
            courseCount++;
            const div = document.createElement('div');
            div.className = 'course-row';
            div.innerHTML = `
                <input type="text" placeholder="Course Name" value="Course ${courseCount}">
                <input type="number" placeholder="Credits" value="3" min="1" max="10" class="credits">
                <select class="grade">
                    <option value="4.0">A</option>
                    <option value="3.7">A-</option>
                    <option value="3.3">B+</option>
                    <option value="3.0">B</option>
                    <option value="2.7">B-</option>
                    <option value="2.3">C+</option>
                    <option value="2.0">C</option>
                    <option value="1.7">C-</option>
                    <option value="1.3">D+</option>
                    <option value="1.0">D</option>
                    <option value="0.0">F</option>
                </select>
                <button class="remove-btn" onclick="removeCourse(this)">×</button>
            `;
            document.getElementById('courses').appendChild(div);
        }
        
        function removeCourse(btn) {
            if (document.querySelectorAll('.course-row').length > 1) {
                btn.parentElement.remove();
            }
        }
        
        function calculateGPA() {
            const credits = document.querySelectorAll('.credits');
            const grades = document.querySelectorAll('.grade');
            
            let totalPoints = 0;
            let totalCredits = 0;
            
            credits.forEach((creditInput, i) => {
                const credit = parseFloat(creditInput.value) || 0;
                const grade = parseFloat(grades[i].value) || 0;
                totalPoints += credit * grade;
                totalCredits += credit;
            });
            
            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : '0.00';
            
            document.getElementById('gpaValue').textContent = gpa;
            document.getElementById('totalCredits').textContent = totalCredits;
            document.getElementById('totalCourses').textContent = credits.length;
            document.getElementById('result').classList.add('show');
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
