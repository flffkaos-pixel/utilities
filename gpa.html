<script>let currentScale = 4.0;
        let courseCount = 3;
        
        function setScale(scale) {
            currentScale = scale;
            document.querySelectorAll('.scale-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('scale' + scale.toString().replace('.','')).classList.add('active');
            
            const grades = document.querySelectorAll('.grade');
            grades.forEach(select => {
                select.innerHTML = '';
                let gradeValues;
                if (scale === 4.0 || scale === 4.3) {
                    gradeValues = [['A', scale], ['A-', scale - 0.3], ['B+', scale === 4.3 ? 3.3 : 3.3], ['B', 3.0], ['B-', 2.7], ['C+', 2.3], ['C', 2.0], ['C-', 1.7], ['D+', 1.3], ['D', 1.0], ['F', 0.0]];
                } else if (scale === 5.0) {
                    gradeValues = [['A', 5.0], ['A-', 4.5], ['B+', 4.0], ['B', 3.5], ['B-', 3.0], ['C+', 2.5], ['C', 2.0], ['C-', 1.5], ['D+', 1.0], ['D', 0.5], ['F', 0.0]];
                } else {
                    gradeValues = [['A', 7.0], ['A-', 6.3], ['B+', 6.0], ['B', 5.0], ['B-', 4.3], ['C+', 4.0], ['C', 3.0], ['C-', 2.3], ['D+', 2.0], ['D', 1.0], ['F', 0.0]];
                }
                gradeValues.forEach(([grade, value]) => {
                    select.innerHTML += `<option value="${value}">${grade}</option>`;
                });
            });
            
            const scaleText = scale === 4.0 ? 'A: 4.0 | B: 3.0 | C: 2.0 | D: 1.0 | F: 0.0' :
                            scale === 4.3 ? 'A: 4.3 | A-: 3.7 | B+: 3.3 | B: 3.0 | C: 2.0 | D: 1.0 | F: 0.0' :
                            scale === 5.0 ? 'A: 5.0 | B: 3.5 | C: 2.0 | D: 0.5 | F: 0.0' :
                            'A: 7.0 | B: 5.0 | C: 3.0 | D: 1.0 | F: 0.0';
            document.getElementById('gradeScale').textContent = scaleText;
        }
        
        function addCourse() {
            courseCount++;
            const div = document.createElement('div');
            div.className = 'course-row';
            div.innerHTML = `
                <input type="text" placeholder="Course Name" value="Course ${courseCount}">
                <input type="number" placeholder="Credits" value="3" min="1" max="10" class="credits">
                <select class="grade">
                    <option value="4.0">A</option>
                    <option value="3.7">A-</option>
                    <option value="3.3">B+</option>
                    <option value="3.0">B</option>
                    <option value="2.7">B-</option>
                    <option value="2.3">C+</option>
                    <option value="2.0">C</option>
                    <option value="1.7">C-</option>
                    <option value="1.3">D+</option>
                    <option value="1.0">D</option>
                    <option value="0.0">F</option>
                </select>
                <button class="remove-btn" onclick="removeCourse(this)">×</button>
            `;
            document.getElementById('courses').appendChild(div);
        }
        
        function removeCourse(btn) {
            if (document.querySelectorAll('.course-row').length > 1) {
                btn.parentElement.remove();
            }
        }
        
        function calculateGPA() {
            const credits = document.querySelectorAll('.credits');
            const grades = document.querySelectorAll('.grade');
            
            let totalPoints = 0;
            let totalCredits = 0;
            
            credits.forEach((creditInput, i) => {
                const credit = parseFloat(creditInput.value) || 0;
                const grade = parseFloat(grades[i].value) || 0;
                totalPoints += credit * grade;
                totalCredits += credit;
            });
            
            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : '0.00';
            
            document.getElementById('gpaValue').textContent = gpa;
            document.getElementById('totalCredits').textContent = totalCredits;
            document.getElementById('totalCourses').textContent = credits.length;
            document.getElementById('result').classList.add('show');
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});</script>
