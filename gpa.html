<style>
body{background:#f9fafb;font-family:system-ui,-apple-system,sans-serif}
.dark body{background:#0f172a}
.lang-ko{display:inline}
.lang-en{display:none}
body.en .lang-ko{display:none}
body.en .lang-en{display:inline}
</style>

<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">GPA 계산기</span><span class="lang-en">GPA Calculator</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">학점 GPA를 계산하는 무료 온라인 도구입니다.</span><span class="lang-en">Calculate your GPA from grades and credits.</span></p>
<p class="mb-4"><span class="lang-ko">과목별 학점과 학점을 입력하면 GPA가 계산됩니다.</span><span class="lang-en">Enter course grades and credits to calculate your GPA.</span></p><div id="grows" class="space-y-2 mb-4"><div class="flex gap-2"><input class="flex-1 px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-sm" placeholder="Course"><select class="w-24 px-2 py-2 border border-border rounded-lg bg-white dark:bg-slate-700"><option value="4.0">A+</option><option value="3.7">A0</option><option value="3.3">B+</option><option value="3.0">B0</option><option value="2.7">C+</option><option value="2.0">C0</option><option value="1.0">D</option><option value="0">F</option></select><input type="number" value="3" class="w-16 px-2 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center" placeholder="Cr"></div></div><button onclick="addRow()" class="px-3 py-1.5 border border-border rounded-lg text-sm hover:bg-slate-100 dark:hover:bg-slate-700 mb-4">+ <span class="lang-ko">과목 추가</span><span class="lang-en">Add Course</span></button><div class="p-4 bg-slate-100 dark:bg-slate-700 rounded-xl text-center"><div class="text-sm text-slate-500">GPA</div><div id="gpares" class="text-3xl font-bold text-primary">0.00</div></div></div><script>function addRow(){var d=document.getElementById("grows");var r=d.children[0].cloneNode(true);r.querySelectorAll("input").forEach(function(e){e.value="";});d.appendChild(r);calcGPA();}document.getElementById("grows").addEventListener("input",calcGPA);
</div>

<script>
function calcGPA(){var rows=document.getElementById("grows").children;var total=0,credits=0;Array.from(rows).forEach(function(r){var grade=parseFloat(r.querySelector("select").value)||0;var cr=parseFloat(r.querySelectorAll("input")[1].value)||0;total+=grade*cr;credits+=cr;});document.getElementById("gpares").textContent=credits?(total/credits).toFixed(2):"0.00";}calcGPA();
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-wrap items-center justify-between gap-3 text-sm">
<span class="font-bold">Free Utilities</span>

</nav>
<p class="text-slate-500 w-full">© 2026 Free Utilities</p>
</div>
</footer>
<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
</html>
