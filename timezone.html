<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">시간대 변환</span><span class="lang-en">Timezone Converter</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">다양한 시간대의 현재 시간을 한눈에 확인합니다.</span><span class="lang-en">View current time across different timezones.</span></p>
<div id="tzlist" class="space-y-2"><div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><span>Seoul (KST)</span><span id="tzseoul" class="font-mono font-bold text-primary"></span></div><div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><span>Tokyo (JST)</span><span id="tztokyo" class="font-mono font-bold"></span></div><div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><span>New York (EST)</span><span id="tzny" class="font-mono font-bold"></span></div><div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><span>London (GMT)</span><span id="tzlondon" class="font-mono font-bold"></span></div><div class="flex justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><span>Los Angeles (PST)</span><span id="tzla" class="font-mono font-bold"></span></div></div>
</div>

<script>
function updt(){var n=new Date();document.getElementById("tzseoul").textContent=n.toLocaleTimeString("ko-KR",{timeZone:"Asia/Seoul"});document.getElementById("tztokyo").textContent=n.toLocaleTimeString("ja-JP",{timeZone:"Asia/Tokyo"});document.getElementById("tzny").textContent=n.toLocaleTimeString("en-US",{timeZone:"America/New_York"});document.getElementById("tzlondon").textContent=n.toLocaleTimeString("en-GB",{timeZone:"Europe/London"});document.getElementById("tzla").textContent=n.toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles"});}updt();setInterval(updt,1000);
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
