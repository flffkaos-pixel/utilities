<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="canonical" href="https://freeutilities.pages.dev/calorie.html">
<meta property="og:type" content="website">
<meta property="og:title" content="칼로리 계산기 - Free Utilities">
<meta property="og:description" content="기초 대사량을 계산하는 무료 온라인 도구입니다.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="칼로리 계산기 - Free Utilities">

<link rel="alternate" hreflang="en" href="https://freeutilities.pages.dev/calorie.html">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={{theme:{{extend:{{colors:{{"primary":"#2563eb","background":"#f9fafb","surface":"#ffffff","border":"#e5e7eb"}},darkMode:"class"}}}}}}</script>
<style>
body{background:#f9fafb;font-family:system-ui,-apple-system,sans-serif}
.dark body{background:#0f172a}
.lang-ko{display:inline}
.lang-en{display:none}
body.en .lang-ko{display:none}
body.en .lang-en{display:inline}
</style>
</head>
<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">칼로리 계산기</span><span class="lang-en">Calorie Calculator</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">기초 대사량을 계산하는 무료 온라인 도구입니다.</span><span class="lang-en">Calculate your BMR and daily calorie needs.</span></p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="block mb-1 text-sm font-medium">Gender</label><select id="cg" class="w-full px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700"><option value="male">Male</option><option value="female">Female</option></select></div><div><label class="block mb-1 text-sm font-medium">Age</label><input id="ca" type="number" value="30" class="w-full px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700"></div><div><label class="block mb-1 text-sm font-medium">Weight (kg)</label><input id="cw" type="number" value="70" class="w-full px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700"></div><div><label class="block mb-1 text-sm font-medium">Height (cm)</label><input id="ch" type="number" value="175" class="w-full px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700"></div></div><button onclick="calcc()" class="px-4 py-2 bg-primary text-white rounded-lg font-medium">Calculate</button><div class="mt-4 p-4 bg-slate-100 dark:bg-slate-700 rounded-xl text-center"><div class="text-sm text-slate-500">BMR</div><div id="cbmr" class="text-3xl font-bold text-primary">1,688</div><div class="text-xs text-slate-400">kcal/day</div></div>
</div>

<script>
function calcc(){var g=document.getElementById("cg").value;var a=parseFloat(document.getElementById("ca").value);var w=parseFloat(document.getElementById("cw").value);var h=parseFloat(document.getElementById("ch").value);var b;if(g==="male")b=88.362+(13.397*w)+(4.799*h)-(5.677*a);else b=447.593+(9.247*w)+(3.098*h)-(4.330*a);document.getElementById("cbmr").textContent=Math.round(b).toLocaleString();}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-wrap items-center justify-between gap-3 text-sm">
<span class="font-bold">Free Utilities</span>
<nav class="flex gap-4">
<a href="guide-productivity.html" class="hover:text-primary"><span class="lang-ko">가이드</span><span class="lang-en">Guides</span></a>
<a href="privacy.html" class="hover:text-primary"><span class="lang-ko">개인정보처리방침</span><span class="lang-en">Privacy</span></a>
<a href="contact.html" class="hover:text-primary"><span class="lang-ko">문의</span><span class="lang-en">Contact</span></a>
</nav>
<p class="text-slate-500 w-full">© 2026 Free Utilities</p>
</div>
</footer>
<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
</html>
