a[i]*0.3+data[i-1]*0.7}else if(name=="Ocean"){for(var i=0;i<length;i++){var t=i/sampleRate;data[i]=(Math.random()*2-1)*0.3+Math.sin(2*Math.PI*0.1*t)*0.4+Math.sin(2*Math.PI*0.07*t)*0.3}}else if(name=="Forest"){for(var i=0;i<length;i++){var t=i/sampleRate;data[i]=(Math.random()*2-1)*0.2+Math.sin(2*Math.PI*2*t)*0.1+Math.sin(2*Math.PI*3.5*t)*0.05}}else if(name=="Coffee Shop"){for(var i=0;i<length;i++)data[i]=(Math.random()*2-1)*0.15;var last=0;for(var i=0;i<length;i++){if(Math.random()<0.001){last=Math.random()*2-1}data[i]+=last*0.3;data[i]*=0.15}}else if(name=="Crickets"){for(var i=0;i<length;i++){var t=i/sampleRate;data[i]=(Math.random()*2-1)*0.1+Math.sin(2*Math.PI*4*t)*0.3*(Math.sin(2*Math.PI*0.5*t)*0.5+0.5)}}wnSrc=wnCtx.createBufferSource();wnSrc.buffer=buffer;wnSrc.loop=true;wnSrc.connect(wnGain);wnSrc.start();wnCurrent=name;document.getElementById("wnStatus").textContent="Playing: "+name}document.getElementById("wnVolume").oninput=function(){if(wnGain)wnGain.gain.value=parseFloat(this.value)}</script></body>
