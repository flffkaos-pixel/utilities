</header><main class="max-w-5xl mx-auto px-4 py-6">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8">
<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">삼각형 계산기 - 각도와 변 길이 계산</span><span class="lang-en">Triangle Calculator - Calculate Angles and Side Lengths</span></h1>

<div class="space-y-4">
<div class="flex gap-3">
<button id="modeSSS" class="bg-primary text-white px-4 py-2 rounded-lg text-sm">SSS</button>
<button id="modeSAS" class="border border-primary text-primary px-4 py-2 rounded-lg text-sm">SAS</button>
</div>
<div class="tc-grid" id="inputGrid">
<div><label class="text-sm text-on-surface-variant block">a <span class="lang-ko">(변)</span><span class="lang-en">(side)</span><input id="ta" class="tc-input mt-1" type="number" step="any"></label></div>
<div><label class="text-sm text-on-surface-variant block">b <span class="lang-ko">(변)</span><span class="lang-en">(side)</span><input id="tb" class="tc-input mt-1" type="number" step="any"></label></div>
<div><label class="text-sm text-on-surface-variant block">c <span class="lang-ko">(변)</span><span class="lang-en">(side)</span><input id="tc" class="tc-input mt-1" type="number" step="any"></label></div>
<div><label class="text-sm text-on-surface-variant block">A <span class="lang-ko">(각도 &deg;)</span><span class="lang-en">(angle &deg;)</span><input id="tA" class="tc-input mt-1" type="number" step="any"></label></div>
<div><label class="text-sm text-on-surface-variant block">B <span class="lang-ko">(각도 &deg;)</span><span class="lang-en">(angle &deg;)</span><input id="tB" class="tc-input mt-1" type="number" step="any"></label></div>
<div><label class="text-sm text-on-surface-variant block">C <span class="lang-ko">(각도 &deg;)</span><span class="lang-en">(angle &deg;)</span><input id="tC" class="tc-input mt-1" type="number" step="any"></label></div></div>
<button id="tcCalc" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">계산</span><span class="lang-en">Calculate</span></button>
<div id="tcResult" class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm"></div>
<svg id="tcSvg" viewBox="0 0 300 200" class="w-full max-w-sm mx-auto" style="height:200px"></svg></div>
<script>
var mode='sss';
document.getElementById('modeSSS').addEventListener('click',function(){mode='sss';document.getElementById('modeSAS').className='border border-primary text-primary px-4 py-2 rounded-lg text-sm';this.className='bg-primary text-white px-4 py-2 rounded-lg text-sm'});
document.getElementById('modeSAS').addEventListener('click',function(){mode='sas';document.getElementById('modeSSS').className='border border-primary text-primary px-4 py-2 rounded-lg text-sm';this.className='bg-primary text-white px-4 py-2 rounded-lg text-sm'});
document.getElementById('tcCalc').addEventListener('click',function(){
var g=function(id){return parseFloat(document.getElementById(id).value)};
var a=g('ta'),b=g('tb'),c=g('tc'),A=g('tA'),B=g('tB'),C=g('tC');
var deg=Math.PI/180;var rad=180/Math.PI;
if(mode==='sss'&&a>0&&b>0&&c>0){
if(a+b<=c||a+c<=b||b+c<=a){document.getElementById('tcResult').innerHTML='<div class="col-span-4 text-red-500"><span class="lang-ko">유효하지 않은 삼각형입니다.</span><span class="lang-en">Invalid triangle.</span></div>';return}
A=Math.acos((b*b+c*c-a*a)/(2*b*c))*rad;B=Math.acos((a*a+c*c-b*b)/(2*a*c))*rad;C=180-A-B;
document.getElementById('tA').value=A.toFixed(2);document.getElementById('tB').value=B.toFixed(2);document.getElementById('tC').value=C.toFixed(2)}
else if(mode==='sas'&&a>0&&b>0&&C>0){
c=Math.sqrt(a*a+b*b-2*a*b*Math.cos(C*deg));document.getElementById('tc').value=c.toFixed(2);
A=Math.asin(a*Math.sin(C*deg)/c)*rad;B=180-A-C;
document.getElementById('tA').value=A.toFixed(2);document.getElementById('tB').value=B.toFixed(2)}
else{document.getElementById('tcResult').innerHTML='<div class="col-span-4 text-red-500"><span class="lang-ko">값을 입력하세요.</span><span class="lang-en">Enter values.</span></div>';return}
var perim=a+b+c;var s=perim/2;var area=Math.sqrt(s*(s-a)*(s-b)*(s-c));var type='';
if(Math.abs(a-b)<0.001&&Math.abs(b-c)<0.001)type='<span class="lang-ko">정삼각형</span><span class="lang-en">Equilateral</span>';
else if(Math.abs(a-b)<0.001||Math.abs(b-c)<0.001||Math.abs(a-c)<0.001)type='<span class="lang-ko">이등변삼각형</span><span class="lang-en">Isosceles</span>';
else type='<span class="lang-ko">부등변삼각형</span><span class="lang-en">Scalene</span>';
if(Math.abs(A-90)<0.5||Math.abs(B-90)<0.5||Math.abs(C-90)<0.5)type+=' <span class="lang-ko">/ 직각삼각형</span><span class="lang-en">/ Right</span>';
document.getElementById('tcResult').innerHTML='<div><strong><span class="lang-ko">유형</span><span class="lang-en">Type</span></strong><br>'+type+'</div><div><strong><span class="lang-ko">둘레</span><span class="lang-en">Perimeter</span></strong><br>'+perim.toFixed(2)+'</div><div><strong><span class="lang-ko">넓이</span><span class="lang-en">Area</span></strong><br>'+area.toFixed(2)+'</div><div><strong>A</strong><br>'+A.toFixed(2)+'&deg;</div><div><strong>B</strong><br>'+B.toFixed(2)+'&deg;</div><div><strong>C</strong><br>'+C.toFixed(2)+'&deg;</div>';
var svg=document.getElementById('tcSvg');var mx=Math.max(a,b,c);var sc=Math.min(260/mx,180/mx);var x1=10,y1=180,x2=10+a*sc,y2=180,x3=x1+(a*a+b*b-c*c)/(2*a)*sc,y3=y1-Math.sqrt(b*b-((a*a+b*b-c*c)/(2*a))**2)*sc;
svg.innerHTML='<polygon points="'+x1+','+y1+' '+x2+','+y2+' '+x3+','+y3+'" fill="rgba(37,99,235,0.2)" stroke="#2563eb" stroke-width="2"/>'+
'<text x="'+(x1-10)+'" y="'+(y1+15)+'" font-size="14" fill="currentColor">a</text>'+
'<text x="'+(x2+5)+'" y="'+(y2+15)+'" font-size="14" fill="currentColor">b</text>'+
'<text x="'+(x3-15)+'" y="'+(y3-10)+'" font-size="14" fill="currentColor">c</text>'+
'<text x="'+(x1-12)+'" y="'+(y1-5)+'" font-size="12" fill="#dc2626">'+A.toFixed(1)+'&deg;</text>'+
'<text x="'+(x2+5)+'" y="'+(y2-5)+'" font-size="12" fill="#dc2626">'+B.toFixed(1)+'&deg;</text>'+
'<text x="'+(x3-5)+'" y="'+(y3+15)+'" font-size="12" fill="#dc2626">'+C.toFixed(1)+'&deg;</text>'
});
</script>
