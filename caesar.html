<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">시저 암호</span><span class="lang-en">Caesar Cipher</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">텍스트를 시저 암호로 암호화하거나 복호화합니다.</span><span class="lang-en">Encrypt or decrypt text using Caesar cipher.</span></p>
<div class="flex gap-2 mb-4"><input id="cs" type="number" value="3" class="w-20 px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center" placeholder="Shift"></div><textarea id="csi" class="w-full h-24 px-4 py-3 border border-border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 font-mono mb-4" placeholder="<span class="lang-ko">암호화할 텍스트</span><span class="lang-en">Text to encrypt</span>" oninput="caesar()"></textarea><textarea id="cso" class="w-full h-24 px-4 py-3 border border-border rounded-lg bg-gray-50 dark:bg-slate-700 dark:border-slate-600 font-mono" readonly></textarea>
</div>

<script>
function caesar(){var t=document.getElementById("csi").value;var s=parseInt(document.getElementById("cs").value)||0;var o="";for(var i=0;i<t.length;i++){var c=t.charCodeAt(i);if(c>=65&&c<=90)o+=String.fromCharCode((c-65+s+26)%26+65);else if(c>=97&&c<=122)o+=String.fromCharCode((c-97+s+26)%26+97);else o+=t[i];}document.getElementById("cso").value=o;}
</script>

lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
