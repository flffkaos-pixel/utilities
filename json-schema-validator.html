<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">JSON Schema 검증기 - 데이터 구조 유효성 검사</span><span class="lang-en">JSON Schema Validator - Validate Data Structure</span></h1>

<div class="space-y-4">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">JSON Schema</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">JSON Schema</span>
<textarea id="schemaInput" class="js-textarea" rows="10" placeholder='{"type":"object","properties":{"name":{"type":"string"}},"required":["name"]}'></textarea></div>
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">JSON 데이터</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">JSON Data</span>
<textarea id="dataInput" class="js-textarea" rows="10" placeholder='{"name":"John"}'></textarea></div></div>
<button id="validateBtn" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">검증</span><span class="lang-en">Validate</span></button>
<div id="resultDisplay" class="text-sm"></div></div>
<script>
document.getElementById('validateBtn').addEventListener('click',function(){
var s=d=null;var rd=document.getElementById('resultDisplay');
try{s=JSON.parse(document.getElementById('schemaInput').value)}catch(e){rd.innerHTML='<span class="fail">Schema parse error: '+e.message+'</span>';return}
try{d=JSON.parse(document.getElementById('dataInput').value)}catch(e){rd.innerHTML='<span class="fail">Data parse error: '+e.message+'</span>';return}
var errs=validateSchema(s,d);
if(errs.length===0){rd.innerHTML='<span class="pass">'+'<span class="lang-ko">✓ 유효함</span><span class="lang-en">✓ Valid</span></span>'}else{rd.innerHTML='<span class="fail">'+'<span class="lang-ko">✗ 유효하지 않음</span><span class="lang-en">✗ Invalid</span></span><ul class="mt-2 list-disc pl-5 text-xs text-red-600 dark:text-red-400">'+errs.map(function(e){return '<li>'+e+'</li>'}).join('')+'</ul>'}
});
function validateSchema(schema,data,path){var errs=[];path=path||'$';if(!schema||typeof schema!=='object')return errs;var type=schema.type;if(type){if(!checkType(data,type)){errs.push(path+': expected type '+type+', got '+typeof data);return errs}}if(schema.enum!==undefined&&!schema.enum.includes(data)){errs.push(path+': value must be one of ['+schema.enum.join(',')+']');return errs}if(schema.type==='object'||schema.properties){var props=schema.properties||{};var req=schema.required||[];if(typeof data!=='object'||data===null){if(schema.type==='object')errs.push(path+': expected object');return errs}for(var i=0;i<req.length;i++){if(!(req[i]in data))errs.push(path+'.'+req[i]+': missing required property')}for(var k in props){if(k in data){errs=errs.concat(validateSchema(props[k],data[k],path+'.'+k))}}if(schema.additionalProperties===false){for(var k2 in data){if(!(k2 in props))errs.push(path+'.'+k2+': unexpected property')}}}if(schema.type==='array'&&schema.items){if(!Array.isArray(data)){errs.push(path+': expected array');return errs}for(var j=0;j<data.length;j++){errs=errs.concat(validateSchema(schema.items,data[j],path+'['+j+']'))}}if(schema.minimum!==undefined&&typeof data==='number'&&data<schema.minimum)errs.push(path+': must be >= '+schema.minimum);if(schema.maximum!==undefined&&typeof data==='number'&&data>schema.maximum)errs.push(path+': must be <= '+schema.maximum);if(schema.minLength!==undefined&&typeof data==='string'&&data.length<schema.minLength)errs.push(path+': length must be >= '+schema.minLength);if(schema.maxLength!==undefined&&typeof data==='string'&&data.length>schema.maxLength)errs.push(path+': length must be <= '+schema.maxLength);if(schema.pattern!==undefined&&typeof data==='string'&&!new RegExp(schema.pattern).test(data))errs.push(path+': must match pattern '+schema.pattern);return errs}
function checkType(val,t){if(t==='string')return typeof val==='string';if(t==='number')return typeof val==='number';if(t==='integer')return typeof val==='number'&&val%1===0;if(t==='boolean')return typeof val==='boolean';if(t==='array')return Array.isArray(val);if(t==='object')return typeof val==='object'&&val!==null&&!Array.isArray(val);if(t==='null')return val===null;return true}
</script>
