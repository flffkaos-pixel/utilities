<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타임스탬프 - Timestamp</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; font-family: monospace; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-bottom: 15px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 8px; }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; cursor: pointer; }
        .result-row:hover span { color: var(--accent); }
        .result-row:last-child { border-bottom: none; }
        .result-row label { font-size: 0.85rem; color: var(--text-muted); }
        .result-row span { font-family: monospace; font-size: 0.9rem; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🕐 타임스탬프</span>
            <span class="en">🕐 Timestamp</span>
        </h1>
        
        <div class="description">
            <span class="ko">Unix 타임스탬프와 날짜를 서로 변환합니다.</span>
            <span class="en">Convert between Unix timestamp and date.</span>
        </div>
        
        <div class="input-group">
            <label>Unix Timestamp (seconds)</label>
            <input type="text" id="timestamp" placeholder="1704067200" oninput="convertFromTs()">
        </div>
        
        <div class="input-group">
            <label>Date / 날짜</label>
            <input type="datetime-local" id="datetime" oninput="convertFromDate()">
        </div>
        
        <button class="btn" onclick="setNow()">
            <span class="ko">현재 시간으로</span>
            <span class="en">Set Now</span>
        </button>
        
        <div class="result">
            <div class="result-row" onclick="copy('unix')"><label>Unix (sec)</label><span id="r-unix">-</span></div>
            <div class="result-row" onclick="copy('ms')"><label>Unix (ms)</label><span id="r-ms">-</span></div>
            <div class="result-row" onclick="copy('iso')"><label>ISO 8601</label><span id="r-iso">-</span></div>
            <div class="result-row" onclick="copy('utc')"><label>UTC</label><span id="r-utc">-</span></div>
            <div class="result-row" onclick="copy('local')"><label>Local</label><span id="r-local">-</span></div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function convertFromTs() {
            const ts = document.getElementById('timestamp').value.trim();
            if (!ts) return;
            
            const sec = parseInt(ts);
            if (isNaN(sec)) return;
            
            const date = new Date(sec > 9999999999 ? sec : sec * 1000);
            updateResults(date);
        }
        
        function convertFromDate() {
            const datetime = document.getElementById('datetime').value;
            if (!datetime) return;
            
            const date = new Date(datetime);
            updateResults(date);
        }
        
        function updateResults(date) {
            if (isNaN(date.getTime())) return;
            
            document.getElementById('r-unix').textContent = Math.floor(date.getTime() / 1000);
            document.getElementById('r-ms').textContent = date.getTime();
            document.getElementById('r-iso').textContent = date.toISOString();
            document.getElementById('r-utc').textContent = date.toUTCString();
            document.getElementById('r-local').textContent = date.toLocaleString();
        }
        
        function copy(id) {
            const text = document.getElementById('r-' + id).textContent;
            if (text && text !== '-') {
                navigator.clipboard.writeText(text);
            }
        }
        
        function setNow() {
            const now = new Date();
            document.getElementById('timestamp').value = Math.floor(now.getTime() / 1000);
            document.getElementById('datetime').value = now.toISOString().slice(0, 16);
            updateResults(now);
        }
        
        setNow();
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
