</div>

<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">API 키 생성기</span><span class="lang-en">API Key Generator</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">안전한 API 키를 생성하는 무료 온라인 도구입니다.</span><span class="lang-en">Generate secure API keys.</span></p>
<button onclick="genKey()" class="px-4 py-2 bg-primary text-white rounded-lg font-medium mb-4"><span class="lang-ko">생성</span><span class="lang-en">Generate</span></button><div class="flex gap-2"><input id="akr" class="flex-1 px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 font-mono" readonly><button onclick="navigator.clipboard.writeText(document.getElementById('akr').value)" class="px-3 py-2 border border-border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Copy</button></div>
</div>

<script>
function genKey(){var chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";var key="";for(var i=0;i<32;i++){if(i>0&&i%8===0)key+="-";key+=chars.charAt(Math.floor(Math.random()*chars.length));}document.getElementById("akr").value=key;}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
