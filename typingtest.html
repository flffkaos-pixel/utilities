<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test - Free Online Tools</title>
    <meta name="description" content="Free online typing speed test. Check your WPM (words per minute) and accuracy. Practice and improve your typing skills.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://flffkaos-pixel.github.io/utilities/typingtest.html">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #0f0f23; --card-bg: #1a1a3e; --text: #eee; --accent: #00d4ff; --accent2: #ff6b9d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: var(--text); text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; padding: 8px 16px; background: var(--card-bg); border-radius: 8px; }
        .back:hover { background: var(--accent); color: #000; }
        h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
        .stat-label { color: #888; font-size: 0.85rem; margin-top: 5px; }
        
        .text-display { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-bottom: 20px; font-size: 1.3rem; line-height: 2; }
        .text-display span { padding: 2px 4px; border-radius: 4px; transition: all 0.2s; }
        .text-display span.correct { color: #4ade80; }
        .text-display span.incorrect { color: #f87171; background: rgba(248, 113, 113, 0.2); }
        .text-display span.current { background: var(--accent); color: #000; }
        .text-display span.pending { color: #666; }
        
        .input-area { margin-bottom: 20px; }
        .input-area textarea { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #333; background: #1a1a2e; color: #eee; font-size: 1.2rem; line-height: 1.8; min-height: 150px; resize: none; }
        .input-area textarea:focus { outline: none; border-color: var(--accent); }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 15px; background: var(--card-bg); color: var(--text); border: 2px solid var(--accent); border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn.primary { background: var(--accent); color: #000; }
        
        .restart-msg { text-align: center; color: #888; margin-bottom: 20px; }
        
        .result { display: none; text-align: center; padding: 30px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 20px; margin-bottom: 20px; }
        .result.show { display: block; }
        .result-title { color: #000; font-size: 1.5rem; margin-bottom: 20px; }
        .result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .result-item { background: rgba(0,0,0,0.1); padding: 20px; border-radius: 15px; }
        .result-value { font-size: 2.5rem; font-weight: bold; color: #000; }
        .result-label { color: #333; font-size: 0.9rem; }
        
        .ads { margin-top: 30px; text-align: center; min-height: 100px; background: var(--card-bg); border-radius: 10px; padding: 20px; }
        .footer { text-align: center; margin-top: 50px; padding: 30px; color: #666; }
        .footer a { color: var(--accent); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Back to Home</a>
        
        <h1>Typing Speed Test</h1>
        <p class="subtitle">Test your typing speed and accuracy</p>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="timer">60</div>
                <div class="stat-label">Seconds</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
        
        <div class="text-display" id="textDisplay"></div>
        
        <div class="input-area">
            <textarea id="textInput" placeholder="Start typing here when you're ready..." disabled></textarea>
        </div>
        
        <div class="controls">
            <button class="btn primary" id="startBtn" onclick="startTest()">Start Test</button>
            <button class="btn" onclick="resetTest()">Reset</button>
        </div>
        
        <div class="result" id="result">
            <div class="result-title">Test Complete!</div>
            <div class="result-stats">
                <div class="result-item">
                    <div class="result-value" id="finalWpm">0</div>
                    <div class="result-label">Words Per Minute</div>
                </div>
                <div class="result-item">
                    <div class="result-value" id="finalAccuracy">0%</div>
                    <div class="result-label">Accuracy</div>
                </div>
            </div>
        </div>
        
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
        
        <div class="footer">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    
    <script>
        const texts = [
            "The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet at least once.",
            "Programming is the art of telling a computer what to do. It requires patience, logic, and creativity to solve complex problems.",
            "Practice makes perfect. The more you type, the faster and more accurate you will become. Keep practicing every day.",
            "Success is not final, failure is not fatal. It is the courage to continue that counts. Keep moving forward.",
            "In the middle of difficulty lies opportunity. Every challenge is a chance to learn and grow stronger."
        ];
        
        let currentText = "";
        let startTime = null;
        let timer = 60;
        let timerInterval = null;
        let isRunning = false;
        let correctChars = 0;
        let totalChars = 0;
        
        const textDisplay = document.getElementById('textDisplay');
        const textInput = document.getElementById('textInput');
        const timerEl = document.getElementById('timer');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const startBtn = document.getElementById('startBtn');
        
        function initText() {
            currentText = texts[Math.floor(Math.random() * texts.length)];
            textDisplay.innerHTML = currentText.split('').map((char, i) => 
                `<span class="pending" data-index="${i}">${char}</span>`
            ).join('');
        }
        
        function startTest() {
            if (isRunning) return;
            
            isRunning = true;
            startTime = Date.now();
            textInput.disabled = false;
            textInput.value = '';
            textInput.focus();
            startBtn.disabled = true;
            startBtn.style.opacity = '0.5';
            
            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = timer;
                
                const typed = textInput.value;
                const typedChars = typed.split('');
                let correct = 0;
                
                typedChars.forEach((char, i) => {
                    if (char === currentText[i]) correct++;
                });
                
                const elapsed = (60 - timer) / 60;
                const words = correct / 5;
                const wpm = Math.round(words / elapsed);
                
                wpmEl.textContent = isNaN(wpm) ? 0 : wpm;
                accuracyEl.textContent = typedChars.length > 0 ? Math.round((correct / typedChars.length) * 100) + '%' : '100%';
                
                if (timer <= 0) {
                    endTest();
                }
            }, 1000);
        }
        
        function endTest() {
            clearInterval(timerInterval);
            isRunning = false;
            textInput.disabled = true;
            
            const typed = textInput.value;
            const typedChars = typed.split('');
            let correct = 0;
            
            typedChars.forEach((char, i) => {
                if (char === currentText[i]) correct++;
            });
            
            const words = correct / 5;
            const wpm = Math.round(words);
            const accuracy = typedChars.length > 0 ? Math.round((correct / typedChars.length) * 100) : 0;
            
            document.getElementById('finalWpm').textContent = wpm;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('result').classList.add('show');
        }
        
        function resetTest() {
            clearInterval(timerInterval);
            isRunning = false;
            timer = 60;
            timerEl.textContent = '60';
            wpmEl.textContent = '0';
            accuracyEl.textContent = '100%';
            textInput.disabled = true;
            textInput.value = '';
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
            document.getElementById('result').classList.remove('show');
            initText();
        }
        
        textInput.addEventListener('input', () => {
            if (!isRunning) return;
            
            const typed = textInput.value;
            const typedChars = typed.split('');
            const spans = textDisplay.querySelectorAll('span');
            
            spans.forEach((span, i) => {
                span.classList.remove('correct', 'incorrect', 'current');
                if (i < typedChars.length) {
                    span.classList.add(typedChars[i] === currentText[i] ? 'correct' : 'incorrect');
                } else if (i === typedChars.length) {
                    span.classList.add('current');
                }
            });
        });
        
        initText();
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
