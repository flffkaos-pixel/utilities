<script>const texts = [
            "The quick brown fox jumps over the lazy dog. This pangram contains every letter of the English alphabet at least once.",
            "Programming is the art of telling a computer what to do. It requires patience, logic, and creativity to solve complex problems.",
            "Practice makes perfect. The more you type, the faster and more accurate you will become. Keep practicing every day.",
            "Success is not final, failure is not fatal. It is the courage to continue that counts. Keep moving forward.",
            "In the middle of difficulty lies opportunity. Every challenge is a chance to learn and grow stronger."
        ];
        
        let currentText = "";
        let startTime = null;
        let timer = 60;
        let timerInterval = null;
        let isRunning = false;
        let correctChars = 0;
        let totalChars = 0;
        
        const textDisplay = document.getElementById('textDisplay');
        const textInput = document.getElementById('textInput');
        const timerEl = document.getElementById('timer');
        const wpmEl = document.getElementById('wpm');
        const accuracyEl = document.getElementById('accuracy');
        const startBtn = document.getElementById('startBtn');
        
        function initText() {
            currentText = texts[Math.floor(Math.random() * texts.length)];
            textDisplay.innerHTML = currentText.split('').map((char, i) => 
                `<span class="pending" data-index="${i}">${char}</span>`
            ).join('');
        }
        
        function startTest() {
            if (isRunning) return;
            
            isRunning = true;
            startTime = Date.now();
            textInput.disabled = false;
            textInput.value = '';
            textInput.focus();
            startBtn.disabled = true;
            startBtn.style.opacity = '0.5';
            
            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = timer;
                
                const typed = textInput.value;
                const typedChars = typed.split('');
                let correct = 0;
                
                typedChars.forEach((char, i) => {
                    if (char === currentText[i]) correct++;
                });
                
                const elapsed = (60 - timer) / 60;
                const words = correct / 5;
                const wpm = Math.round(words / elapsed);
                
                wpmEl.textContent = isNaN(wpm) ? 0 : wpm;
                accuracyEl.textContent = typedChars.length > 0 ? Math.round((correct / typedChars.length) * 100) + '%' : '100%';
                
                if (timer <= 0) {
                    endTest();
                }
            }, 1000);
        }
        
        function endTest() {
            clearInterval(timerInterval);
            isRunning = false;
            textInput.disabled = true;
            
            const typed = textInput.value;
            const typedChars = typed.split('');
            let correct = 0;
            
            typedChars.forEach((char, i) => {
                if (char === currentText[i]) correct++;
            });
            
            const words = correct / 5;
            const wpm = Math.round(words);
            const accuracy = typedChars.length > 0 ? Math.round((correct / typedChars.length) * 100) : 0;
            
            document.getElementById('finalWpm').textContent = wpm;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('result').classList.add('show');
        }
        
        function resetTest() {
            clearInterval(timerInterval);
            isRunning = false;
            timer = 60;
            timerEl.textContent = '60';
            wpmEl.textContent = '0';
            accuracyEl.textContent = '100%';
            textInput.disabled = true;
            textInput.value = '';
            startBtn.disabled = false;
            startBtn.style.opacity = '1';
            document.getElementById('result').classList.remove('show');
            initText();
        }
        
        textInput.addEventListener('input', () => {
            if (!isRunning) return;
            
            const typed = textInput.value;
            const typedChars = typed.split('');
            const spans = textDisplay.querySelectorAll('span');
            
            spans.forEach((span, i) => {
                span.classList.remove('correct', 'incorrect', 'current');
                if (i < typedChars.length) {
                    span.classList.add(typedChars[i] === currentText[i] ? 'correct' : 'incorrect');
                } else if (i === typedChars.length) {
                    span.classList.add('current');
                }
            });
        });
        
        initText();
        
        (adsbygoogle = window.adsbygoogle || []).push({});</script>

  document.documentElement.classList.toggle('dark');

  var dt = document.getElementById('darkToggle');
  if (dt) dt.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}

    toggleLang();

});
