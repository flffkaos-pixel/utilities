<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>타이핑 테스트 - Free Utilities</title>
<meta name="description" content="타이핑 속도를 측정하는 무료 온라인 도구입니다.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://freeutilities.pages.dev/typingtest.html">
<meta property="og:type" content="website">
<meta property="og:title" content="타이핑 테스트 - Free Utilities">
<meta property="og:description" content="타이핑 속도를 측정하는 무료 온라인 도구입니다.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="타이핑 테스트 - Free Utilities">
<meta name="twitter:description" content="Test your typing speed online.">
<link rel="alternate" hreflang="ko" href="https://freeutilities.pages.dev/typingtest.html">
<link rel="alternate" hreflang="en" href="https://freeutilities.pages.dev/typingtest.html">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={{theme:{{extend:{{colors:{{"primary":"#2563eb","background":"#f9fafb","surface":"#ffffff","border":"#e5e7eb"}},darkMode:"class"}}}}}}</script>
<style>
body{background:#f9fafb;font-family:system-ui,-apple-system,sans-serif}
.dark body{background:#0f172a}
.lang-ko{display:inline}
.lang-en{display:none}
body.en .lang-ko{display:none}
body.en .lang-en{display:inline}
</style>
</head>
<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">타이핑 테스트</span><span class="lang-en">Typing Test</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">타이핑 속도를 측정하는 무료 온라인 도구입니다.</span><span class="lang-en">Test your typing speed online.</span></p>
<p class="mb-4 text-lg" id="tttext">The quick brown fox jumps over the lazy dog.</p><textarea id="ttinput" class="w-full h-20 px-4 py-3 border border-border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 font-mono mb-4" placeholder="<span class="lang-ko">위 문장을 그대로 타이핑하세요</span><span class="lang-en">Type the text above</span>" oninput="checkTyping()"></textarea><div class="grid grid-cols-3 gap-4 text-center"><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-xl"><div class="text-sm text-slate-500">WPM</div><div id="ttwpm" class="text-2xl font-bold text-primary">0</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-xl"><div class="text-sm text-slate-500"><span class="lang-ko">정확도</span><span class="lang-en">Accuracy</span></div><div id="ttacc" class="text-2xl font-bold text-green-600">0%</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-xl"><div class="text-sm text-slate-500"><span class="lang-ko">시간</span><span class="lang-en">Time</span></div><div id="tttime" class="text-2xl font-bold">0s</div></div></div>
</div>

<script>
var ttStart=0,ttTimer=null;function checkTyping(){var t=document.getElementById("ttinput").value;var ref=document.getElementById("tttext").textContent;if(!ttStart&&t.length>0){ttStart=Date.now();ttTimer=setInterval(updTime,100);}var correct=0;for(var i=0;i<t.length;i++){if(i<ref.length&&t[i]===ref[i])correct++;}document.getElementById("ttacc").textContent=Math.round(correct/t.length*100)+"%";var wpm=0;if(ttStart){var sec=(Date.now()-ttStart)/1000;var words=t.split(/\s+/).filter(Boolean).length;wpm=Math.round(words/(sec/60));document.getElementById("ttwpm").textContent=wpm;}if(t===ref&&ttTimer){clearInterval(ttTimer);ttTimer=null;}}function updTime(){if(ttStart)document.getElementById("tttime").textContent=Math.floor((Date.now()-ttStart)/1000)+"s";}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-wrap items-center justify-between gap-3 text-sm">
<span class="font-bold">Free Utilities</span>
<nav class="flex gap-4">
<a href="guide-productivity.html" class="hover:text-primary"><span class="lang-ko">가이드</span><span class="lang-en">Guides</span></a>
<a href="privacy.html" class="hover:text-primary"><span class="lang-ko">개인정보처리방침</span><span class="lang-en">Privacy</span></a>
<a href="contact.html" class="hover:text-primary"><span class="lang-ko">문의</span><span class="lang-en">Contact</span></a>
</nav>
<p class="text-slate-500 w-full">© 2026 Free Utilities</p>
</div>
</footer>
<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
</html>
