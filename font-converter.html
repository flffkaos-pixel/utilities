<textarea id="fci" class="w-full h-24 px-4 py-3 border border-border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 mb-4" placeholder="Hello" oninput="convFont()"></textarea><div class="grid grid-cols-2 gap-3"><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div id="ff1" class="text-lg font-bold">Hello</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div id="ff2" class="text-lg italic">Hello</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div id="ff3" class="text-lg underline">Hello</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div id="ff4" class="text-lg line-through">Hello</div></div></div>
</div>

<script>
function convFont(){var t=document.getElementById("fci").value||"Hello";document.getElementById("ff1").textContent=t;document.getElementById("ff2").textContent=t;document.getElementById("ff3").textContent=t;document.getElementById("ff4").textContent=t;}
</script>

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
