<body><div class="max-w-md mx-auto space-y-4"><div class="grid grid-cols-2 gap-3"><div><label>Work (sec)</label><input id="itWork" type="number" value="30" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>Rest (sec)</label><input id="itRest" type="number" value="10" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>Rounds</label><input id="itRounds" type="number" value="8" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>Sets</label><input id="itSets" type="number" value="1" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div></div><div class="flex gap-2"><button onclick="setPreset('tabata')" class="flex-1 p-2 rounded-xl bg-purple-100 dark:bg-purple-900 text-sm">Tabata</button><button onclick="setPreset('hiit')" class="flex-1 p-2 rounded-xl bg-purple-100 dark:bg-purple-900 text-sm">HIIT</button></div><div id="itDisplay" class="text-center py-6 bg-slate-50 dark:bg-slate-700 rounded-xl"><div id="itPhase" class="text-lg text-slate-500">Ready</div><div id="itTime" class="text-5xl font-bold">00</div><div id="itProgress" class="mt-2 h-2 bg-slate-200 dark:bg-slate-600 rounded-full"><div id="itBar" class="h-full bg-primary rounded-full transition-all" style="width:0%"></div></div></div><div class="flex gap-2"><button onclick="startTimer()" id="itStartBtn" class="flex-1 p-3 rounded-xl bg-green-600 text-white">Start</button><button onclick="resetTimer()" class="flex-1 p-3 rounded-xl bg-red-600 text-white">Reset</button></div></div><script>var itInterval,itRunning=false,itTime=0,itTotal=0,itPhaseType="work",itRound=1,itSet=1;function setPreset(p){if(p=="tabata"){document.getElementById("itWork").value=20;document.getElementById("itRest").value=10;document.getElementById("itRounds").value=8;document.getElementById("itSets").value=1}else{document.getElementById("itWork").value=45;document.getElementById("itRest").value=15;document.getElementById("itRounds").value=8;document.getElementById("itSets").value=2}}function beep(){try{var c=new AudioContext();var o=c.createOscillator();o.frequency.value=800;o.type="sine";var g=c.createGain();g.gain.value=0.3;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.1)}catch(e){}}function updateDisplay(){document.getElementById("itTime").textContent=String(itTime).padStart(2,"0");document.getElementById("itBar").style.width=itTotal>0?((1-itTime/itTotal)*100)+"%":"0%"}function nextPhase(){if(itTime>0)return;if(itPhaseType=="work"){itPhaseType="rest";itTime=parseInt(document.getElementById("itRest").value);itTotal=itTime;document.getElementById("itPhase").textContent="Rest "+itRound+"/"+document.getElementById("itRounds").value;beep()}else{if(itRound<parseInt(document.getElementById("itRounds").value)){itRound++;itPhaseType="work";itTime=parseInt(document.getElementById("itWork").value);itTotal=itTime;document.getElementById("itPhase").textContent="Work "+itRound+"/"+document.getElementById("itRounds").value;beep()}else{if(itSet<parseInt(document.getElementById("itSets").value)){itSet++;itRound=1;itPhaseType="work";itTime=parseInt(document.getElementById("itWork").value);itTotal=itTime;document.getElementById("itPhase").textContent="Set "+itSet+" Work";beep()}else{clearInterval(itInterval);itRunning=false;document.getElementById("itStartBtn").textContent="Start";document.getElementById("itPhase").textContent="Done!";return}}}updateDisplay()}function startTimer(){if(itRunning){clearInterval(itInterval);itRunning=false;document.getElementById("itStartBtn").textContent="Resume";return}if(!itTime){itPhaseType="work";itTime=parseInt(document.getElementById("itWork").value);itTotal=itTime;itRound=1;itSet=1;document.getElementById("itPhase").textContent="Work 1/"+document.getElementById("itRounds").value;updateDisplay()}itRunning=true;document.getElementById("itStartBtn").textContent="Pause";itInterval=setInterval(function(){itTime--;updateDisplay();if(itTime<=0){if(itPhaseType=="work"&&itRound==parseInt(document.getElementById("itRounds").value)&&itSet==parseInt(document.getElementById("itSets").value)){clearInterval(itInterval);itRunning=false;document.getElementById("itStartBtn").textContent="Start";document.getElementById("itPhase").textContent="Complete!";document.getElementById("itTime").textContent="00";return}nextPhase()}},1000)}function resetTimer(){clearInterval(itInterval);itRunning=false;itTime=0;itPhaseType="work";itRound=1;itSet=1;document.getElementById("itStartBtn").textContent="Start";document.getElementById("itPhase").textContent="Ready";document.getElementById("itTime").textContent="00";document.getElementById("itBar").style.width="0%"}</script></body>
