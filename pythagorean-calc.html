<body><div class="max-w-md mx-auto space-y-4"><div class="flex justify-center mb-4"><svg viewBox="0 0 200 160" class="w-48 h-36"><polygon points="20,140 180,140 20,20" fill="none" stroke="#2563eb" stroke-width="2"/><text x="15" y="135" font-size="14" fill="#2563eb">a</text><text x="100" y="155" font-size="14" fill="#2563eb">b</text><text x="65" y="65" font-size="14" fill="#2563eb">c</text></svg></div><div class="grid grid-cols-3 gap-3"><div><label>a</label><input id="pyA" type="number" value="3" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>b</label><input id="pyB" type="number" value="4" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>c</label><input id="pyC" type="number" value="" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div></div><p class="text-xs text-slate-500">Leave empty the field to find</p><button onclick="calcPythagorean()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div id="pyResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 text-sm"></div></div><script>function calcPythagorean(){var a=parseFloat(document.getElementById("pyA").value);var b=parseFloat(document.getElementById("pyB").value);var c=parseFloat(document.getElementById("pyC").value);if(!a&&b&&c){a=Math.sqrt(c*c-b*b);document.getElementById("pyResult").innerHTML="a = "+a.toFixed(4)}else if(!b&&a&&c){b=Math.sqrt(c*c-a*a);document.getElementById("pyResult").innerHTML="b = "+b.toFixed(4)}else if(!c&&a&&b){c=Math.sqrt(a*a+b*b);document.getElementById("pyResult").innerHTML="c = "+c.toFixed(4)}else document.getElementById("pyResult").innerHTML="Leave exactly one field empty"}</script></body>
