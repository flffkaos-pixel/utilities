oFixed(4);document.getElementById("cirResult").innerHTML="R: "+r.toFixed(4)+" | D: "+d.toFixed(4)+" | C: "+c.toFixed(4)+" | A: "+a.toFixed(4);cirUpdating=false}document.addEventListener("DOMContentLoaded",function(){calcCircle()})</script></body>
