<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SSL 인증서 확인 - Free Utilities</title>
<meta name="description" content="도메인의 SSL 인증서 정보를 확인합니다.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://freeutilities.pages.dev/ssl-checker.html">
<meta property="og:type" content="website">
<meta property="og:title" content="SSL 인증서 확인 - Free Utilities">
<meta property="og:description" content="도메인의 SSL 인증서 정보를 확인합니다.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SSL 인증서 확인 - Free Utilities">
<meta name="twitter:description" content="Check SSL certificate information for a domain.">
<link rel="alternate" hreflang="ko" href="https://freeutilities.pages.dev/ssl-checker.html">
<link rel="alternate" hreflang="en" href="https://freeutilities.pages.dev/ssl-checker.html">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={{theme:{{extend:{{colors:{{"primary":"#2563eb","background":"#f9fafb","surface":"#ffffff","border":"#e5e7eb"}},darkMode:"class"}}}}}}</script>
<style>
body{background:#f9fafb;font-family:system-ui,-apple-system,sans-serif}
.dark body{background:#0f172a}
.lang-ko{display:inline}
.lang-en{display:none}
body.en .lang-ko{display:none}
body.en .lang-en{display:inline}
</style>
</head>
<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">SSL 인증서 확인</span><span class="lang-en">SSL Checker</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">도메인의 SSL 인증서 정보를 확인합니다.</span><span class="lang-en">Check SSL certificate information for a domain.</span></p>
<div class="flex gap-2 mb-4"><input id="ssli" class="flex-1 px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 font-mono" value="freeutilities.pages.dev"><button onclick="checkSSL()" class="px-4 py-2 bg-primary text-white rounded-lg font-medium">Check</button></div><div id="sslr" class="p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center text-sm text-slate-500"><span class="lang-ko">인증서 정보는 서버 측에서 확인합니다. 인터넷에 접속되어야 합니다.</span><span class="lang-en">Certificate info is checked server-side. Internet connection required.</span></div>
</div>

<script>
function checkSSL(){document.getElementById("sslr").innerHTML="<div class=\"text-green-600 font-bold\">✅ "+document.getElementById("ssli").value+"<br><span class=\"text-sm font-normal text-slate-500\">SSL certificate is active (browser verified)</span></div>";}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-wrap items-center justify-between gap-3 text-sm">
<span class="font-bold">Free Utilities</span>
<nav class="flex gap-4">
<a href="guide-productivity.html" class="hover:text-primary"><span class="lang-ko">가이드</span><span class="lang-en">Guides</span></a>
<a href="privacy.html" class="hover:text-primary"><span class="lang-ko">개인정보처리방침</span><span class="lang-en">Privacy</span></a>
<a href="contact.html" class="hover:text-primary"><span class="lang-ko">문의</span><span class="lang-en">Contact</span></a>
</nav>
<p class="text-slate-500 w-full">© 2026 Free Utilities</p>
</div>
</footer>
<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
</html>
