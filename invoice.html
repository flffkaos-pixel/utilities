<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator - Free Online Tools</title>
    <meta name="description" content="Free online invoice generator. Create professional invoices quickly and easily.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://flffkaos-pixel.github.io/utilities/invoice.html">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #0f0f23; --card-bg: #1a1a3e; --text: #eee; --accent: #00d4ff; --accent2: #ff6b9d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: var(--text); text-decoration: none; display: inline-block; margin-bottom: 20px; font-size: 0.9rem; padding: 8px 16px; background: var(--card-bg); border-radius: 8px; }
        .back:hover { background: var(--accent); color: #000; }
        h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; }
        .form { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a2e; color: #eee; font-size: 1rem; }
        .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--accent); }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .items { margin-bottom: 20px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
        .item-row input { padding: 10px; border-radius: 8px; border: 2px solid #333; background: #1a1a2e; color: #eee; }
        .remove-btn { background: #ff6b6b; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        .add-item-btn { width: 100%; padding: 12px; background: transparent; border: 2px dashed #444; border-radius: 10px; color: #888; cursor: pointer; margin-bottom: 20px; }
        .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.3s; margin-bottom: 10px; }
        .btn:hover { transform: scale(1.02); }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid var(--accent); }
        .total { text-align: right; font-size: 1.5rem; color: var(--accent); margin: 20px 0; }
        .ads { margin-top: 30px; text-align: center; min-height: 100px; background: var(--card-bg); border-radius: 10px; padding: 20px; }
        .footer { text-align: center; margin-top: 50px; padding: 30px; color: #666; }
        .footer a { color: var(--accent); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Back to Home</a>
        
        <h1>Invoice Generator</h1>
        <p class="subtitle">Create professional invoices</p>
        
        <div class="form">
            <div class="input-group">
                <label>From (Your Info)</label>
                <textarea id="fromInfo" placeholder="Your Name&#10;Your Address&#10;Email&#10;Phone"></textarea>
            </div>
            
            <div class="input-group">
                <label>To (Client Info)</label>
                <textarea id="toInfo" placeholder="Client Name&#10;Client Address&#10;Email"></textarea>
            </div>
            
            <div class="input-group">
                <label>Invoice Number</label>
                <input type="text" id="invoiceNum" placeholder="INV-001">
            </div>
            
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="invoiceDate">
            </div>
            
            <div class="items">
                <label style="color:var(--accent);font-weight:bold;">Items</label>
                <div id="itemList">
                    <div class="item-row">
                        <input type="text" placeholder="Item name" class="item-name">
                        <input type="number" placeholder="Qty" class="item-qty" value="1" min="1">
                        <input type="number" placeholder="Price" class="item-price" value="0">
                        <button class="remove-btn" onclick="removeItem(this)">×</button>
                    </div>
                </div>
                <button class="add-item-btn" onclick="addItem()">+ Add Item</button>
            </div>
            
            <div class="total">Total: $<span id="totalAmount">0</span></div>
            
            <button class="btn" onclick="calculateTotal()">Calculate Total</button>
            <button class="btn btn-secondary" onclick="previewInvoice()">Preview Invoice</button>
        </div>
        
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
        
        <div class="footer">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
    
    <script>
        document.getElementById('invoiceDate').valueAsDate = new Date();
        
        function addItem() {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" placeholder="Item name" class="item-name">
                <input type="number" placeholder="Qty" class="item-qty" value="1" min="1">
                <input type="number" placeholder="Price" class="item-price" value="0">
                <button class="remove-btn" onclick="removeItem(this)">×</button>
            `;
            document.getElementById('itemList').appendChild(div);
        }
        
        function removeItem(btn) {
            if (document.querySelectorAll('.item-row').length > 1) {
                btn.parentElement.remove();
            }
        }
        
        function calculateTotal() {
            const rows = document.querySelectorAll('.item-row');
            let total = 0;
            rows.forEach(row => {
                const qty = parseInt(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                total += qty * price;
            });
            document.getElementById('totalAmount').textContent = total.toFixed(2);
        }
        
        function previewInvoice() {
            calculateTotal();
            const invoiceNum = document.getElementById('invoiceNum').value;
            const fromInfo = document.getElementById('fromInfo').value;
            const toInfo = document.getElementById('toInfo').value;
            const date = document.getElementById('invoiceDate').value;
            const total = document.getElementById('totalAmount').textContent;
            
            alert(`INVOICE\n\nNo: ${invoiceNum}\nDate: ${date}\n\nFrom:\n${fromInfo}\n\nTo:\n${toInfo}\n\nTotal: $${total}`);
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
