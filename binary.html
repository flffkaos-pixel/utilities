<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이너리 변환 - Binary Text</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>0️⃣1️⃣</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        textarea { width: 100%; min-height: 100px; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 0.9rem; font-family: monospace; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 8px; font-family: monospace; font-size: 0.85rem; min-height: 60px; word-break: break-all; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">0️⃣1️⃣ 바이너리</span>
            <span class="en">0️⃣1️⃣ Binary Text</span>
        </h1>
        
        <div class="description">
            <span class="ko">텍스트를 2진수로 변환하거나 역변환합니다.</span>
            <span class="en">Convert text to binary or back to text.</span>
        </div>
        
        <textarea id="input" placeholder="Hello" oninput="convert()"></textarea>
        
        <div class="btn-group">
            <button class="btn" onclick="encode()">→ 바이너리</button>
            <button class="btn" onclick="decode()">→ 텍스트</button>
            <button class="btn" onclick="copyResult()">Copy</button>
        </div>
        
        <div class="result" id="result"></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function encode() {
            const text = document.getElementById('input').value;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += text[i].charCodeAt(0).toString(2).padStart(8, '0') + ' ';
            }
            document.getElementById('result').textContent = result.trim();
        }
        
        function decode() {
            const text = document.getElementById('input').value;
            let result = '';
            const bytes = text.trim().split(/\s+/);
            for (let byte of bytes) {
                result += String.fromCharCode(parseInt(byte, 2));
            }
            document.getElementById('result').textContent = result;
        }
        
        function convert() {
            const text = document.getElementById('input').value;
            if (text.match(/^[01\s]+$/)) {
                decode();
            } else {
                encode();
            }
        }
        
        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('result').textContent);
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
