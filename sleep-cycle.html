<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">수면 주기 계산기</span><span class="lang-en">Sleep Cycle Calculator</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">깨는 시간이 또는 자고 싶은 시간을 기준으로 최적의 수면 시간을 계산합니다.</span><span class="lang-en">Calculate optimal sleep times based on 90-min cycles.</span></p>
<div class="mb-4"><label class="block mb-2 font-medium"><span class="lang-ko">깨이고 싶은 시간</span><span class="lang-en">Wake up time</span></label><input id="scw" type="time" value="07:00" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700" oninput="calcSleep()"></div><div id="scr" class="space-y-2"><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg flex justify-between"><span>22:00</span><span class="text-green-600 font-bold">✔ 6 cycles</span></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg flex justify-between"><span>23:30</span><span class="text-green-600 font-bold">✔ 5 cycles</span></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg flex justify-between"><span>01:00</span><span class="text-yellow-500">⚠ 4 cycles</span></div></div>
</div>

<script>
function calcSleep(){var t=document.getElementById("scw").value;var parts=t.split(":");var wh=parseInt(parts[0])||7;var wm=parseInt(parts[1])||0;var total=wh*60+wm;var html="";for(var c=6;c>=3;c--){var mins=c*90+15;var st=((total-mins)+1440)%1440;var h=Math.floor(st/60);var m=st%60;html+="<div class=\"p-3 bg-slate-100 dark:bg-slate-700 rounded-lg flex justify-between\"><span>"+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+"</span><span class=\"font-bold "+(c>=5?"text-green-600":c>=4?"text-yellow-500":"text-red-500")+"\">"+c+" cycles</span></div>";}document.getElementById("scr").innerHTML=html;}calcSleep();
</script>
