<body><div class="max-w-md mx-auto space-y-4"><div><label class="block text-sm font-medium mb-1"><span class="lang-ko">숫자</span><span class="lang-en">Number</span></label><input id="rootNum" type="number" value="27" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label class="block text-sm font-medium mb-1"><span class="lang-ko">n (차수)</span><span class="lang-en">n (Degree)</span></label><input id="rootN" type="number" value="3" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label class="block text-sm font-medium mb-1"><span class="lang-ko">소수점 자리</span><span class="lang-en">Decimal Places</span></label><input id="rootPrec" type="number" value="6" min="0" max="15" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><button onclick="calcRoot()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium"><span class="lang-ko">계산</span><span class="lang-en">Calculate</span></button><div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 text-center"><div id="rootStep" class="text-sm text-slate-500 dark:text-slate-300">∛(27) = 27^(1/3)</div><div id="rootAnswer" class="text-3xl font-bold mt-1">3</div></div></div><script>function calcRoot(){var num=parseFloat(document.getElementById("rootNum").value)||0;var n=parseFloat(document.getElementById("rootN").value)||2;var prec=parseInt(document.getElementById("rootPrec").value)||6;var r=Math.pow(num,1/n);document.getElementById("rootStep").textContent="∛("+num+") = "+num+"^(1/"+n+")";document.getElementById("rootAnswer").textContent=r.toFixed(prec)}</script></body>
