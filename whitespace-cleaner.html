</header><main class="max-w-5xl mx-auto px-4 py-6">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8">
<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">공백 정리 - 텍스트 공백 제거 및 정리</span><span class="lang-en">Whitespace Cleaner - Remove and Normalize Whitespace</span></h1>

<div class="space-y-4">
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">텍스트 입력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Input text</span>
<textarea id="wcInput" class="wc-textarea" rows="6" placeholder='Paste text with extra whitespace...'></textarea></div>
<div class="flex flex-wrap gap-4 text-sm">
<label><input type="checkbox" id="wcTrimLines" checked> <span class="lang-ko">각 줄 앞뒤 공백 제거</span><span class="lang-en">Trim lines</span></label>
<label><input type="checkbox" id="wcRemoveBlank" checked> <span class="lang-ko">빈 줄 제거</span><span class="lang-en">Remove blank lines</span></label>
<label><input type="checkbox" id="wcNormalizeSpaces" checked> <span class="lang-ko">여러 공백을 하나로</span><span class="lang-en">Normalize spaces</span></label>
<label><input type="checkbox" id="wcRemoveTabs"> <span class="lang-ko">탭 제거</span><span class="lang-en">Remove tabs</span></label>
<label><input type="checkbox" id="wcStripGlobal"> <span class="lang-ko">전체 앞뒤 공백 제거</span><span class="lang-en">Strip global</span></label></div>
<button id="wcClean" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition"><span class="lang-ko">정리하기</span><span class="lang-en">Clean</span></button>
<div id="wcInfo" class="text-sm text-on-surface-variant"></div>
<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">결과</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Result</span>
<div class="relative"><textarea id="wcOutput" class="wc-textarea" rows="6" readonly></textarea>
<button id="wcCopy" class="absolute top-2 right-2 bg-primary text-white text-xs px-2 py-1 rounded hover:bg-blue-700 transition"><span class="lang-ko">복사</span><span class="lang-en">Copy</span></button></div></div></div>
<script>
var inp=document.getElementById('wcInput'),out=document.getElementById('wcOutput'),info=document.getElementById('wcInfo');
function clean(){var t=inp.value;if(document.getElementById('wcRemoveTabs').checked)t=t.replace(/\t/g,' ');if(document.getElementById('wcStripGlobal').checked)t=t.trim();if(document.getElementById('wcTrimLines').checked)t=t.split('\n').map(function(l){return l.trim()}).join('\n');if(document.getElementById('wcRemoveBlank').checked)t=t.split('\n').filter(function(l){return l.trim()!==''}).join('\n');if(document.getElementById('wcNormalizeSpaces').checked)t=t.replace(/[ ]+/g,' ');out.value=t;info.textContent='Chars: '+t.length+' | Lines: '+(t?t.split('\n').length:0);}
document.getElementById('wcClean').addEventListener('click',clean);
document.getElementById('wcCopy').addEventListener('click',function(){out.select();navigator.clipboard.writeText(out.value)});
</script>
</div>
</div>
