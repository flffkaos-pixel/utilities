<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">HTTP 상태 검사</span><span class="lang-en">HTTP Status Checker</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">HTTP 상태 코드의 의미를 확인합니다.</span><span class="lang-en">Look up HTTP status code meanings.</span></p>
<div class="flex gap-2 mb-4"><input id="hsi" type="number" value="404" class="w-24 px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 font-mono text-center" oninput="httpLookup()"></div><div id="hsr" class="p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center"><div id="hscode" class="text-4xl font-bold text-red-500">404</div><div id="hsname" class="text-xl font-semibold mt-2">Not Found</div><div id="hsdesc" class="text-sm text-slate-500 mt-2">The server cannot find the requested resource.</div></div>
</div>

<script>
var httpCodes={"100":"Continue","200":"OK","201":"Created","204":"No Content","301":"Moved Permanently","302":"Found","304":"Not Modified","400":"Bad Request","401":"Unauthorized","403":"Forbidden","404":"Not Found","405":"Method Not Allowed","408":"Request Timeout","429":"Too Many Requests","500":"Internal Server Error","502":"Bad Gateway","503":"Service Unavailable","504":"Gateway Timeout"};var httpDesc={"100":"The server has received the request headers.","200":"The request succeeded.","201":"A new resource was created.","204":"No content to send.","301":"The URL has been permanently moved.","302":"The URL has been temporarily moved.","400":"The server cannot process the request due to client error.","401":"Authentication is required.","403":"The client does not have access rights.","404":"The server cannot find the requested resource.","500":"The server encountered an unexpected condition.","503":"The server is temporarily unable to handle the request."};function httpLookup(){var c=document.getElementById("hsi").value;document.getElementById("hscode").textContent=c||"-";document.getElementById("hsname").textContent=httpCodes[c]||"Unknown";document.getElementById("hsdesc").textContent=httpDesc[c]||"";document.getElementById("hscode").style.color=c>=400?"#ef4444":c>=300?"#f59e0b":"#10b981";}httpLookup();
</script>

<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
