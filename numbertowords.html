<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">숫자를 한글 문자로 변환합니다.</span><span class="lang-en">Convert numbers to Korean words.</span></p>
<div class="mb-4"><input id="nwi" type="number" value="1234567" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 font-mono" oninput="num2w()"></div><div id="nwr" class="p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-lg font-bold text-primary text-center">'uc77c백이십삼만사천오백육십칠</div>
</div>

<script>
function num2w(){var v=parseInt(document.getElementById("nwi").value)||0;var units=["","십","백","천"];var larges=["","만","억","조"];if(v===0){document.getElementById("nwr").textContent="영";return;}var s=v.toString();var r="";var parts=[];while(s.length>0){parts.push(s.slice(-4));s=s.slice(0,-4);}for(var i=0;i<parts.length;i++){var p=parts[i];var partStr="";for(var j=0;j<p.length;j++){var d=parseInt(p[j]);if(d>0||(j==p.length-1&&partStr==="")){if(d>1||j===p.length-1||d===0)partStr+="일이삼사오육칠팔구".charAt(d-1);if(j<p.length-1)partStr+=units[p.length-1-j];}}if(partStr)r=(i>0?partStr+larges[i]:"")+r;}document.getElementById("nwr").textContent=r;}
</script>
