<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 분석기 - Text Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        textarea { width: 100%; min-height: 150px; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--card-bg); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-box .value { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .stat-box .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
        .readability { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-top: 15px; }
        .readability h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; }
        .readability .score { font-size: 1.2rem; color: var(--text); }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">📊 텍스트 분석기</span>
            <span class="en">📊 Text Analyzer</span>
        </h1>
        
        <div class="description">
            <span class="ko">텍스트의 문자 수, 단어 수, 줄 수를 분석합니다.</span>
            <span class="en">Analyze text - character, word, and line counts.</span>
        </div>
        
        <textarea id="text" placeholder="분석할 텍스트를 입력하세요..." oninput="analyze()"></textarea>
        
        <div class="stats">
            <div class="stat-box">
                <div class="value" id="chars">0</div>
                <div class="label"><span class="ko">글자 수</span><span class="en">Characters</span></div>
            </div>
            <div class="stat-box">
                <div class="value" id="words">0</div>
                <div class="label"><span class="ko">단어 수</span><span class="en">Words</span></div>
            </div>
            <div class="stat-box">
                <div class="value" id="lines">0</div>
                <div class="label"><span class="ko">줄 수</span><span class="en">Lines</span></div>
            </div>
            <div class="stat-box">
                <div class="value" id="spaces">0</div>
                <div class="label"><span class="ko">공백 수</span><span class="en">Spaces</span></div>
            </div>
        </div>
        
        <div class="readability">
            <h3><span class="ko">가독성 점수</span><span class="en">Readability Score</span></h3>
            <div class="score" id="readability">-</div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function analyze() {
            const text = document.getElementById('text').value;
            
            const chars = text.length;
            const spaces = (text.match(/ /g) || []).length;
            const lines = text ? text.split('\n').length : 0;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            
            document.getElementById('chars').textContent = chars;
            document.getElementById('words').textContent = words;
            document.getElementById('lines').textContent = lines;
            document.getElementById('spaces').textContent = spaces;
            
            const score = calculateReadability(text, words, sentences);
            const isKo = document.body.classList.contains('lang-ko');
            const labels = isKo 
                ? ['매우 어려움', '어려움', '보통', '쉬움', '매우 쉬움']
                : ['Very Hard', 'Hard', 'Normal', 'Easy', 'Very Easy'];
            
            let label = '-';
            if (score >= 80) label = labels[4];
            else if (score >= 60) label = labels[3];
            else if (score >= 40) label = labels[2];
            else if (score >= 20) label = labels[1];
            else if (score > 0) label = labels[0];
            
            document.getElementById('readability').textContent = label;
        }
        
        function calculateReadability(text, words, sentences) {
            if (!text.trim()) return 0;
            const sentences = text.split(/[.!?]+/).filter(s => s.trim()).length || 1;
            const avgWordsPerSentence = words / sentences;
            const avgCharsPerWord = text.replace(/\s/g, '').length / words;
            
            let score = 100 - (avgWordsPerSentence * 2 + avgCharsPerWord * 5);
            return Math.max(0, Math.min(100, score));
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
