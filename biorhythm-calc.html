<body><div class="max-w-lg mx-auto space-y-4"><div><label>Birth Date</label><input id="bioBirth" type="date" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><button onclick="calcBiorhythm()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4"><canvas id="bioCanvas" width="600" height="250" class="w-full"></canvas></div><div id="bioResult" class="grid grid-cols-3 gap-3 text-sm"></div></div><script>function calcBiorhythm(){var birth=new Date(document.getElementById("bioBirth").value);if(isNaN(birth.getTime()))return;var now=new Date();var days=Math.floor((now-birth)/86400000);var cycles=[{name:"Physical",period:23,color:"#ef4444"},{name:"Emotional",period:28,color:"#3b82f6"},{name:"Intellectual",period:33,color:"#22c55e"}];var canvas=document.getElementById("bioCanvas");var ctx=canvas.getContext("2d");var w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.strokeStyle="#cbd5e1";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();for(var d=-15;d<=15;d++){var x=(d+15)/30*w;ctx.strokeStyle="#e2e8f0";ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();if(d%5==0){ctx.fillStyle="#94a3b8";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText(d,x,h-5)}}cycles.forEach(function(c){ctx.strokeStyle=c.color;ctx.lineWidth=2;ctx.beginPath();for(var d=-15;d<=15;d++){var val=Math.sin(2*Math.PI*(days+d)/c.period);var x=(d+15)/30*w;var y=h/2-val*h/2*0.4;if(d==-15)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();var today=Math.sin(2*Math.PI*days/c.period);var pct=(today*100).toFixed(1);ctx.fillStyle=c.color;ctx.font="bold 11px sans-serif";ctx.fillText(c.name+" ("+pct+"%)",10,20+cycles.indexOf(c)*18);ctx.fillStyle=c.color+"44";ctx.font="10px sans-serif";ctx.fillText(days%c.period+"/"+c.period+"d",10,32+cycles.indexOf(c)*18)});var html="";cycles.forEach(function(c){var val=Math.sin(2*Math.PI*days/c.period);var pct=(val*100).toFixed(1);var status=pct>0?"High":"Low";html+='<div class="text-center"><div style="color:'+c.color+'" class="font-bold">'+c.name+'</div><div class="text-lg font-bold">'+pct+"%</div><div>"+status+"</div></div>"});document.getElementById("bioResult").innerHTML=html}</script></body>
