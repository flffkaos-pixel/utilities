{"@context":"https://schema.org","@type":"WebApplication","name":"출산 예정일 계산기","description":"마지막 생리일(LMP)을 기준으로 출산 예정일, 현재 주수, 임신 기간을 계산합니다.","url":"https://freeutilities.pages.dev/pregnancy-calc.html","applicationCategory":"UtilitiesApplication","operatingSystem":"Any (Web Browser)","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"Free Utilities","url":"https://freeutilities.pages.dev/"}}

<body><div class="max-w-md mx-auto space-y-4"><div><label>LMP Date (Last Menstrual Period)</label><input id="pregLmp" type="date" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><button onclick="calcPregnancy()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div id="pregResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 space-y-2 text-sm"></div></div><script>function calcPregnancy(){var lmp=new Date(document.getElementById("pregLmp").value);if(isNaN(lmp.getTime())){document.getElementById("pregResult").innerHTML="Please select a date";return}var due=new Date(lmp);due.setDate(due.getDate()+280);var now=new Date();var diff=now-lmp;var days=Math.floor(diff/86400000);var weeks=Math.floor(days/7);var rem=days%7;var trimester=weeks<13?"1st Trimester":weeks<27?"2nd Trimester":"3rd Trimester";var conception=new Date(lmp);conception.setDate(conception.getDate()+14);document.getElementById("pregResult").innerHTML="<div>Due Date: <b>"+due.toLocaleDateString()+"</b></div><div>Current: <b>"+weeks+"w "+rem+"d</b></div><div>"+trimester+"</div><div>Conception: "+conception.toLocaleDateString()+"</div>"}</script></body>
</html>
