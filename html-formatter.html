<script>
function basicFormat(html){var indent=0;var out='';var parts=[];var last=0;var re=/<\/?[^>]+>/g;var m;while((m=re.exec(html))!==null){if(m.index>last){parts.push({t:'text',v:html.substring(last,m.index)})}parts.push({t:'tag',v:m[0]});last=m.index+m[0].length}if(last<html.length)parts.push({t:'text',v:html.substring(last)});var selfClosing=/^(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)$/i;for(var i=0;i<parts.length;i++){var p=parts[i];if(p.t==='text'){var txt=p.v.trim();if(txt){out+='  '.repeat(indent)+txt+'\n'}}else{var tag=p.v;var isClose=tag.startsWith('</');var isSelfClose=tag.endsWith('/>')||tag.match(/^<([^\s>]+)/)&&selfClosing.test(RegExp.$1);if(isClose)indent=Math.max(0,indent-1);out+='  '.repeat(indent)+tag+'\n';if(!isClose&&!isSelfClose)indent++}}return out.trim()}
document.getElementById('hfFormat').addEventListener('click',function(){var inp=document.getElementById('hfInput').value;var out=document.getElementById('hfOutput');out.value=basicFormat(inp);document.getElementById('hfLines').textContent=out.value.split('\n').length;document.getElementById('hfLinesEn').textContent=out.value.split('\n').length});
document.getElementById('hfMinify').addEventListener('click',function(){var inp=document.getElementById('hfInput').value;var out=document.getElementById('hfOutput');out.value=inp.replace(/>\s+</g,'><').replace(/\s{2,}/g,' ').trim();document.getElementById('hfLines').textContent='1';document.getElementById('hfLinesEn').textContent='1'});
document.getElementById('hfCopy').addEventListener('click',function(){var o=document.getElementById('hfOutput');o.select();navigator.clipboard.writeText(o.value)});
</script>
