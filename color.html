<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>색상 변환 - Color Converter</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .card h2 { font-size: 1rem; margin-bottom: 10px; color: var(--text-muted); }
        input { width: 100%; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; }
        .color-box { width: 100%; height: 80px; border-radius: 10px; margin-top: 15px; border: 2px solid var(--accent); }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; margin-top: 10px; font-family: monospace; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none; }
        body.lang-en .ko { display: none; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">🎨 색상 변환</h1>
        <h1 class="en">🎨 Color Converter</h1>
        
        <div class="card">
            <h2 class="ko">HEX → RGB</h2>
            <h2 class="en">HEX → RGB</h2>
            <input type="text" id="hex" placeholder="#667eea" oninput="hexToRgb()">
            <div class="color-box" id="colorBox"></div>
            <div class="result" id="rgbResult">rgb(102, 126, 234)</div>
        </div>
        
        <div class="card">
            <h2 class="ko">RGB → HEX</h2>
            <h2 class="en">RGB → HEX</h2>
            <input type="text" id="rgb" placeholder="102, 126, 234" oninput="rgbToHex()">
            <div class="result" id="hexResult">#667eea</div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) { document.body.className = lang; localStorage.setItem('util-lang', lang); }
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function hexToRgb() {
            const hex = document.getElementById('hex').value;
            if (hex.startsWith('#') && (hex.length === 4 || hex.length === 7)) {
                let r, g, b;
                if (hex.length === 4) {
                    r = parseInt(hex[1] + hex[1], 16);
                    g = parseInt(hex[2] + hex[2], 16);
                    b = parseInt(hex[3] + hex[3], 16);
                } else {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                }
                document.getElementById('rgbResult').textContent = `rgb(${r}, ${g}, ${b})`;
                document.getElementById('colorBox').style.background = hex;
            }
        }
        
        function rgbToHex() {
            const rgb = document.getElementById('rgb').value.split(',').map(n => parseInt(n.trim()));
            if (rgb.length === 3 && rgb.every(n => !isNaN(n) && n >= 0 && n <= 255)) {
                const hex = '#' + rgb.map(n => n.toString(16).padStart(2, '0')).join('');
                document.getElementById('hexResult').textContent = hex;
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
