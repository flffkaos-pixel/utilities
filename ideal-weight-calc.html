<body><div class="max-w-md mx-auto space-y-4"><div><label>Gender</label><select id="iwGender" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><option value="male">Male</option><option value="female">Female</option></select></div><div><label>Height (cm)</label><input id="iwHeight" type="number" value="175" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><button onclick="calcIdealWeight()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div id="iwResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 space-y-1 text-sm"></div></div><script>function calcIdealWeight(){var gender=document.getElementById("iwGender").value;var h=parseFloat(document.getElementById("iwHeight").value)||0;var hIn=h/2.54;var base=gender=="male"?52:49;var factor=gender=="male"?1.9:1.7;var devine=base+factor*(hIn-60);var robinson=gender=="male"?52+1.9*(hIn-60):49+1.7*(hIn-60);var miller=gender=="male"?56.2+1.41*(hIn-60):53.1+1.36*(hIn-60);var hamwi=gender=="male"?48+2.7*((h-152.4)/2.54):45.5+2.2*((h-152.4)/2.54);document.getElementById("iwResult").innerHTML="<div>Devine: "+devine.toFixed(1)+" kg</div><div>Robinson: "+robinson.toFixed(1)+" kg</div><div>Miller: "+miller.toFixed(1)+" kg</div><div>Hamwi: "+hamwi.toFixed(1)+" kg</div>"}</script></body>
