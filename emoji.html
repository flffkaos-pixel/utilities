var allCats = {};
EMOJIS.forEach(function(e){var c=e[2];if(!allCats[c])allCats[c]=[];allCats[c].push(e);});

function renderEmojis(list) {
  var grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  list.forEach(function(e){
    var div = document.createElement('div');
    div.className = 'emoji-cell';
    div.textContent = e[0];
    div.title = e[1];
    div.onclick = function(){copyEmoji(e[0], div);};
    grid.appendChild(div);
  });
  document.getElementById('resultCount').textContent = list.length;
}

function copyEmoji(emoji, el) {
  navigator.clipboard.writeText(emoji).then(function(){
    var all = document.querySelectorAll('.emoji-cell.copied');
    all.forEach(function(a){a.classList.remove('copied');});
    el.classList.add('copied');
    var toast = document.getElementById('toast');
    toast.textContent = (lang==='ko'?'복사됨: ':'Copied: ') + emoji;
    toast.classList.add('show');
    setTimeout(function(){toast.classList.remove('show');},1200);
  });
}

function renderCats() {
  var filter = document.getElementById('catFilter');
  filter.innerHTML = '<button class="cat-btn active" onclick="selectCat(this,\'all\')">' + (lang==='ko'?'전체':'All') + '</button>';
  var catKeys = ['smile','love','heart','cat','animal','food','drink','sport','vehicle','music','symbol','flag','tech','money','party','hand','clothes','flower','fruit','fun','sad','angry','cool','game','tool','science','medical','office','time','nature','travel','search'];
  catKeys.forEach(function(k){
    if(allCats[k]){
      var btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = k.charAt(0).toUpperCase() + k.slice(1);
      btn.onclick = function(){selectCat(this, k);};
      filter.appendChild(btn);
    }
  });
}

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var items = cat === 'all' ? EMOJIS : allCats[cat] || [];
  renderEmojis(items);
}

document.getElementById('emojiSearch').addEventListener('input', function(){
  var q = this.value.toLowerCase().trim();
  if (!q) {
    var active = document.querySelector('.cat-btn.active');
    if (active && active.textContent !== (lang==='ko'?'전체':'All')) {
      active.click();
    } else {
      renderEmojis(EMOJIS);
    }
    return;
  }
  var filtered = EMOJIS.filter(function(e){
    return e[0].toLowerCase().includes(q) || e[1].toLowerCase().includes(q) || e[2].toLowerCase().includes(q);
  });
  renderEmojis(filtered);
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
});

renderCats();
renderEmojis(EMOJIS);
</script>
