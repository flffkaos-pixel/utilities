<body><div class="max-w-md mx-auto space-y-4"><div><label>Weight (kg)</label><input id="dwWeight" type="number" value="70" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"></div><div><label>Activity Level</label><select id="dwActivity" class="w-full p-3 rounded-xl border border-outline bg-white dark:bg-slate-700"><option value="1">Sedentary</option><option value="1.2">Lightly Active</option><option value="1.5" selected>Moderately Active</option><option value="1.8">Very Active</option><option value="2">Extremely Active</option></select></div><button onclick="calcWater()" class="w-full p-3 rounded-xl bg-primary text-white hover:bg-blue-700 font-medium">Calculate</button><div id="dwResult" class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 grid grid-cols-2 gap-2 text-sm"></div></div><script>function calcWater(){var w=parseFloat(document.getElementById("dwWeight").value)||0;var act=parseFloat(document.getElementById("dwActivity").value);var base=w*35;var ml=base*act;document.getElementById("dwResult").innerHTML="<div>ml: <b>"+Math.round(ml)+"</b></div><div>Cups: <b>"+(ml/240).toFixed(1)+"</b></div><div>Glasses: <b>"+(ml/200).toFixed(1)+"</b></div><div>Bottles: <b>"+(ml/500).toFixed(1)+"</b></div>"}</script></body>
