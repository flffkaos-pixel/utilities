<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UtilityHub - 무료 유틸리티</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <meta name="description" content="무료 온라인 유틸리티 도구 모음 - 텍스트, 이미지, PDF, 변환기 등"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
    tailwind.config = {
    darkMode: "class",
    theme: {
    extend: {
    colors: {
    "primary": "#005bbf","primary-container": "#1a73e8","surface": "#f7f9ff","inverse-surface": "#2d3135",
    "on-primary-container": "#ffffff","tertiary": "#795900","tertiary-container": "#987000",
    "surface-container-highest": "#dfe3e8","secondary-fixed-dim": "#6ddd81","on-surface": "#181c20",
    "secondary-container": "#86f898","inverse-primary": "#adc7ff","surface-container-high": "#e5e8ee",
    "on-secondary": "#ffffff","on-surface-variant": "#414754","surface-container": "#ebeef4",
    "surface-dim": "#d7dae0","secondary-fixed": "#89fa9b","primary-fixed": "#d8e2ff",
    "surface-container-low": "#f1f4fa","background": "#f7f9ff","tertiary-fixed": "#ffdfa0",
    "on-secondary-container": "#00722f","error": "#ba1a1a","outline-variant": "#c1c6d6",
    "primary-fixed-dim": "#adc7ff","surface-variant": "#dfe3e8","surface-container-lowest": "#ffffff",
    "secondary": "#006e2c","outline": "#727785"
    },
    fontFamily: {"headline": ["Plus Jakarta Sans"],"body": ["Inter"],"label": ["Inter"]}
    }
    }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased ">
<!-- TopAppBar -->
<header class="bg-[#f7f9ff] dark:bg-[#121417] flex justify-between items-center px-4 h-16 w-full docked full-width top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-[#005bbf] dark:text-[#4791ff]" data-icon="grid_view">grid_view</span>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf] dark:text-[#4791ff] font-headline">UtilityHub</h1>
    </div>
    <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#dfe3e8] dark:hover:bg-[#2a2d35] transition-colors duration-200">
        <span class="material-symbols-outlined text-[#44474e] dark:text-[#c4c6cf]" data-icon="search">search</span>
    </button>
</header>

<main class="max-w-md mx-auto px-4 space-y-12 py-6">
<!-- Hero Section -->
<section class="relative overflow-hidden rounded-3xl p-8 bg-gradient-to-br from-primary to-primary-container text-on-primary-container">
    <div class="absolute -top-12 -right-12 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 space-y-6">
        <div class="space-y-2">
            <span class="text-xs font-bold tracking-widest uppercase opacity-80 font-label">무료 유틸리티</span>
            <h2 class="text-3xl font-extrabold font-headline leading-tight">오늘 필요한 도구는?</h2>
        </div>
        <div class="relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-primary" data-icon="search">search</span>
            </div>
            <input class="w-full bg-surface-container-lowest text-on-surface py-4 pl-12 pr-4 rounded-2xl border-none shadow-xl focus:ring-2 focus:ring-secondary-fixed transition-all placeholder:text-outline" placeholder="50+ 무료 도구 검색..." type="text"/>
        </div>
    </div>
</section>

<!-- Recently Used -->
<section class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant">최근 사용</h3>
        <span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="history">history</span>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-2 custom-scrollbar snap-x">
        <button class="flex-none snap-start w-28 flex flex-col items-center gap-3 p-4 rounded-2xl bg-surface-container-low hover:bg-surface-container-highest transition-colors duration-200" onclick="location.href='text.html'">
            <div class="w-12 h-12 rounded-xl bg-surface-container-lowest flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-primary" data-icon="text_fields">text_fields</span>
            </div>
            <span class="text-[11px] font-semibold text-center">텍스트 도구</span>
        </button>
        <button class="flex-none snap-start w-28 flex flex-col items-center gap-3 p-4 rounded-2xl bg-surface-container-low hover:bg-surface-container-highest transition-colors duration-200" onclick="location.href='unit.html'">
            <div class="w-12 h-12 rounded-xl bg-surface-container-lowest flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-primary" data-icon="straighten">straighten</span>
            </div>
            <span class="text-[11px] font-semibold text-center">단위 변환</span>
        </button>
        <button class="flex-none snap-start w-28 flex flex-col items-center gap-3 p-4 rounded-2xl bg-surface-container-low hover:bg-surface-container-highest transition-colors duration-200" onclick="location.href='bmi.html'">
            <div class="w-12 h-12 rounded-xl bg-surface-container-lowest flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-primary" data-icon="monitor_weight">monitor_weight</span>
            </div>
            <span class="text-[11px] font-semibold text-center">BMI 계산기</span>
        </button>
    </div>
</section>

<!-- Popular Tools Grid -->
<section class="space-y-6">
    <div class="flex items-center justify-between">
        <h3 class="text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant">인기 도구</h3>
        <button class="text-[11px] font-bold text-primary uppercase tracking-wider" onclick="location.href='category.html'">전체 보기</button>
    </div>
    <div class="grid grid-cols-1 gap-4">
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='text.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" data-icon="text_fields">text_fields</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">텍스트 도구</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">대소문자, 공백 제거, 글자 수 세기</p>
            </div>
        </button>
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='color.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-secondary-container/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary" data-icon="palette">palette</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">색상 변환</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">HEX, RGB 색상 상호 변환</p>
            </div>
        </button>
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='unit.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-tertiary-container/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-tertiary" data-icon="straighten">straighten</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">단위 변환</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">길이, 무게, 온도 단위 변환</p>
            </div>
        </button>
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='base64.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" data-icon="code">code</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">Base64</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">인코딩/디코딩</p>
            </div>
        </button>
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='time.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-secondary-container/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-secondary" data-icon="schedule">schedule</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">시간 변환</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">타임스탬프 변환</p>
            </div>
        </button>
        <button class="group flex items-start gap-4 p-5 rounded-3xl bg-surface-container-lowest hover:bg-surface-container shadow-sm transition-all duration-300" onclick="location.href='bmi.html'">
            <div class="flex-shrink-0 w-12 h-12 rounded-2xl bg-tertiary-container/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-tertiary" data-icon="monitor_weight">monitor_weight</span>
            </div>
            <div class="space-y-1">
                <h4 class="font-bold text-sm">BMI 계산기</h4>
                <p class="text-xs text-on-surface-variant leading-relaxed">체질량지수 계산</p>
            </div>
        </button>
    </div>
</section>
</main>

<!-- BottomNavBar -->
<nav class="flex items-center gap-6 px-6 py-4 bg-white border-b"><a href="index.html" class="text-[#005bbf] font-bold">홈</a><a href="category.html" class="text-gray-600 hover:text-[#005bbf]">카테고리</a><a href="history.html" class="text-gray-600 hover:text-[#005bbf]">기록</a><a href="profile.html" class="text-gray-600 hover:text-[#005bbf]">프로필</a></nav>
</body>
</html>
