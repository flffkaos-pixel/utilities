<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진법 변환 - Base Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .input-section { margin-bottom: 20px; }
        .input-section h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 12px; }
        .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .input-row label { min-width: 80px; font-size: 0.85rem; color: var(--text-muted); }
        .input-row input { flex: 1; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; font-family: monospace; }
        .input-row input:focus { outline: 2px solid var(--accent); }
        .input-row .clear-btn { padding: 8px 12px; background: var(--card-bg); color: var(--text-muted); border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .input-row .clear-btn:hover { color: var(--accent); }
        .results { background: var(--card-bg); padding: 15px; border-radius: 10px; }
        .results h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .result-row:last-child { border-bottom: none; }
        .result-row label { font-size: 0.85rem; color: var(--text-muted); }
        .result-row span { font-family: monospace; font-size: 0.95rem; color: var(--text); cursor: pointer; }
        .result-row span:hover { color: var(--accent); }
        .copy-hint { font-size: 0.75rem; color: var(--text-muted); opacity: 0; transition: opacity 0.2s; margin-left: 8px; }
        .result-row:hover .copy-hint { opacity: 1; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔢 진법 변환</span>
            <span class="en">🔢 Base Converter</span>
        </h1>
        
        <div class="description">
            <span class="ko">아무 진수나 입력하면 모든 진법으로 변환됩니다. 결과를 클릭하면 복사됩니다.</span>
            <span class="en">Enter any base to convert to all bases. Click result to copy.</span>
        </div>
        
        <div class="input-section">
            <h3><span class="ko">입력</span><span class="en">Input</span></h3>
            <div class="input-row">
                <label>2진수</label>
                <input type="text" id="binary" placeholder="11111111" oninput="fromBase(2, 'binary')">
                <button class="clear-btn" onclick="clearInput('binary')">✕</button>
            </div>
            <div class="input-row">
                <label>8진수</label>
                <input type="text" id="octal" placeholder="377" oninput="fromBase(8, 'octal')">
                <button class="clear-btn" onclick="clearInput('octal')">✕</button>
            </div>
            <div class="input-row">
                <label>10진수</label>
                <input type="text" id="decimal" placeholder="255" oninput="fromBase(10, 'decimal')">
                <button class="clear-btn" onclick="clearInput('decimal')">✕</button>
            </div>
            <div class="input-row">
                <label>16진수</label>
                <input type="text" id="hex" placeholder="FF" oninput="fromBase(16, 'hex')">
                <button class="clear-btn" onclick="clearInput('hex')">✕</button>
            </div>
            <div class="input-row">
                <label>32진수</label>
                <input type="text" id="base32" placeholder="7V" oninput="fromBase(32, 'base32')">
                <button class="clear-btn" onclick="clearInput('base32')">✕</button>
            </div>
        </div>
        
        <div class="results">
            <h3><span class="ko">변환 결과</span><span class="en">Converted</span></h3>
            <div class="result-row"><label>2진수</label><span onclick="copy(this)" class="copy-hint">클릭</span><span id="r-binary">-</span></div>
            <div class="result-row"><label>8진수</label><span onclick="copy(this)" class="copy-hint">클릭</span><span id="r-octal">-</span></div>
            <div class="result-row"><label>10진수</label><span onclick="copy(this)" class="copy-hint">클릭</span><span id="r-decimal">-</span></div>
            <div class="result-row"><label>16진수</label><span onclick="copy(this)" class="copy-hint">클릭</span><span id="r-hex">-</span></div>
            <div class="result-row"><label>32진수</label><span onclick="copy(this)" class="copy-hint">클릭</span><span id="r-base32">-</span></div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        let isConverting = false;
        
        function fromBase(base, sourceId) {
            if (isConverting) return;
            const input = document.getElementById(sourceId).value.trim();
            if (!input) {
                clearAll();
                return;
            }
            try {
                let dec;
                if (base === 32) {
                    dec = fromBase32(input);
                } else {
                    dec = BigInt(input, base);
                }
                if (isNaN(dec)) throw new Error('Invalid');
                isConverting = true;
                document.getElementById('r-binary').textContent = dec.toString(2);
                document.getElementById('r-octal').textContent = dec.toString(8);
                document.getElementById('r-decimal').textContent = dec.toString(10);
                document.getElementById('r-hex').textContent = dec.toString(16).toUpperCase();
                document.getElementById('r-base32').textContent = toBase32(dec);
                
                if (sourceId !== 'binary') document.getElementById('binary').value = dec.toString(2);
                if (sourceId !== 'octal') document.getElementById('octal').value = dec.toString(8);
                if (sourceId !== 'decimal') document.getElementById('decimal').value = dec.toString(10);
                if (sourceId !== 'hex') document.getElementById('hex').value = dec.toString(16).toUpperCase();
                if (sourceId !== 'base32') document.getElementById('base32').value = toBase32(dec);
                isConverting = false;
            } catch(e) {
                clearAll();
            }
        }
        
        function toBase32(n) {
            if (n === 0n) return '0';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let arr = [];
            while (n > 0n) {
                arr.push(chars[Number(n & 31n)]);
                n = n >> 5n;
            }
            return arr.reverse().join('');
        }
        
        function fromBase32(str) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let result = 0n;
            for (let i = 0; i < str.length; i++) {
                const char = str[i].toUpperCase();
                const idx = chars.indexOf(char);
                if (idx === -1) throw new Error('Invalid');
                result = result * 32n + BigInt(idx);
            }
            return result;
        }
        
        function clearInput(id) {
            document.getElementById(id).value = '';
            if (id === 'binary' || id === 'octal' || id === 'decimal' || id === 'hex' || id === 'base32') {
                clearAll();
            }
        }
        
        function clearAll() {
            ['binary', 'octal', 'decimal', 'hex', 'base32'].forEach(id => {
                document.getElementById(id).value = '';
            });
            ['r-binary', 'r-octal', 'r-decimal', 'r-hex', 'r-base32'].forEach(id => {
                document.getElementById(id).textContent = '-';
            });
        }
        
        function copy(el) {
            const text = el.previousElementSibling?.textContent || el.textContent;
            if (text && text !== '-') {
                navigator.clipboard.writeText(text);
                const original = el.textContent;
                const isKo = document.body.classList.contains('lang-ko');
                el.textContent = isKo ? '복사!' : 'Copied!';
                setTimeout(() => el.textContent = original, 1000);
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
