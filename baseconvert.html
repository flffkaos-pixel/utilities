<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진법 변환 - Base Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .input-row label { min-width: 70px; font-size: 0.85rem; color: var(--text-muted); }
        .input-row input { flex: 1; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; font-family: monospace; }
        .input-row input:focus { outline: 2px solid var(--accent); }
        .results { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .results h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; cursor: pointer; }
        .result-row:last-child { border-bottom: none; }
        .result-row:hover span { color: var(--accent); }
        .result-row label { font-size: 0.85rem; color: var(--text-muted); }
        .result-row span { font-family: monospace; font-size: 0.95rem; color: var(--text); }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔢 진법 변환</span>
            <span class="en">🔢 Base Converter</span>
        </h1>
        
        <div class="description">
            <span class="ko">아무 진수나 입력하면 모든 진법으로 변환됩니다. 결과를 클릭하면 복사됩니다.</span>
            <span class="en">Enter any base to convert to all bases. Click result to copy.</span>
        </div>
        
        <div class="input-section">
            <div class="input-row">
                <label>2진수</label>
                <input type="text" id="binary" placeholder="11111111" oninput="convert(2)">
            </div>
            <div class="input-row">
                <label>8진수</label>
                <input type="text" id="octal" placeholder="377" oninput="convert(8)">
            </div>
            <div class="input-row">
                <label>10진수</label>
                <input type="text" id="decimal" placeholder="255" oninput="convert(10)">
            </div>
            <div class="input-row">
                <label>16진수</label>
                <input type="text" id="hex" placeholder="FF" oninput="convert(16)">
            </div>
        </div>
        
        <div class="results">
            <h3><span class="ko">변환 결과 (클릭하여 복사)</span><span class="en">Converted (Click to copy)</span></h3>
            <div class="result-row" onclick="copy('binary')"><label>2진수</label><span id="r-binary">-</span></div>
            <div class="result-row" onclick="copy('octal')"><label>8진수</label><span id="r-octal">-</span></div>
            <div class="result-row" onclick="copy('decimal')"><label>10진수</label><span id="r-decimal">-</span></div>
            <div class="result-row" onclick="copy('hex')"><label>16진수</label><span id="r-hex">-</span></div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        let currentDecimal = null;
        
        function convert(base) {
            const ids = { 2: 'binary', 8: 'octal', 10: 'decimal', 16: 'hex' };
            const inputId = ids[base];
            const input = document.getElementById(inputId).value.trim();
            
            if (!input) {
                currentDecimal = null;
                document.getElementById('r-binary').textContent = '-';
                document.getElementById('r-octal').textContent = '-';
                document.getElementById('r-decimal').textContent = '-';
                document.getElementById('r-hex').textContent = '-';
                return;
            }
            
            try {
                currentDecimal = BigInt(input, base);
                document.getElementById('r-binary').textContent = currentDecimal.toString(2);
                document.getElementById('r-octal').textContent = currentDecimal.toString(8);
                document.getElementById('r-decimal').textContent = currentDecimal.toString(10);
                document.getElementById('r-hex').textContent = currentDecimal.toString(16).toUpperCase();
            } catch(e) {
                currentDecimal = null;
                document.getElementById('r-binary').textContent = 'Error';
                document.getElementById('r-octal').textContent = 'Error';
                document.getElementById('r-decimal').textContent = 'Error';
                document.getElementById('r-hex').textContent = 'Error';
            }
        }
        
        function copy(id) {
            const text = document.getElementById('r-' + id).textContent;
            if (text && text !== '-' && text !== 'Error') {
                navigator.clipboard.writeText(text);
                const isKo = document.body.classList.contains('lang-ko');
                const el = document.getElementById('r-' + id);
                const original = el.textContent;
                el.textContent = isKo ? '복사됨!' : 'Copied!';
                setTimeout(() => el.textContent = original, 800);
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
