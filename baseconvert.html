<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">2진수, 8진수, 10진수, 16진수 간 변환을 지원합니다.</span><span class="lang-en">Convert between binary, octal, decimal, hexadecimal.</span></p>
<div class="flex gap-2 mb-4"><input id="bcv" class="flex-1 px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 font-mono" value="255" oninput="convb()"><select id="bcf" class="px-3 py-2 border border-border rounded-lg bg-white dark:bg-slate-700" onchange="convb()"><option value="2">Bin</option><option value="8">Oct</option><option value="10" selected>Dec</option><option value="16">Hex</option></select></div><div class="grid grid-cols-2 gap-3"><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div class="text-xs text-slate-500">Bin</div><div id="bc2" class="font-mono font-bold text-lg">11111111</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div class="text-xs text-slate-500">Oct</div><div id="bc8" class="font-mono font-bold text-lg">377</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div class="text-xs text-slate-500">Dec</div><div id="bc10" class="font-mono font-bold text-lg">255</div></div><div class="p-3 bg-slate-100 dark:bg-slate-700 rounded-lg"><div class="text-xs text-slate-500">Hex</div><div id="bc16" class="font-mono font-bold text-lg">FF</div></div></div>
</div>

<script>
function convb(){var v=parseInt(document.getElementById("bcv").value,document.getElementById("bcf").value);if(isNaN(v))return;document.getElementById("bc2").textContent=v.toString(2);document.getElementById("bc8").textContent=v.toString(8);document.getElementById("bc10").textContent=v.toString(10);document.getElementById("bc16").textContent=v.toString(16).toUpperCase();}
</script>
