<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진법 변환 - Base Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1.1rem; font-family: monospace; }
        .input-group input:focus { outline: 2px solid var(--accent); }
        .results { background: var(--card-bg); padding: 15px; border-radius: 10px; }
        .results h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .result-row:last-child { border-bottom: none; }
        .result-row label { font-size: 0.85rem; color: var(--text-muted); }
        .result-row span { font-family: monospace; font-size: 0.95rem; color: var(--text); cursor: pointer; }
        .result-row span:hover { color: var(--accent); }
        .copy-hint { font-size: 0.75rem; color: var(--text-muted); opacity: 0; transition: opacity 0.2s; }
        .result-row:hover .copy-hint { opacity: 1; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔢 진법 변환</span>
            <span class="en">🔢 Base Converter</span>
        </h1>
        
        <div class="description">
            <span class="ko">10진수 입력하면 모든 진법으로 자동 변환됩니다. 결과를 클릭하면 복사됩니다.</span>
            <span class="en">Enter decimal and convert to all bases. Click result to copy.</span>
        </div>
        
        <div class="input-group">
            <label><span class="ko">10진수 입력</span><span class="en">Enter Decimal</span></label>
            <input type="text" id="decimal" placeholder="255" oninput="convert()">
        </div>
        
        <div class="results">
            <h3><span class="ko">변환 결과</span><span class="en">Converted</span></h3>
            <div class="result-row"><label>2진수 (Binary)</label><span onclick="copy(this)" class="copy-hint">클릭복사</span><span id="binary">-</span></div>
            <div class="result-row"><label>8진수 (Octal)</label><span onclick="copy(this)" class="copy-hint">클릭복사</span><span id="octal">-</span></div>
            <div class="result-row"><label>16진수 (Hex)</label><span onclick="copy(this)" class="copy-hint">클릭복사</span><span id="hex">-</span></div>
            <div class="result-row"><label>32진수 (Base32)</label><span onclick="copy(this)" class="copy-hint">클릭복사</span><span id="base32">-</span></div>
            <div class="result-row"><label>64진수 (Base64)</label><span onclick="copy(this)" class="copy-hint">클릭복사</span><span id="base64">-</span></div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function convert() {
            const input = document.getElementById('decimal').value.trim();
            if (!input) {
                ['binary', 'octal', 'hex', 'base32', 'base64'].forEach(id => document.getElementById(id).textContent = '-');
                return;
            }
            try {
                const dec = BigInt(input);
                document.getElementById('binary').textContent = dec.toString(2);
                document.getElementById('octal').textContent = dec.toString(8);
                document.getElementById('hex').textContent = dec.toString(16).toUpperCase();
                document.getElementById('base32').textContent = toBase32(dec);
                document.getElementById('base64').textContent = toBase64(dec);
            } catch(e) {
                ['binary', 'octal', 'hex', 'base32', 'base64'].forEach(id => document.getElementById(id).textContent = 'Error');
            }
        }
        
        function toBase32(n) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            if (n === 0n) return '0';
            let arr = [];
            while (n > 0n) {
                arr.push(chars[Number(n & 31n)]);
                n = n >> 5n;
            }
            return arr.reverse().join('');
        }
        
        function toBase64(n) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
            if (n === 0n) return '0';
            let arr = [];
            while (n > 0n) {
                arr.push(chars[Number(n & 63n)]);
                n = n >> 6n;
            }
            return arr.reverse().join('');
        }
        
        function copy(el) {
            const text = el.previousElementSibling?.textContent || el.textContent;
            if (text && text !== '-') {
                navigator.clipboard.writeText(text);
                const original = el.textContent;
                const isKo = document.body.classList.contains('lang-ko');
                el.textContent = isKo ? '복사됨!' : 'Copied!';
                setTimeout(() => el.textContent = original, 1000);
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
