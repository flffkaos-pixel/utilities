<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진법 변환 - Base Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        input { width: 100%; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 1rem; font-family: monospace; margin-bottom: 15px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; font-family: monospace; font-size: 0.9rem; word-break: break-all; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔢 진법 변환</span>
            <span class="en">🔢 Base Converter</span>
        </h1>
        
        <div class="description">
            <span class="ko">2진수, 8진수, 10진수, 16진수 간 변환합니다.</span>
            <span class="en">Convert between binary, octal, decimal, and hexadecimal.</span>
        </div>
        
        <input type="text" id="decimal" placeholder="10진수 (예: 255) / Decimal (e.g. 255)" oninput="fromDec('decimal')">
        <input type="text" id="hex" placeholder="16진수 (예: FF) / Hex (e.g. FF)" oninput="fromDec('hex')">
        <input type="text" id="binary" placeholder="2진수 (예: 11111111) / Binary (e.g. 11111111)" oninput="fromDec('binary')">
        <input type="text" id="octal" placeholder="8진수 (예: 377) / Octal (e.g. 377)" oninput="fromDec('octal')">
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function fromDec(source) {
            let dec = 0;
            try {
                if (source === 'decimal') dec = parseInt(document.getElementById('decimal').value, 10);
                else if (source === 'hex') dec = parseInt(document.getElementById('hex').value, 16);
                else if (source === 'binary') dec = parseInt(document.getElementById('binary').value, 2);
                else if (source === 'octal') dec = parseInt(document.getElementById('octal').value, 8);
            } catch(e) { return; }
            if (isNaN(dec)) return;
            if (source !== 'decimal') document.getElementById('decimal').value = dec;
            if (source !== 'hex') document.getElementById('hex').value = dec.toString(16).toUpperCase();
            if (source !== 'binary') document.getElementById('binary').value = dec.toString(2);
            if (source !== 'octal') document.getElementById('octal').value = dec.toString(8);
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
