<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">SVG 파일을 PNG 이미지로 변환합니다.</span><span class="lang-en">Convert SVG files to PNG images.</span></p>
<textarea id="svgi" class="w-full h-32 px-4 py-3 border border-border rounded-lg bg-white dark:bg-slate-700 dark:border-slate-600 font-mono text-sm mb-4" placeholder='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="red"/></svg>'></textarea><button onclick="svg2png()" class="px-4 py-2 bg-primary text-white rounded-lg font-medium mb-4">Convert to PNG</button><div id="svgr" class="text-center"></div>
</div>

<script>
function svg2png(){var svg=document.getElementById("svgi").value;var blob=new Blob([svg],{type:"image/svg+xml"});var u=URL.createObjectURL(blob);var img=new Image();img.onload=function(){var c=document.createElement("canvas");c.width=200;c.height=200;var ctx=c.getContext("2d");ctx.drawImage(img,0,0,200,200);var p=document.createElement("canvas");p.width=200;p.height=200;var pctx=p.getContext("2d");pctx.fillStyle="#fff";pctx.fillRect(0,0,200,200);pctx.drawImage(img,0,0,200,200);var pu=p.toDataURL("image/png");document.getElementById("svgr").innerHTML="<img src='"+pu+"' class='max-w-full max-h-48 mx-auto'><br><a href='"+pu+"' download='output.png' class='text-primary underline'>Download PNG</a>";};img.src=u;}
</script>
</main>

<script>

var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
