<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>카테고리 - UtilityHub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
    tailwind.config = {
    darkMode: "class",
    theme: {
    extend: {
    colors: {
    "primary": "#005bbf","primary-container": "#1a73e8","surface": "#f7f9ff",
    "on-surface": "#181c20","surface-container-low": "#f1f4fa","surface-container": "#ebeef4",
    "surface-container-highest": "#dfe3e8","surface-container-lowest": "#ffffff",
    "on-surface-variant": "#414754","secondary": "#006e2c","secondary-container": "#86f898",
    "tertiary": "#795900","tertiary-container": "#987000","tertiary-fixed": "#ffdfa0",
    "outline": "#727785","outline-variant": "#c1c6d6","background": "#f7f9ff"
    },
    fontFamily: {"headline": ["Plus Jakarta Sans"],"body": ["Inter"]}
    }
    }
    }
    </script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface ">
<header class="bg-[#f7f9ff] dark:bg-[#121417] flex justify-between items-center px-4 h-16 w-full docked top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'" class="text-[#005bbf] hover:bg-[#dfe3e8] p-2 rounded-full">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf]">UtilityHub</h1>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-6 space-y-6">
<h2 class="text-xs font-bold tracking-widest text-on-surface-variant uppercase">전체 카테고리</h2>
<span class="text-xs font-medium bg-surface-container-high px-2 py-1 rounded-full text-primary">8개 도구</span>

<div class="space-y-3">
<!-- 텍스트 도구 -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='text.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary-fixed text-on-primary-fixed">
            <span class="material-symbols-outlined" data-icon="text_fields">text_fields</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">텍스트 도구</span>
            <span class="text-sm text-on-surface-variant">대소문자, 공백 제거, 글자 수</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<!-- 단위 변환 -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='unit.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-secondary-fixed text-on-secondary-fixed">
            <span class="material-symbols-outlined" data-icon="straighten">straighten</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">단위 변환</span>
            <span class="text-sm text-on-surface-variant">길이, 무게, 온도 변환</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<!-- 색상 변환 -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='color.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-tertiary-fixed text-on-tertiary-fixed">
            <span class="material-symbols-outlined" data-icon="palette">palette</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">색상 변환</span>
            <span class="text-sm text-on-surface-variant">HEX, RGB 상호 변환</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<!-- 시간 변환 -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='time.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary-fixed text-on-primary-fixed">
            <span class="material-symbols-outlined" data-icon="schedule">schedule</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">시간 변환</span>
            <span class="text-sm text-on-surface-variant">타임스탬프 변환</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<!-- Base64 -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='base64.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-secondary-fixed text-on-secondary-fixed">
            <span class="material-symbols-outlined" data-icon="code">code</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">Base64</span>
            <span class="text-sm text-on-surface-variant">인코딩/디코딩</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<!-- BMI -->
<button class="w-full group flex items-center justify-between p-4 bg-surface-container-lowest hover:bg-surface-container-highest transition-all duration-200 rounded-2xl" onclick="location.href='bmi.html'">
    <div class="flex items-center gap-4">
        <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-tertiary-fixed text-on-tertiary-fixed">
            <span class="material-symbols-outlined" data-icon="monitor_weight">monitor_weight</span>
        </div>
        <div class="text-left">
            <span class="block font-bold text-lg">BMI 계산기</span>
            <span class="text-sm text-on-surface-variant">체질량지수 계산</span>
        </div>
    </div>
    <span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>

<nav class="flex items-center gap-6 px-6 py-4 bg-white border-b"><a href="index.html" class="text-[#005bbf] font-bold">홈</a><a href="category.html" class="text-gray-600 hover:text-[#005bbf]">카테고리</a><a href="history.html" class="text-gray-600 hover:text-[#005bbf]">기록</a><a href="profile.html" class="text-gray-600 hover:text-[#005bbf]">프로필</a></nav>
</body>
</html>
