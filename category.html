var catNames = {
  ko: { text: "텍스트 도구", dev: "개발자 도구", calc: "계산기", fun: "기타 도구" },
  en: { text: "Text Tools", dev: "Developer Tools", calc: "Calculators", fun: "Other Tools" }
};
var catIcons = { text: "text_fields", dev: "code", calc: "calculate", fun: "widgets" };

function renderAllTools() {
  var container = document.getElementById('allToolsGrid');
  if (!container) return;
  var cats = ['text', 'dev', 'calc', 'fun'];
  var html = '';
  cats.forEach(function(c) {
    var tools = allTools.filter(function(t) { return t.cat === c; });
    html += '<div class="col-span-full mt-2 mb-1 flex items-center gap-2"><span class="material-symbols-outlined text-primary">' + catIcons[c] + '</span><h3 class="font-h3 text-body-lg font-bold text-on-surface"><span class="lang-ko">' + catNames.ko[c] + '</span><span class="lang-en">' + catNames.en[c] + '</span></h3></div>';
    tools.forEach(function(t) {
      html += '<a href="' + t.file + '" class="group bg-surface-container-lowest p-3 rounded-xl shadow-sm hover:shadow-md transition-all border border-outline-variant/10 flex items-center gap-3">';
      html += '<div class="w-9 h-9 rounded-lg bg-primary-container/10 flex items-center justify-center group-hover:scale-110 transition-transform flex-shrink-0"><span class="material-symbols-outlined text-primary" style="font-size:18px">' + t.icon + '</span></div>';
      html += '<div class="min-w-0"><div class="text-sm font-semibold truncate"><span class="lang-ko">' + t.ko + '</span><span class="lang-en">' + t.en + '</span></div>';
      html += '<div class="text-xs text-on-surface-variant truncate"><span class="lang-ko">' + t.koDesc + '</span><span class="lang-en">' + t.enDesc + '</span></div></div></a>';
    });
  });
  container.innerHTML = html;
  applyLang(lang);
}
renderAllTools();

var searchInput = document.getElementById('searchInput');
searchInput.placeholder = lang === 'ko' ? '도구 검색...' : 'Search tools...';
searchInput.addEventListener('input', function() {
  var q = this.value.toLowerCase();
  var items = document.querySelectorAll('#allToolsGrid > a');
  items.forEach(function(item) {
    var text = item.textContent.toLowerCase();
    item.style.display = text.indexOf(q) > -1 ? '' : 'none';
  });
});
</script>

<script>
var siteLang = localStorage.getItem('site-lang') || 'ko';
document.body.classList.toggle('en', siteLang === 'en');
(function() {
  var btn = document.getElementById('langToggle');
  if (btn) btn.textContent = siteLang === 'ko' ? 'English' : '한국어';
})();
function toggleLang() {
  siteLang = siteLang === 'ko' ? 'en' : 'ko';
  localStorage.setItem('site-lang', siteLang);
  document.body.classList.toggle('en', siteLang === 'en');
  var btn = document.getElementById('langToggle');
  if (btn) btn.textContent = siteLang === 'ko' ? 'English' : '한국어';
}
var darkMode = localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
if (darkMode) document.documentElement.classList.add('dark');
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
  var dt = document.getElementById('darkToggle');
  if (dt) dt.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'HangulMode' || e.keyCode === 229) {
    e.preventDefault();
    toggleLang();
  }
});

</script>
