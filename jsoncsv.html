<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to CSV - JSON CSV 변환</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%230071e3' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%230071e3'/></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #000000; --surface: #1d1d1f; --surface-raised: #272729; --text-primary: #f5f5f7; --text-secondary: rgba(245,245,247,0.7); --accent: #0071e3; --link: #2997ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(29,29,31,0.72); backdrop-filter: blur(20px); }
        .nav-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; padding: 0 22px; height: 48px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-size: 1.06rem; font-weight: 600; }
        .container { max-width: 680px; margin: 0 auto; padding: 32px 22px 60px; }
        .page-header { margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--link); text-decoration: none; font-size: 0.88rem; margin-bottom: 20px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 12px; }
        .description { background: var(--surface); border-radius: 12px; padding: 20px 24px; font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 28px; }
        textarea { width: 100%; min-height: 150px; padding: 16px 20px; background: var(--surface-raised); color: var(--text-primary); border: none; border-radius: 12px; font-size: 0.9rem; font-family: monospace; margin-bottom: 16px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 980px; cursor: pointer; font-size: 0.94rem; }
        .result { padding: 20px 24px; background: var(--surface-raised); border-radius: 12px; min-height: 60px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
        .ads { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#0071e3" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#0071e3"/></svg><span>Utilities</span></a></div></nav>
    <div class="container">
        <div class="page-header"><a href="index.html" class="back-link">← Home</a><h1>JSON ↔ CSV</h1></div>
        <div class="description">JSON을 CSV로 변환하거나 CSV를 JSON으로 변환합니다.</div>
        <textarea id="input" placeholder='[{"name": "홍길동", "age": 20}, {"name": "김철수", "age": 30}]'></textarea>
        <div class="btn-group">
            <button class="btn" onclick="jsonToCsv()">JSON → CSV</button>
            <button class="btn" onclick="csvToJson()">CSV → JSON</button>
        </div>
        <div class="result" id="result"></div>
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <script>
        function jsonToCsv() {
            try {
                const data = JSON.parse(document.getElementById('input').value);
                if (!Array.isArray(data) || data.length === 0) { document.getElementById('result').textContent = '배열 형식의 JSON을 입력하세요'; return; }
                const keys = Object.keys(data[0]);
                const header = keys.join(',');
                const rows = data.map(obj => keys.map(k => JSON.stringify(obj[k] ?? '')).join(','));
                document.getElementById('result').textContent = header + '\n' + rows.join('\n');
            } catch(e) { document.getElementById('result').textContent = '오류: ' + e.message; }
        }
        function csvToJson() {
            try {
                const lines = document.getElementById('input').value.trim().split('\n');
                if (lines.length < 2) { document.getElementById('result').textContent = '헤더와 데이터가 필요합니다'; return; }
                const keys = lines[0].split(',');
                const result = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const obj = {};
                    keys.forEach((k, i) => { obj[k.trim()] = values[i]?.trim() || ''; });
                    return obj;
                });
                document.getElementById('result').textContent = JSON.stringify(result, null, 2);
            } catch(e) { document.getElementById('result').textContent = '오류: ' + e.message; }
        }
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
