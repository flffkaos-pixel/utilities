<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to CSV - JSON CSV 변환</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        textarea { width: 100%; min-height: 150px; padding: 15px; background: var(--input-bg); color: var(--text); border: none; border-radius: 10px; font-size: 0.9rem; font-family: monospace; margin-bottom: 15px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; min-height: 80px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">📊 JSON ↔ CSV</span>
            <span class="en">📊 JSON ↔ CSV</span>
        </h1>
        
        <div class="description">
            <span class="ko">JSON을 CSV로 변환하거나 CSV를 JSON으로 변환합니다.</span>
            <span class="en">Convert JSON to CSV or CSV to JSON.</span>
        </div>
        
        <textarea id="input" placeholder='Enter JSON or CSV... / [{"name": "홍길동", "age": 20}, {"name": "김철수", "age": 30}]'></textarea>
        
        <div class="btn-group">
            <button class="btn" onclick="jsonToCsv()">
                <span class="ko">JSON → CSV</span>
                <span class="en">JSON → CSV</span>
            </button>
            <button class="btn" onclick="csvToJson()">
                <span class="ko">CSV → JSON</span>
                <span class="en">CSV → JSON</span>
            </button>
        </div>
        
        <div class="result" id="result"></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function jsonToCsv() {
            try {
                const data = JSON.parse(document.getElementById('input').value);
                if (!Array.isArray(data) || data.length === 0) {
                    document.getElementById('result').textContent = document.body.classList.contains('lang-ko') ? '배열 형식의 JSON을 입력하세요' : 'Enter JSON array format';
                    return;
                }
                const keys = Object.keys(data[0]);
                const header = keys.join(',');
                const rows = data.map(obj => keys.map(k => JSON.stringify(obj[k] ?? '')).join(','));
                document.getElementById('result').textContent = header + '\n' + rows.join('\n');
            } catch(e) {
                document.getElementById('result').textContent = (document.body.classList.contains('lang-ko') ? '오류: ' : 'Error: ') + e.message;
            }
        }
        
        function csvToJson() {
            try {
                const lines = document.getElementById('input').value.trim().split('\n');
                if (lines.length < 2) {
                    document.getElementById('result').textContent = document.body.classList.contains('lang-ko') ? '헤더와 데이터가 필요합니다' : 'Header and data required';
                    return;
                }
                const keys = lines[0].split(',');
                const result = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const obj = {};
                    keys.forEach((k, i) => { obj[k.trim()] = values[i]?.trim() || ''; });
                    return obj;
                });
                document.getElementById('result').textContent = JSON.stringify(result, null, 2);
            } catch(e) {
                document.getElementById('result').textContent = (document.body.classList.contains('lang-ko') ? '오류: ' : 'Error: ') + e.message;
            }
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
