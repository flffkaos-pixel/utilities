<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">제목 또는 문장 입력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Enter title or sentence</span>

<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">슬러그 결과</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Slug result</span>
<div class="relative"><div id="slugOutput" class="slug-output">hello-world-this-is-great</div>
<button id="slugCopy" class="absolute top-2 right-2 bg-primary text-white text-xs px-2 py-1 rounded hover:bg-blue-700 transition"><span class="lang-ko">복사</span><span class="lang-en">Copy</span></button></div></div>
<div class="flex flex-wrap gap-4">
<div><label class="text-sm text-on-surface-variant block"><span class="lang-ko">구분자</span><span class="lang-en">Separator</span>
<select id="sepSelect" class="ml-2 border border-outline/40 rounded px-2 py-1 text-sm"><option value="-">- (hyphen)</option><option value="_">_ (underscore)</option></select></label></div>
<div><label class="text-sm text-on-surface-variant block"><input type="checkbox" id="lowerToggle" checked>
<span class="lang-ko ml-1">소문자</span><span class="lang-en ml-1">Lowercase</span></label></div>
<div><label class="text-sm text-on-surface-variant block"><span class="lang-ko">최대 길이</span><span class="lang-en">Max length</span>
<input type="range" id="maxLen" min="10" max="200" value="100" class="ml-2 align-middle">
<span id="maxLenVal" class="ml-1 text-sm">100</span></label></div></div></div>
<script>
var inp=document.getElementById('slugInput');var out=document.getElementById('slugOutput');
var sep=document.getElementById('sepSelect');var low=document.getElementById('lowerToggle');
var mx=document.getElementById('maxLen');var mxv=document.getElementById('maxLenVal');
function update(){var t=inp.value||'';var s=sep.value;var l=t.replace(/[^\w\s-]/g,'').trim();l=l.replace(/[\s_]+/g,s).replace(/-+/g,s);if(low.checked)l=l.toLowerCase();var ml=parseInt(mx.value);if(l.length>ml)l=l.substring(0,ml).replace(new RegExp(s+'+$'),'');out.textContent=l||'-';mxv.textContent=mx.value;}
inp.addEventListener('input',update);sep.addEventListener('change',update);low.addEventListener('change',update);mx.addEventListener('input',update);update();
document.getElementById('slugCopy').addEventListener('click',function(){navigator.clipboard.writeText(out.textContent);});
</script>
