<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta property="og:type" content="website">

<meta property="og:description" content="분수의 덧셈, 뺄셈, 곱셈, 나눗셈을 계산합니다.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="분수 계산기 - Free Utilities">

<link rel="alternate" hreflang="en" href="https://freeutilities.pages.dev/fraction-calc.html">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={{theme:{{extend:{{colors:{{"primary":"#2563eb","background":"#f9fafb","surface":"#ffffff","border":"#e5e7eb"}},darkMode:"class"}}}}}}</script>
<style>
body{background:#f9fafb;font-family:system-ui,-apple-system,sans-serif}
.dark body{background:#0f172a}
.lang-ko{display:inline}
.lang-en{display:none}
body.en .lang-ko{display:none}
body.en .lang-en{display:inline}
</style>
</head>
<body class="bg-background min-h-screen">
<header class="bg-white dark:bg-slate-800 border-b border-border sticky top-0 z-10">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 text-primary font-bold text-lg"><span aria-hidden="true">←</span> Free Utilities</a>
<div class="flex items-center gap-2">
<button id="darkToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">🌙</button>
<button id="langToggle" class="px-3 py-1.5 rounded-lg border border-border text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700">English</button>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-6 sm:p-8 mb-8">
<h1 class="text-3xl font-bold mb-2"><span class="lang-ko">분수 계산기</span><span class="lang-en">Fraction Calculator</span></h1>
<p class="text-slate-600 dark:text-slate-300 mb-6"><span class="lang-ko">분수의 덧셈, 뺄셈, 곱셈, 나눗셈을 계산합니다.</span><span class="lang-en">Add, subtract, multiply, divide fractions.</span></p>
<div class="grid grid-cols-2 gap-4 mb-4"><div><input id="fn1" type="number" value="1" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center" placeholder="Num"><input id="fd1" type="number" value="2" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center mt-2" placeholder="Den"></div><div><input id="fn2" type="number" value="1" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center" placeholder="Num"><input id="fd2" type="number" value="3" class="w-full px-4 py-2 border border-border rounded-lg bg-white dark:bg-slate-700 text-center mt-2" placeholder="Den"></div></div><div class="flex gap-2 mb-4"><button onclick="fOp('+')" class="flex-1 px-3 py-2 bg-primary text-white rounded-lg font-medium">+</button><button onclick="fOp('-')" class="flex-1 px-3 py-2 border border-border rounded-lg font-medium">-</button><button onclick="fOp('*')" class="flex-1 px-3 py-2 border border-border rounded-lg font-medium">×</button><button onclick="fOp('/')" class="flex-1 px-3 py-2 border border-border rounded-lg font-medium">÷</button></div><div id="fres" class="p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center text-xl font-bold text-primary">5/6</div>
</div>

<script>
function fOp(op){var n1=parseFloat(document.getElementById("fn1").value)||0;var d1=parseFloat(document.getElementById("fd1").value)||1;var n2=parseFloat(document.getElementById("fn2").value)||0;var d2=parseFloat(document.getElementById("fd2").value)||1;var nn,dd;if(op==="+"){nn=n1*d2+n2*d1;dd=d1*d2;}else if(op==="-"){nn=n1*d2-n2*d1;dd=d1*d2;}else if(op==="*"){nn=n1*n2;dd=d1*d2;}else{nn=n1*d2;dd=d1*n2;}function gcd(a,b){return b?gcd(b,a%b):a;}var g=gcd(Math.abs(nn),Math.abs(dd));document.getElementById("fres").textContent=(nn/g)+"/"+(dd/g);}
</script>
</main>
<footer class="bg-white dark:bg-slate-800 border-t border-border mt-12">
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-wrap items-center justify-between gap-3 text-sm">
<span class="font-bold">Free Utilities</span>
<nav class="flex gap-4">
<a href="guide-productivity.html" class="hover:text-primary"><span class="lang-ko">가이드</span><span class="lang-en">Guides</span></a>
<a href="privacy.html" class="hover:text-primary"><span class="lang-ko">개인정보처리방침</span><span class="lang-en">Privacy</span></a>
<a href="contact.html" class="hover:text-primary"><span class="lang-ko">문의</span><span class="lang-en">Contact</span></a>
</nav>
<p class="text-slate-500 w-full">© 2026 Free Utilities</p>
</div>
</footer>
<script>
(function(){
var d=localStorage.getItem("darkMode")==="true";
if(d)document.documentElement.classList.add("dark");
var l=localStorage.getItem("site-lang")||"ko";
if(l==="en")document.body.classList.add("en");
var dt=document.getElementById("darkToggle");
dt.textContent=d?"☀️":"🌙";
dt.onclick=function(){var x=document.documentElement.classList.toggle("dark");localStorage.setItem("darkMode",x);dt.textContent=x?"☀️":"🌙";};
var lt=document.getElementById("langToggle");
lt.textContent=l==="en"?"한국어":"English";
lt.onclick=function(){var e=document.body.classList.toggle("en");localStorage.setItem("site-lang",e?"en":"ko");lt.textContent=e?"한국어":"English";};
})();
</script>
</body>
</html>
