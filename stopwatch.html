<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톱워치 - Stopwatch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-end; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .timer { font-size: 4rem; font-weight: 300; font-family: monospace; margin: 30px 0; color: var(--accent); }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .btn-start { background: #34c759; color: white; }
        .btn-stop { background: #ff3b30; color: white; }
        .btn-reset { background: var(--card-bg); color: var(--text); }
        .lap-times { max-height: 250px; overflow-y: auto; text-align: left; margin-top: 20px; }
        .lap-item { padding: 12px 15px; background: var(--input-bg); border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">⏱️ 스톱워치</span>
            <span class="en">⏱️ Stopwatch</span>
        </h1>
        
        <div class="description">
            <span class="ko">시간을 측정하고 랩 타임을 기록합니다.</span>
            <span class="en">Measure time and record lap times.</span>
        </div>
        
        <div class="timer" id="display">00:00:00</div>
        
        <div class="btn-group">
            <button class="btn btn-start" id="startBtn" onclick="start()">
                <span class="ko">시작</span>
                <span class="en">Start</span>
            </button>
            <button class="btn btn-stop" id="stopBtn" onclick="stop()" style="display:none">
                <span class="ko">정지</span>
                <span class="en">Stop</span>
            </button>
            <button class="btn btn-reset" onclick="reset()">
                <span class="ko">초기화</span>
                <span class="en">Reset</span>
            </button>
        </div>
        
        <div class="lap-times" id="laps"></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        let running = false;
        let startTime = 0;
        let elapsed = 0;
        let interval;
        let lapCount = 0;
        
        function format(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            const centi = Math.floor((ms % 1000) / 10);
            return String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0') + ':' + String(centi).padStart(2,'0');
        }
        
        function update() {
            const now = Date.now();
            const diff = running ? now - startTime + elapsed : elapsed;
            document.getElementById('display').textContent = format(diff);
        }
        
        function start() {
            if (!running) {
                running = true;
                startTime = Date.now();
                interval = setInterval(update, 10);
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
            }
        }
        
        function stop() {
            if (running) {
                running = false;
                elapsed += Date.now() - startTime;
                clearInterval(interval);
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('startBtn').innerHTML = document.body.classList.contains('lang-ko') ? '재개' : 'Resume';
            }
        }
        
        function reset() {
            running = false;
            elapsed = 0;
            lapCount = 0;
            clearInterval(interval);
            document.getElementById('display').textContent = '00:00:00';
            document.getElementById('laps').innerHTML = '';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('startBtn').innerHTML = document.body.classList.contains('lang-ko') ? '시작' : 'Start';
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
