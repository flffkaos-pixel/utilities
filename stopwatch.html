<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톱워치 - Stopwatch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%230071e3' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%230071e3'/></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #000000; --surface: #1d1d1f; --surface-raised: #272729; --text-primary: #f5f5f7; --accent: #0071e3; --golf: #34c759; --link: #2997ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(29,29,31,0.72); backdrop-filter: blur(20px); }
        .nav-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; padding: 0 22px; height: 48px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); font-size: 1.06rem; font-weight: 600; }
        .container { max-width: 680px; margin: 0 auto; padding: 32px 22px; text-align: center; }
        .page-header { margin-bottom: 32px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--link); text-decoration: none; font-size: 0.88rem; margin-bottom: 20px; position: absolute; left: 22px; }
        .timer { font-size: 5rem; font-weight: 200; letter-spacing: -0.03em; font-family: "SF Pro Display", monospace; margin: 40px 0; }
        .lap-times { max-height: 300px; overflow-y: auto; margin-top: 30px; text-align: left; }
        .lap-item { padding: 12px 16px; background: var(--surface-raised); border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .btn-group { display: flex; gap: 12px; justify-content: center; }
        .btn { padding: 16px 32px; border: none; border-radius: 980px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: all 0.2s; }
        .btn-start { background: var(--golf); color: #fff; }
        .btn-stop { background: #ff3b30; color: #fff; }
        .btn-reset { background: var(--surface-raised); color: var(--text-primary); }
        .btn-lap { background: var(--accent); color: #fff; }
        .ads { margin-top: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#0071e3" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#0071e3"/></svg><span>Utilities</span></a></div></nav>
    <div class="container">
        <div class="page-header"><a href="index.html" class="back-link">← Home</a></div>
        <h1>스톱워치</h1>
        <div class="timer" id="display">00:00:00.00</div>
        <div class="btn-group">
            <button class="btn btn-start" id="startBtn" onclick="start()">시작</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stop()" style="display:none">정지</button>
            <button class="btn btn-lap" onclick="lap()">랩</button>
            <button class="btn btn-reset" onclick="reset()">초기화</button>
        </div>
        <div class="lap-times" id="laps"></div>
        <div class="ads"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto"></ins></div>
    </div>
    <script>
        let running = false;
        let startTime = 0;
        let elapsed = 0;
        let interval;
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        function format(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            const centi = Math.floor((ms % 1000) / 10);
            return String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0') + ':' + String(centi).padStart(2,'0');
        }
        
        function update() {
            const now = Date.now();
            const diff = now - startTime + elapsed;
            display.textContent = format(diff);
        }
        
        function start() {
            if (running) return;
            running = true;
            startTime = Date.now();
            interval = setInterval(update, 10);
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
        }
        
        function stop() {
            if (!running) return;
            running = false;
            elapsed += Date.now() - startTime;
            clearInterval(interval);
            startBtn.style.display = 'none';
            stopBtn.style.display = 'none';
        }
        
        function reset() {
            running = false;
            elapsed = 0;
            clearInterval(interval);
            display.textContent = '00:00:00.00';
            document.getElementById('laps').innerHTML = '';
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }
        
        function lap() {
            if (!running && elapsed === 0) return;
            const now = Date.now();
            const ms = running ? now - startTime + elapsed : elapsed;
            const div = document.createElement('div');
            div.className = 'lap-item';
            div.innerHTML = '<span>랩 ' + (document.querySelectorAll('.lap-item').length + 1) + '</span><span>' + format(ms) + '</span>';
            document.getElementById('laps').prepend(div);
        }
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
