<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>시간 변환 - UtilityHub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {"primary":"#005bbf","surface":"#f7f9ff","on-surface":"#181c20","surface-container-low":"#f1f4fa","surface-container-lowest":"#ffffff","on-surface-variant":"#414754","outline":"#727785"}, fontFamily: {"headline":["Plus Jakarta Sans"],"body":["Inter"]}}}};</script>
    <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface ">
<header class="bg-[#f7f9ff] flex justify-between items-center px-4 h-16 w-full docked top-0 sticky z-50">
    <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'" class="text-[#005bbf] hover:bg-[#dfe3e8] p-2 rounded-full">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-tight text-[#005bbf]">시간 변환</h1>
    </div>
</header>

<main class="max-w-md mx-auto px-4 py-6 space-y-6">
    <div class="p-4 bg-surface-container-low rounded-2xl">
        <h3 class="font-bold mb-3">Unix → 날짜</h3>
        <input type="number" id="ts" oninput="tsToDate()" class="w-full p-3 bg-surface-container-lowest rounded-xl border-none" placeholder="1700000000">
        <div id="tsResult" class="mt-3 p-3 bg-surface-container-lowest rounded-xl text-center"></div>
    </div>
    <div class="p-4 bg-surface-container-low rounded-2xl">
        <h3 class="font-bold mb-3">현재 시간</h3>
        <div id="now" class="p-3 bg-surface-container-lowest rounded-xl text-center font-mono"></div>
    </div>
</main>

<nav class="flex items-center gap-6 px-6 py-4 bg-white border-b"><a href="index.html" class="text-[#005bbf] font-bold">홈</a><a href="category.html" class="text-gray-600 hover:text-[#005bbf]">카테고리</a><a href="history.html" class="text-gray-600 hover:text-[#005bbf]">기록</a><a href="profile.html" class="text-gray-600 hover:text-[#005bbf]">프로필</a></nav>

<script>
function tsToDate() {
    let ts = parseInt(document.getElementById('ts').value);
    if(ts) document.getElementById('tsResult').textContent = new Date(ts*1000).toLocaleString();
}
function updateNow() { document.getElementById('now').textContent = new Date().toLocaleString(); }
updateNow(); setInterval(updateNow, 1000);
</script>
</body>
</html>
