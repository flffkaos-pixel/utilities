<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 변환 - Time Converter</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; }
        .lang-toggle { display: flex; gap: 10px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .card h2 { font-size: 1rem; margin-bottom: 10px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; }
        .result { padding: 15px; background: var(--input-bg); border-radius: 10px; font-family: monospace; }
        
        /* Language toggle - show only selected language */
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }

        .ads { margin-top: 30px; text-align: center; }
        .en .ko { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1 class="ko">🕐 시간 변환</h1>
        <h1 class="en">🕐 Time Converter</h1>
        
        <div class="card">
            <h2 class="ko">Unix 타임스탬프 → 날짜</h2>
            <h2 class="en">Unix Timestamp → Date</h2>
            <input type="number" id="ts" placeholder="1700000000" oninput="tsToDate()">
            <div class="result" id="tsResult">-</div>
        </div>
        
        <div class="card">
            <h2 class="ko">날짜 → Unix 타임스탬프</h2>
            <h2 class="en">Date → Unix Timestamp</h2>
            <input type="datetime-local" id="date" oninput="dateToTs()">
            <div class="result" id="dateResult">-</div>
        </div>
        
        <div class="card">
            <h2 class="ko">현재 시간</h2>
            <h2 class="en">Current Time</h2>
            <div class="result" id="nowResult">-</div>
        </div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) { document.body.className = lang; localStorage.setItem('util-lang', lang); }
        const saved = localStorage.getItem('util-lang');
        if (saved) setLang(saved);
        
        function tsToDate() {
            const ts = parseInt(document.getElementById('ts').value);
            if (ts) {
                const date = new Date(ts * 1000);
                document.getElementById('tsResult').textContent = date.toLocaleString();
            }
        }
        
        function dateToTs() {
            const dateStr = document.getElementById('date').value;
            if (dateStr) {
                const ts = Math.floor(new Date(dateStr).getTime() / 1000);
                document.getElementById('dateResult').textContent = ts;
            }
        }
        
        function updateNow() {
            const now = new Date();
            document.getElementById('nowResult').textContent = 'Now: ' + now.toLocaleString() + '\nTimestamp: ' + Math.floor(now.getTime() / 1000);
        }
        updateNow();
        setInterval(updateNow, 1000);
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
