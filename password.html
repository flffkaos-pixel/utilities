<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 생성기 - Password Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1955893232253258" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eee; --text-muted: #aaa; --accent: #667eea; --input-bg: #0f3460; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        .description { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .lang-btn { padding: 6px 15px; background: var(--card-bg); color: var(--text); border: 1px solid var(--accent); border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--accent); }
        .options { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .options label { display: flex; align-items: center; gap: 10px; margin: 10px 0; cursor: pointer; }
        .options input[type="checkbox"] { width: 20px; height: 20px; }
        input[type="number"] { width: 100px; padding: 10px; background: var(--input-bg); color: var(--text); border: none; border-radius: 8px; }
        .btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-right: 10px; }
        #password-result { padding: 20px; background: var(--input-bg); border-radius: 10px; font-size: 1.2rem; text-align: center; margin-top: 15px; word-break: break-all; }
        .ads { margin-top: 30px; text-align: center; }
        body.lang-ko .en { display: none !important; }
        body.lang-en .ko { display: none !important; }
    </style>
</head>
<body class="lang-ko">
    <div class="container">
        <div class="header">
            <a href="index.html" class="back">← Back</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                <button class="lang-btn" onclick="setLang('en')">English</button>
            </div>
        </div>
        
        <h1>
            <span class="ko">🔐 비밀번호 생성기</span>
            <span class="en">🔐 Password Generator</span>
        </h1>
        
        <div class="description">
            <span class="ko">비밀번호 생성기는 안전하고 강력한 비밀번호를 생성합니다. 계정 보안에 유용합니다.</span>
            <span class="en">Password Generator creates safe and strong passwords. Useful for account security.</span>
        </div>
        
        <div class="options">
            <span class="ko">길이:</span>
            <span class="en">Length:</span>
            <input type="number" id="length" value="16" min="8" max="64">
            
            <label>
                <input type="checkbox" id="upper" checked>
                <span class="ko">대문자 (A-Z)</span>
                <span class="en">Uppercase (A-Z)</span>
            </label>
            <label>
                <input type="checkbox" id="lower" checked>
                <span class="ko">소문자 (a-z)</span>
                <span class="en">Lowercase (a-z)</span>
            </label>
            <label>
                <input type="checkbox" id="number" checked>
                <span class="ko">숫자 (0-9)</span>
                <span class="en">Numbers (0-9)</span>
            </label>
            <label>
                <input type="checkbox" id="symbol" checked>
                <span class="ko">특수문자 (!@#$%)</span>
                <span class="en">Symbols (!@#$%)</span>
            </label>
        </div>
        
        <button class="btn" onclick="generatePassword()">
            <span class="ko">생성</span>
            <span class="en">Generate</span>
        </button>
        
        <div id="password-result"></div>
        
        <div class="ads">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1955893232253258" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (lang === 'ko' && i === 0) || (lang === 'en' && i === 1));
            });
            localStorage.setItem('util-lang', lang);
        }
        setLang('ko');
        
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const number = '0123456789';
            const symbol = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            let chars = '';
            if (document.getElementById('upper').checked) chars += upper;
            if (document.getElementById('lower').checked) chars += lower;
            if (document.getElementById('number').checked) chars += number;
            if (document.getElementById('symbol').checked) chars += symbol;
            
            if (!chars) {
                document.getElementById('password-result').textContent = 'Select at least one option';
                return;
            }
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password-result').textContent = password;
        }
        
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</body>
</html>
