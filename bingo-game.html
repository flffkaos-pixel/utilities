<body><div class="max-w-md mx-auto space-y-4"><div class="flex gap-3 items-center"><label>Size:</label><select id="bingoSize" onchange="newBingo()"><option value="3">3x3</option><option value="4">4x4</option><option value="5" selected>5x5</option><option value="6">6x6</option><option value="7">7x7</option><option value="8">8x8</option><option value="9">9x9</option><option value="10">10x10</option></select><button onclick="newBingo()" class="px-4 py-2 rounded-xl bg-primary text-white text-sm">New Game</button></div><div id="bingoGrid" class="grid gap-1"></div><div id="bingoStatus" class="text-center font-bold text-lg"></div></div><script>var bingoData=[];function newBingo(){var n=parseInt(document.getElementById("bingoSize").value);var grid=document.getElementById("bingoGrid");grid.style.gridTemplateColumns="repeat("+n+",1fr)";grid.innerHTML="";bingoData=[];for(var i=0;i<n;i++){bingoData[i]=[];for(var j=0;j<n;j++){bingoData[i][j]={marked:false,value:Math.floor(Math.random()*50)+1};var cell=document.createElement("div");cell.className="aspect-square bg-slate-50 dark:bg-slate-700 rounded-lg flex items-center justify-center text-sm font-bold cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-600 transition";cell.textContent=bingoData[i][j].value;cell.dataset.r=i;cell.dataset.c=j;cell.onclick=function(){var r=parseInt(this.dataset.r);var c=parseInt(this.dataset.c);bingoData[r][c].marked=!bingoData[r][c].marked;this.classList.toggle("bg-green-400",bingoData[r][c].marked);this.classList.toggle("dark:bg-green-700",bingoData[r][c].marked);checkBingo()};grid.appendChild(cell)}}var mid=Math.floor(n/2);bingoData[mid][mid].marked=true;grid.children[mid*n+mid].classList.add("bg-green-400","dark:bg-green-700")}function checkBingo(){var n=parseInt(document.getElementById("bingoSize").value);var count=0;for(var i=0;i<n;i++){var row=true,col=true;for(var j=0;j<n;j++){if(!bingoData[i][j].marked)row=false;if(!bingoData[j][i].marked)col=false}if(row)count++;if(col)count++}var d1=true,d2=true;for(var i=0;i<n;i++){if(!bingoData[i][i].marked)d1=false;if(!bingoData[i][n-1-i].marked)d2=false}if(d1)count++;if(d2)count++;document.getElementById("bingoStatus").textContent=count+" Bingo"+(count>1?"s!":"!")}newBingo()</script></body>
