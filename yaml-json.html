<div><span class="lang-ko text-sm text-on-surface-variant mb-1 block">출력</span><span class="lang-en text-sm text-on-surface-variant mb-1 block">Output</span>
<div class="relative"><textarea id="yjOutput" class="yj-textarea" rows="12" readonly></textarea>
<button id="yjCopy" class="absolute top-2 right-2 bg-primary text-white text-xs px-2 py-1 rounded hover:bg-blue-700 transition"><span class="lang-ko">복사</span><span class="lang-en">Copy</span></button></div></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script>
document.getElementById('yjConvert').addEventListener('click',function(){
var inp=document.getElementById('yjInput').value;var dir=document.getElementById('yjDir').value;var out=document.getElementById('yjOutput');
try{if(dir==='y2j'){var obj=jsyaml.load(inp);out.value=JSON.stringify(obj,null,2)}else{var obj=JSON.parse(inp);out.value=jsyaml.dump(obj)}}catch(e){out.value='Error: '+e.message}
});
document.getElementById('yjCopy').addEventListener('click',function(){var o=document.getElementById('yjOutput');o.select();navigator.clipboard.writeText(o.value)});
</script>
