<h1 class="text-2xl font-bold mb-6 text-on-surface"><span class="lang-ko">파일 암호화/복호화 - AES-GCM 보안</span><span class="lang-en">File Encrypt & Decrypt - AES-GCM Security</span></h1>

<div class="space-y-4">
<div class="flex gap-3">
<button id="efEncrypt" class="bg-primary text-white px-4 py-2 rounded-lg text-sm"><span class="lang-ko">암호화</span><span class="lang-en">Encrypt</span></button>
<button id="efDecrypt" class="border border-primary text-primary px-4 py-2 rounded-lg text-sm"><span class="lang-ko">복호화</span><span class="lang-en">Decrypt</span></button>
</div>
<div id="efMode" class="text-sm font-medium text-primary"><span class="lang-ko">모드: 암호화</span><span class="lang-en">Mode: Encrypt</span></div>
<div><label class="text-sm text-on-surface-variant block"><span class="lang-ko">파일 선택</span><span class="lang-en">Select file</span>
<input id="efFile" type="file" class="mt-1 text-sm"></label></div>
<div><label class="text-sm text-on-surface-variant block"><span class="lang-ko">비밀번호</span><span class="lang-en">Password</span>
<input id="efPass" class="ef-input mt-1" type="password" placeholder="Enter password"></label></div>
<button id="efSubmit" class="bg-primary text-white px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition disabled:opacity-50" disabled><span class="lang-ko">처리</span><span class="lang-en">Process</span></button>
<div class="progress"><div id="efProgress" class="progress-bar" style="width:0%"></div></div>
<div id="efInfo" class="text-sm text-on-surface-variant"></div></div>
<script>
var mode='encrypt';
document.getElementById('efEncrypt').addEventListener('click',function(){mode='encrypt';document.getElementById('efMode').innerHTML='<span class="lang-ko">모드: 암호화</span><span class="lang-en">Mode: Encrypt</span>';document.getElementById('efDecrypt').className='border border-primary text-primary px-4 py-2 rounded-lg text-sm';this.className='bg-primary text-white px-4 py-2 rounded-lg text-sm'});
document.getElementById('efDecrypt').addEventListener('click',function(){mode='decrypt';document.getElementById('efMode').innerHTML='<span class="lang-ko">모드: 복호화</span><span class="lang-en">Mode: Decrypt</span>';document.getElementById('efEncrypt').className='border border-primary text-primary px-4 py-2 rounded-lg text-sm';this.className='bg-primary text-white px-4 py-2 rounded-lg text-sm'});
document.getElementById('efFile').addEventListener('change',function(){document.getElementById('efSubmit').disabled=!this.files.length});
document.getElementById('efSubmit').addEventListener('click',async function(){
var file=document.getElementById('efFile').files[0];var pass=document.getElementById('efPass').value;if(!file||!pass)return;
var prog=document.getElementById('efProgress');var info=document.getElementById('efInfo');prog.style.width='10%';info.textContent='Processing...';
try{if(mode==='encrypt'){var data=await file.arrayBuffer();var salt=crypto.getRandomValues(new Uint8Array(16));var iv=crypto.getRandomValues(new Uint8Array(12));var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']),{name:'AES-GCM',length:256},false,['encrypt']);prog.style.width='50%';var enc=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,data);prog.style.width='80%';var combined=new Uint8Array(salt.length+iv.length+enc.byteLength);combined.set(salt,0);combined.set(iv,salt.length);combined.set(new Uint8Array(enc),salt.length+iv.length);var blob=new Blob([combined]);var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=file.name+'.encrypted';a.click();URL.revokeObjectURL(url);prog.style.width='100%';info.textContent='<span class="lang-ko">암호화 완료. 다운로드 시작됨.</span><span class="lang-en">Encryption complete. Download started.</span>'}else{var buf=await file.arrayBuffer();var arr=new Uint8Array(buf);var salt2=arr.slice(0,16);var iv2=arr.slice(16,28);var data2=arr.slice(28);var key2=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt2,iterations:100000,hash:'SHA-256'},await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']),{name:'AES-GCM',length:256},false,['decrypt']);prog.style.width='50%';var dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv2},key2,data2);prog.style.width='80%';var blob2=new Blob([dec]);var url2=URL.createObjectURL(blob2);var a2=document.createElement('a');a2.href=url2;var orig=file.name.replace(/\.encrypted$/,'')||'decrypted';a2.download=orig;a2.click();URL.revokeObjectURL(url2);prog.style.width='100%';info.textContent='<span class="lang-ko">복호화 완료. 다운로드 시작됨.</span><span class="lang-en">Decryption complete. Download started.</span>'}}catch(e){prog.style.width='0%';info.textContent='Error: '+e.message}
});
</script>
